</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="POSIX">
<h1 id="hour-37-intro-to-oop--classes-objects-and-self">Hour 37: Intro to OOP — Classes, Objects, and <code>self</code></h1>
<h2 id="learning-outcomes">Learning Outcomes</h2>
<ul>
<li>Create a basic class using the <code>class</code> keyword and <code>__init__</code></li>
<li>Instantiate objects from a class and call their methods</li>
<li>Distinguish a <strong>class</strong> (blueprint) from an <strong>object</strong> (instance)</li>
<li>Use <code>self</code> to store and access instance attributes</li>
<li>Understand why <code>self</code> is required in every instance method</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="POSIX">
<h2 id="class-vs-object--the-blueprint-analogy">Class vs. Object — The Blueprint Analogy</h2>
<h3 id="a-class-is-a-blueprint">A Class Is a Blueprint</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Cookie Cutter (class)  →  Cookie 1, Cookie 2, Cookie 3 (objects/instances)
</code></pre>
<h3 id="key-points">Key Points</h3>
<ul>
<li>A class <strong>defines</strong> structure and behavior — no object exists yet</li>
<li>An <strong>object</strong> (instance) is a concrete value built from the class</li>
<li>Multiple independent objects can be created from one class</li>
<li>Each object has its own copy of the class's attributes</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">pass</span>

alice   = Contact()   <span class="hljs-comment"># object 1</span>
bob     = Contact()   <span class="hljs-comment"># object 2</span>
charlie = Contact()   <span class="hljs-comment"># object 3 — all independent</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="POSIX">
<h2 id="defining-a-class--__init__">Defining a Class — <code>__init__</code></h2>
<h3 id="the-constructor-pattern">The Constructor Pattern</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, name, phone</span>):
        <span class="hljs-variable language_">self</span>.name  = name    <span class="hljs-comment"># instance attribute</span>
        <span class="hljs-variable language_">self</span>.phone = phone   <span class="hljs-comment"># instance attribute</span>
</code></pre>
<h3 id="creating-objects">Creating Objects</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">alice = Contact(<span class="hljs-string">&quot;Alice Johnson&quot;</span>, <span class="hljs-string">&quot;555-0001&quot;</span>)
bob   = Contact(<span class="hljs-string">&quot;Bob Smith&quot;</span>,    <span class="hljs-string">&quot;555-0002&quot;</span>)

<span class="hljs-built_in">print</span>(alice.name)   <span class="hljs-comment"># Alice Johnson</span>
<span class="hljs-built_in">print</span>(bob.name)     <span class="hljs-comment"># Bob Smith  (independent copy)</span>
</code></pre>
<h3 id="why-__init__">Why <code>__init__</code>?</h3>
<ul>
<li>Runs <strong>automatically</strong> when an object is created</li>
<li>Sets up the object's initial state consistently</li>
<li>Without it you'd set attributes manually after creation (error-prone)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="POSIX">
<h2 id="instance-attributes-and-self">Instance Attributes and <code>self</code></h2>
<h3 id="what-self-means">What <code>self</code> Means</h3>
<ul>
<li><code>self</code> is a reference to the <strong>current object</strong> the method is running on</li>
<li>When you call <code>alice.display()</code>, Python passes <code>alice</code> as <code>self</code></li>
<li><code>self.name</code> means &quot;this object's own <code>name</code> attribute&quot;</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, name, phone</span>):
        <span class="hljs-variable language_">self</span>.name  = name       <span class="hljs-comment"># belongs to THIS object</span>
        <span class="hljs-variable language_">self</span>.phone = phone      <span class="hljs-comment"># belongs to THIS object</span>

alice = Contact(<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;555-0001&quot;</span>)
bob   = Contact(<span class="hljs-string">&quot;Bob&quot;</span>,   <span class="hljs-string">&quot;555-0002&quot;</span>)

<span class="hljs-comment"># Python internally does:</span>
<span class="hljs-comment"># Contact.__init__(alice, &quot;Alice&quot;, &quot;555-0001&quot;)</span>
<span class="hljs-comment"># Contact.__init__(bob,   &quot;Bob&quot;,   &quot;555-0002&quot;)</span>

<span class="hljs-built_in">print</span>(alice.name)   <span class="hljs-comment"># &quot;Alice&quot;</span>
<span class="hljs-built_in">print</span>(bob.name)     <span class="hljs-comment"># &quot;Bob&quot;  — completely separate object</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="POSIX">
<h2 id="methods--defining-behavior">Methods — Defining Behavior</h2>
<h3 id="a-bankaccount-class-with-multiple-method-types">A <code>BankAccount</code> Class with Multiple Method Types</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">BankAccount</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, account_holder, initial_balance</span>):
        <span class="hljs-variable language_">self</span>.account_holder = account_holder
        <span class="hljs-variable language_">self</span>.balance = initial_balance

    <span class="hljs-comment"># Action method — modifies state</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">deposit</span>(<span class="hljs-params">self, amount</span>):
        <span class="hljs-variable language_">self</span>.balance = <span class="hljs-variable language_">self</span>.balance + amount
        <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Deposited $<span class="hljs-subst">{amount}</span>. New balance: $<span class="hljs-subst">{self.balance}</span>&quot;</span>)

    <span class="hljs-comment"># Action method with a safety check</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">withdraw</span>(<span class="hljs-params">self, amount</span>):
        <span class="hljs-keyword">if</span> amount &lt;= <span class="hljs-variable language_">self</span>.balance:
            <span class="hljs-variable language_">self</span>.balance = <span class="hljs-variable language_">self</span>.balance - amount
            <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Withdrew $<span class="hljs-subst">{amount}</span>. New balance: $<span class="hljs-subst">{self.balance}</span>&quot;</span>)
        <span class="hljs-keyword">else</span>:
            <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Insufficient funds. Balance is $<span class="hljs-subst">{self.balance}</span>&quot;</span>)

    <span class="hljs-comment"># Query method — returns state without changing it</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_balance</span>(<span class="hljs-params">self</span>):
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">self</span>.balance
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="POSIX">

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-string">&quot;&quot;&quot;A simple contact record.&quot;&quot;&quot;</span>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="POSIX">

<h2 id="common-pitfalls--hour-37">Common Pitfalls — Hour 37</h2>
<h3 id="pitfall-1-forgetting-self-in-the-method-signature">Pitfall 1: Forgetting <code>self</code> in the Method Signature</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — TypeError when called</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">name, phone</span>):   <span class="hljs-comment"># self missing!</span>
        <span class="hljs-variable language_">self</span>.name = name         <span class="hljs-comment"># NameError: self is not defined</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Right</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, name, phone</span>):
        <span class="hljs-variable language_">self</span>.name  = name
        <span class="hljs-variable language_">self</span>.phone = phone
</code></pre>
<h3 id="pitfall-2-class-attribute-vs-instance-attribute">Pitfall 2: Class Attribute vs. Instance Attribute</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — ALL instances share the same list!</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">Container</span>:
    items = []              <span class="hljs-comment"># class-level — shared by every object</span>

<span class="hljs-comment"># Right — each instance gets its own list</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">Container</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self</span>):
        <span class="hljs-variable language_">self</span>.items = []     <span class="hljs-comment"># instance-level — unique per object</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="POSIX">
<h2 id="quick-check--hour-37">Quick Check — Hour 37</h2>
<p><strong>Question:</strong> What is the difference between a <strong>class</strong> and an <strong>object</strong>?</p>
<p>Expected answer: A class is a blueprint or template. An object (instance) is a concrete value built from that blueprint. You can create many independent objects from one class — each with its own attribute values.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="POSIX">
<h1 id="hour-38-collections-of-objects--searching">Hour 38: Collections of Objects + Searching</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Search a list of objects by comparing their attributes</li>
<li>Update an object's attribute in place — no &quot;save back&quot; needed</li>
<li>Use <code>.lower()</code> to make searches case-insensitive</li>
<li>Wrap search logic in a reusable function returning the object or <code>None</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="POSIX">
<h2 id="the-core-search-pattern">The Core Search Pattern</h2>
<h3 id="loop-and-compare-attributes">Loop and Compare Attributes</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, name, phone</span>):
        <span class="hljs-variable language_">self</span>.name  = name
        <span class="hljs-variable language_">self</span>.phone = phone

directory = [
    Contact(<span class="hljs-string">&quot;Alice&quot;</span>,   <span class="hljs-string">&quot;555-0101&quot;</span>),
    Contact(<span class="hljs-string">&quot;Bob&quot;</span>,     <span class="hljs-string">&quot;555-0202&quot;</span>),
    Contact(<span class="hljs-string">&quot;Charlie&quot;</span>, <span class="hljs-string">&quot;555-0303&quot;</span>),
]

query = <span class="hljs-string">&quot;bob&quot;</span>
found_contact = <span class="hljs-literal">None</span>

<span class="hljs-keyword">for</span> person <span class="hljs-keyword">in</span> directory:
    <span class="hljs-comment"># compare the attribute (string), not the whole object</span>
    <span class="hljs-keyword">if</span> person.name.lower() == query.lower():
        found_contact = person
        <span class="hljs-keyword">break</span>

<span class="hljs-keyword">if</span> found_contact:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Found them! Phone: <span class="hljs-subst">{found_contact.phone}</span>&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Contact not found.&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="POSIX">
<h2 id="string-normalization-and-updating-in-place">String Normalization and Updating In Place</h2>
<h3 id="always-normalize-both-sides">Always Normalize Both Sides</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Without normalization — misses &quot;BOB&quot;, &quot;bob&quot;, &quot;BoB&quot;</span>
<span class="hljs-keyword">if</span> person.name == <span class="hljs-string">&quot;Bob&quot;</span>:

<span class="hljs-comment"># With normalization — catches all variations</span>
<span class="hljs-keyword">if</span> person.name.lower() == query.lower():
</code></pre>
<h3 id="updating-the-found-object">Updating the Found Object</h3>
<p>Once you hold the reference, assign directly — the list sees the change automatically:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> found_contact:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Old phone: <span class="hljs-subst">{found_contact.phone}</span>&quot;</span>)
    found_contact.phone = <span class="hljs-string">&quot;555-9999&quot;</span>   <span class="hljs-comment"># updates the SAME object in the list</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;New phone: <span class="hljs-subst">{found_contact.phone}</span>&quot;</span>)

<span class="hljs-comment"># Verify the list sees the change — no &quot;save back&quot; needed</span>
<span class="hljs-keyword">for</span> p <span class="hljs-keyword">in</span> directory:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{p.name}</span>: <span class="hljs-subst">{p.phone}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="POSIX">
<h2 id="search_contact--a-reusable-function">search_contact() — A Reusable Function</h2>
<h3 id="wrap-the-loop">Wrap the Loop</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">search_contact</span>(<span class="hljs-params">contact_list, target_name</span>):
    <span class="hljs-string">&quot;&quot;&quot;
    Search for a contact by name (case-insensitive).
    Returns the Contact object if found, or None if not found.
    &quot;&quot;&quot;</span>
    <span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> contact_list:
        <span class="hljs-keyword">if</span> c.name.lower() == target_name.lower():
            <span class="hljs-keyword">return</span> c      <span class="hljs-comment"># returns the actual object immediately</span>

    <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>           <span class="hljs-comment"># no match found</span>
</code></pre>
<h3 id="using-the-function">Using the Function</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">result = search_contact(directory, <span class="hljs-string">&quot;Alice&quot;</span>)

<span class="hljs-keyword">if</span> result:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Found <span class="hljs-subst">{result.name}</span>. Updating phone...&quot;</span>)
    result.phone = <span class="hljs-string">&quot;555-8888&quot;</span>
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Not found.&quot;</span>)

<span class="hljs-comment"># Test a missing contact</span>
result2 = search_contact(directory, <span class="hljs-string">&quot;Eve&quot;</span>)
<span class="hljs-keyword">if</span> result2:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Found <span class="hljs-subst">{result2.name}</span>.&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Eve not found in directory.&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="POSIX">
<h2 id="lab--refactor-contact-manager-to-objects">Lab — Refactor Contact Manager to Objects</h2>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="POSIX">
<h2 id="common-pitfalls--hour-38">Common Pitfalls — Hour 38</h2>
<h3 id="pitfall-1-comparing-the-whole-object-instead-of-an-attribute">Pitfall 1: Comparing the Whole Object Instead of an Attribute</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — compares a string to a Contact object</span>
<span class="hljs-keyword">if</span> query == contact:
    ...

<span class="hljs-comment"># Right — compare the string to the name attribute</span>
<span class="hljs-keyword">if</span> query.lower() == contact.name.lower():
    ...
</code></pre>
<h3 id="pitfall-2-forgetting-break-after-a-match">Pitfall 2: Forgetting <code>break</code> After a Match</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — loop continues; may overwrite found_contact</span>
<span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> directory:
    <span class="hljs-keyword">if</span> c.name.lower() == target.lower():
        found_contact = c          <span class="hljs-comment"># found it, but loop keeps going!</span>

<span class="hljs-comment"># Right — stop immediately on match</span>
<span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> directory:
    <span class="hljs-keyword">if</span> c.name.lower() == target.lower():
        found_contact = c
        <span class="hljs-keyword">break</span>
</code></pre>
<h3 id="pitfall-3-thinking-you-must-save-back-after-updating">Pitfall 3: Thinking You Must &quot;Save Back&quot; After Updating</h3>
<p><code>found_contact</code> and the object inside the list are the same object in memory. Assign to the attribute directly — no extra step needed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="POSIX">
<h2 id="quick-check--hour-38">Quick Check — Hour 38</h2>
<p><strong>Question:</strong> If you set <code>found_contact.phone = &quot;555-new&quot;</code>, does the original object in the list change?</p>
<p>Expected answer: Yes. <code>found_contact</code> points to the same object that is inside the list. You are modifying the actual object, not a copy. No &quot;save back&quot; step is needed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="POSIX">
<h1 id="hour-39-basic-encapsulation--data-validation">Hour 39: Basic Encapsulation + Data Validation</h1>
<h2 id="learning-outcomes-2">Learning Outcomes</h2>
<ul>
<li>Write a simple validation method inside a class</li>
<li>Distinguish core business logic (class) from UI logic (menu loop)</li>
<li>Protect data by updating <code>self.phone</code> only when validation passes</li>
<li>Return <code>True</code>/<code>False</code> from a method to signal success or failure</li>
<li>Preview <code>ValueError</code> as an alternative signal for invalid data</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="POSIX">
<h2 id="encapsulation--the-core-idea">Encapsulation — The Core Idea</h2>
<h3 id="analogy--a-bank-account">Analogy — A Bank Account</h3>
<p>The bank doesn't let you set your balance directly. You go through <code>deposit()</code> and <code>withdraw()</code>, which enforce rules.</p>
<h3 id="the-same-pattern-for-our-class">The Same Pattern for Our Class</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># No guardrails — garbage accepted silently</span>
c = Contact(<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;555-1234&quot;</span>)
c.phone = user_input     <span class="hljs-comment"># anything goes in, no checks</span>

<span class="hljs-comment"># Method-guarded update</span>
success = c.update_phone(user_input)   <span class="hljs-comment"># class decides if it is valid</span>
<span class="hljs-keyword">if</span> success:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Update successful!&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Invalid phone number.&quot;</span>)
</code></pre>
<p>The class <strong>owns</strong> its data. The class <strong>decides</strong> what data is acceptable.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="POSIX">
<h2 id="ui-vs-core-logic--separation-of-concerns">UI vs. Core Logic — Separation of Concerns</h2>
<h3 id="two-separate-jobs">Two Separate Jobs</h3>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Responsibility</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Class (core logic)</strong></td>
<td>Knows what makes a Contact valid; enforces rules; protects data</td>
</tr>
<tr>
<td><strong>Menu loop (UI)</strong></td>
<td>Talks to user; collects input; calls class methods; reacts to True/False</td>
</tr>
</tbody>
</table>
<h3 id="why-this-separation-matters">Why This Separation Matters</h3>
<ul>
<li><strong>Reusable</strong> — any code that creates contacts uses the same validation</li>
<li><strong>Maintainable</strong> — change validation rules in one place only</li>
<li><strong>Testable</strong> — test the class without running a menu loop</li>
<li><strong>Readable</strong> — menu code stays clean; class code stays focused</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="POSIX">
<h2 id="boolean-validation-method">Boolean Validation Method</h2>
<h3 id="validate-first-then-update">Validate First, Then Update</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Contact</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, name, phone</span>):
        <span class="hljs-variable language_">self</span>.name  = name
        <span class="hljs-variable language_">self</span>.phone = phone

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">update_phone</span>(<span class="hljs-params">self, new_phone</span>):
        <span class="hljs-string">&quot;&quot;&quot;
        Update phone if it passes validation.
        Returns True if valid and updated, False otherwise.
        &quot;&quot;&quot;</span>
        <span class="hljs-comment"># Clean up separators before counting digits</span>
        clean = new_phone.replace(<span class="hljs-string">&quot; &quot;</span>, <span class="hljs-string">&quot;&quot;</span>).replace(<span class="hljs-string">&quot;-&quot;</span>, <span class="hljs-string">&quot;&quot;</span>)

        <span class="hljs-comment"># Rule 1: must contain only digits after cleanup</span>
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> clean.isdigit():
            <span class="hljs-keyword">return</span> <span class="hljs-literal">False</span>

        <span class="hljs-comment"># Rule 2: must be at least 7 digits</span>
        <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(clean) &lt; <span class="hljs-number">7</span>:
            <span class="hljs-keyword">return</span> <span class="hljs-literal">False</span>

        <span class="hljs-comment"># All rules passed — safe to update</span>
        <span class="hljs-variable language_">self</span>.phone = new_phone
        <span class="hljs-keyword">return</span> <span class="hljs-literal">True</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="POSIX">
<h2 id="wiring-validation-to-the-menu">Wiring Validation to the Menu</h2>
<h3 id="clean-menu-loop">Clean Menu Loop</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">my_contact = Contact(<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;555-1234&quot;</span>)

<span class="hljs-keyword">while</span> <span class="hljs-literal">True</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;\nCurrent phone: <span class="hljs-subst">{my_contact.phone}</span>&quot;</span>)
    user_input = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter new phone (or &#x27;q&#x27; to quit): &quot;</span>)

    <span class="hljs-keyword">if</span> user_input.lower() == <span class="hljs-string">&#x27;q&#x27;</span>:
        <span class="hljs-keyword">break</span>

    success = my_contact.update_phone(user_input)

    <span class="hljs-keyword">if</span> success:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Phone updated successfully!&quot;</span>)
    <span class="hljs-keyword">else</span>:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Invalid phone number. Must be at least 7 digits.&quot;</span>)
</code></pre>
<h3 id="valueerror-preview-advanced-teaser">ValueError Preview (Advanced Teaser)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">update_phone</span>(<span class="hljs-params">self, new_phone</span>):
    clean = new_phone.replace(<span class="hljs-string">&quot; &quot;</span>, <span class="hljs-string">&quot;&quot;</span>).replace(<span class="hljs-string">&quot;-&quot;</span>, <span class="hljs-string">&quot;&quot;</span>)
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> clean.isdigit():
        <span class="hljs-keyword">raise</span> ValueError(<span class="hljs-string">&quot;Phone must contain only digits, spaces, and dashes.&quot;</span>)
    <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(clean) &lt; <span class="hljs-number">7</span>:
        <span class="hljs-keyword">raise</span> ValueError(<span class="hljs-string">&quot;Phone must be at least 7 digits.&quot;</span>)
    <span class="hljs-variable language_">self</span>.phone = new_phone
    <span class="hljs-keyword">return</span> <span class="hljs-literal">True</span>
</code></pre>
<p>Full <code>try</code>/<code>except</code> handling is covered in a later module. For this lab, use the boolean approach.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="POSIX">

<h2 id="common-pitfalls--hour-39">Common Pitfalls — Hour 39</h2>
<h3 id="pitfall-1-validation-logic-in-the-menu-not-the-class">Pitfall 1: Validation Logic in the Menu, Not the Class</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — validation scattered in UI; must be duplicated everywhere</span>
phone = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter phone: &quot;</span>)
<span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(phone) &gt;= <span class="hljs-number">7</span>:
    contact.phone = phone   <span class="hljs-comment"># direct assignment bypasses class rules</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Right — validation inside the class method</span>
phone = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter phone: &quot;</span>)
<span class="hljs-keyword">if</span> contact.update_phone(phone):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Updated!&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Invalid — try again.&quot;</span>)
</code></pre>
<h3 id="pitfall-2-forgetting-to-return-a-boolean">Pitfall 2: Forgetting to Return a Boolean</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — method returns None on success (None is falsy)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">update_phone</span>(<span class="hljs-params">self, new_phone</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(new_phone) &gt;= <span class="hljs-number">7</span>:
        <span class="hljs-variable language_">self</span>.phone = new_phone
        <span class="hljs-comment"># missing return True!</span>

<span class="hljs-comment"># Right — always return True or False explicitly</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">update_phone</span>(<span class="hljs-params">self, new_phone</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(new_phone) &gt;= <span class="hljs-number">7</span>:
        <span class="hljs-variable language_">self</span>.phone = new_phone
        <span class="hljs-keyword">return</span> <span class="hljs-literal">True</span>
    <span class="hljs-keyword">return</span> <span class="hljs-literal">False</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="POSIX">
<h2 id="quick-check--hour-39">Quick Check — Hour 39</h2>
<p><strong>Question:</strong> Where should validation logic live — inside the class or in the menu loop?</p>
<p>Expected answer: Inside the class. The class owns the data, so it owns the rules about what data is valid. Putting validation in the menu loop means duplicating those rules everywhere the data is created or updated. Centralizing validation in the class means one place to maintain — all callers benefit automatically.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="POSIX">

<h2 id="why-multi-file-architecture">Why Multi-File Architecture?</h2>
<h3 id="restaurant-analogy">Restaurant Analogy</h3>
<table>
<thead>
<tr>
<th>File</th>
<th>Role</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>main.py</code></td>
<td>Server — talks to user, orchestrates actions</td>
</tr>
<tr>
<td><code>utils.py</code></td>
<td>Kitchen — reusable helpers any part of the app can call</td>
</tr>
<tr>
<td><code>record.py</code></td>
<td>Recipe definition — what a record looks like and can do</td>
</tr>
</tbody>
</table>
<h3 id="import-flow-is-one-directional">Import Flow is One-Directional</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>main.py  →  utils.py
main.py  →  record.py
</code></pre>
<p><code>utils.py</code> and <code>record.py</code> do <strong>not</strong> import from <code>main.py</code> — this keeps each file self-contained and reusable.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="POSIX">
<h2 id="the-record-class-pattern">The Record Class Pattern</h2>
<h3 id="checkpoint-5-reference-implementation">Checkpoint 5 Reference Implementation</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># record.py</span>

<span class="hljs-keyword">class</span> <span class="hljs-title class_">Record</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, name, note</span>):
        <span class="hljs-variable language_">self</span>.name = name.strip()
        <span class="hljs-variable language_">self</span>.note = note.strip()

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">matches</span>(<span class="hljs-params">self, term</span>):
        <span class="hljs-string">&quot;&quot;&quot;Return True if term appears in name or note (case-insensitive).&quot;&quot;&quot;</span>
        normalized = term.strip().lower()
        <span class="hljs-keyword">return</span> normalized <span class="hljs-keyword">in</span> <span class="hljs-variable language_">self</span>.name.lower() <span class="hljs-keyword">or</span> normalized <span class="hljs-keyword">in</span> <span class="hljs-variable language_">self</span>.note.lower()

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">display</span>(<span class="hljs-params">self</span>):
        <span class="hljs-keyword">return</span> <span class="hljs-string">f&quot;<span class="hljs-subst">{self.name}</span> — <span class="hljs-subst">{self.note}</span>&quot;</span>
</code></pre>
<h3 id="why-a-class-instead-of-a-dictionary">Why a Class Instead of a Dictionary?</h3>
<ul>
<li>Structure is <strong>enforced</strong> — every record always has <code>name</code> and <code>note</code></li>
<li>Behavior travels <strong>with</strong> the data — <code>matches()</code> and <code>display()</code> are on the object</li>
<li>Dot-notation is cleaner and less error-prone than <code>dict['name']</code> key lookups</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="POSIX">

<h3 id="pitfall-1-importerror-from-wrong-working-directory">Pitfall 1: ImportError from Wrong Working Directory</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>ModuleNotFoundError: No module named 'utils'
</code></pre>
<p>All files must be in the <strong>same folder</strong>. Run Python from that folder:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>project/
├── main.py
├── utils.py     # same folder as main.py
└── record.py
</code></pre>
<h3 id="pitfall-2-file-name-collides-with-standard-library">Pitfall 2: File Name Collides with Standard Library</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># You created math.py — Python imports YOURS, not the built-in</span>
<span class="hljs-keyword">import</span> math

<h3 id="pitfall-3-class-defined-but-never-instantiated">Pitfall 3: Class Defined But Never Instantiated</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wrong — stores a plain string, not a Record object</span>
records.append(name)   <span class="hljs-comment"># calling record.display() will crash later</span>

<span class="hljs-comment"># Right — create an object from the class blueprint</span>
records.append(Record(name, note))
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="POSIX">
<h2 id="quick-check--hour-40">Quick Check — Hour 40</h2>
<p><strong>Question:</strong> Point to one place in your code where using a function reduced duplication.</p>
<p>Example answer: &quot;I used <code>search_records()</code> from <code>utils.py</code> in both my Update and Delete menu options. Without it, I would have copied the same loop and <code>.lower()</code> comparison into two separate <code>elif</code> blocks. By extracting it once into a named function, both features share the same logic. If I change how searching works, I only update it in one place — this is the DRY principle: Don't Repeat Yourself.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="POSIX">
<h2 id="scope-guardrails">Scope Guardrails</h2>
<h3 id="stay-in-basics-scope">Stay in Basics Scope</h3>
<p>✓ Classes with <code>__init__</code> and instance methods<br />
✓ Instance attributes via <code>self</code><br />
✓ Multi-file projects with straightforward imports<br />
✓ Validation methods returning <code>True</code>/<code>False</code><br />
✓ In-memory data storage (lists of objects)</p>
<h3 id="not-yet--advanced-topics">Not Yet — Advanced Topics</h3>
<p>✗ Inheritance and subclassing<br />
✗ Dunder methods beyond <code>__init__</code> (<code>__str__</code>, <code>__repr__</code>, <code>__eq__</code>)<br />
✗ <code>@property</code>, <code>@classmethod</code>, <code>@staticmethod</code> decorators<br />
✗ Abstract base classes (<code>ABC</code>)<br />
✗ <code>@dataclass</code> shortcut<br />
✗ File I/O (coming Day 11)<br />
✗ Full <code>try</code>/<code>except</code> exception handling (coming later)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="POSIX">
