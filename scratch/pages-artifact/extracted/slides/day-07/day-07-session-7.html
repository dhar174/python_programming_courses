</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="POSIX">
<h2 id="ifelifelse-structure">if/elif/else Structure</h2>
<h3 id="the-basic-form">The Basic Form</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> condition_1:
    <span class="hljs-comment"># runs if condition_1 is True</span>
<span class="hljs-keyword">elif</span> condition_2:
    <span class="hljs-comment"># runs if condition_1 is False and condition_2 is True</span>
<span class="hljs-keyword">elif</span> condition_3:
    <span class="hljs-comment"># runs if condition_1 and condition_2 are False, condition_3 is True</span>
<span class="hljs-keyword">else</span>:
    <span class="hljs-comment"># runs if all conditions above are False</span>
</code></pre>
<h3 id="key-rule--first-match-wins">Key Rule — First Match Wins</h3>
<p>Python evaluates conditions <strong>top to bottom</strong> and executes the first block whose condition is True. Once a match is found, all remaining <code>elif</code> and <code>else</code> blocks are skipped.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="POSIX">
<h2 id="condition-ordering-matters">Condition Ordering Matters</h2>
<h3 id="the-bug--overlapping-conditions">The Bug — Overlapping Conditions</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># WRONG: every weight &gt; 10 is also &gt; 0, so &quot;Heavy&quot; is never reached</span>
<span class="hljs-keyword">if</span> weight &gt; <span class="hljs-number">0</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Standard rate&quot;</span>)
<span class="hljs-keyword">elif</span> weight &gt; <span class="hljs-number">10</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Heavy rate&quot;</span>)   <span class="hljs-comment"># never executes!</span>
</code></pre>
<h3 id="the-fix--most-specific-first">The Fix — Most Specific First</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># CORRECT: check narrowest range first</span>
<span class="hljs-keyword">if</span> weight &lt;= <span class="hljs-number">5</span>:
    rate = <span class="hljs-number">5</span>
<span class="hljs-keyword">elif</span> weight &lt;= <span class="hljs-number">10</span>:
    rate = <span class="hljs-number">10</span>
<span class="hljs-keyword">else</span>:
    rate = <span class="hljs-number">15</span>
</code></pre>
<p>If we reach <code>elif weight &lt;= 10</code>, we already know weight is greater than 5. No need to repeat the lower bound.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="POSIX">
<h2 id="boundary-handling">Boundary Handling</h2>
<h3 id="the-off-by-one-problem">The Off-by-One Problem</h3>
<p>A shipping rule says &quot;0 to 5 pounds: $5&quot;. Does exactly 5 pounds cost $5 or $10?</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># &lt;= 5 means &quot;up to and including 5&quot;</span>
<span class="hljs-keyword">if</span> weight &lt;= <span class="hljs-number">5</span>:
    rate = <span class="hljs-number">5</span>
<span class="hljs-keyword">elif</span> weight &lt;= <span class="hljs-number">10</span>:
    rate = <span class="hljs-number">10</span>
<span class="hljs-keyword">else</span>:
    rate = <span class="hljs-number">15</span>
</code></pre>
<h3 id="always-test-at-boundaries">Always Test at Boundaries</h3>
<p>Test weights 5, 5.01, 10, and 10.01 — these are the values where bugs hide.</p>
<ul>
<li>Weight 5 → <code>weight &lt;= 5</code> matches → $5</li>
<li>Weight 5.01 → <code>weight &lt;= 10</code> matches → $10</li>
<li>Weight 10 → <code>weight &lt;= 10</code> matches → $10</li>
<li>Weight 10.01 → <code>else</code> → $15</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="POSIX">
<h2 id="nested-vs-flat-conditionals">Nested vs Flat Conditionals</h2>
<h3 id="nested--grows-deeply">Nested — Grows Deeply</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> is_member:
    <span class="hljs-keyword">if</span> purchase_amount &gt; <span class="hljs-number">100</span>:
        discount = <span class="hljs-number">0.20</span>
    <span class="hljs-keyword">else</span>:
        discount = <span class="hljs-number">0.10</span>
<span class="hljs-keyword">else</span>:
    discount = <span class="hljs-number">0</span>
</code></pre>
<h3 id="flat--easier-to-scan">Flat — Easier to Scan</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> is_member <span class="hljs-keyword">and</span> purchase_amount &gt; <span class="hljs-number">100</span>:
    discount = <span class="hljs-number">0.20</span>
<span class="hljs-keyword">elif</span> is_member:
    discount = <span class="hljs-number">0.10</span>
<span class="hljs-keyword">else</span>:
    discount = <span class="hljs-number">0</span>
</code></pre>
<p><strong>Guideline:</strong> Prefer flat if/elif chains. Use nesting only when the inner condition truly depends on the outer being True.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="POSIX">
<h2 id="demo--shipping-calculator-correct-version">Demo — Shipping Calculator (Correct Version)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Shipping calculator - correct version</span>
<span class="hljs-comment"># Source: Day7_Hour1_Basics.md, section 7.2</span>

weight = <span class="hljs-built_in">float</span>(<span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter package weight in pounds: &quot;</span>))

<span class="hljs-keyword">if</span> weight &lt;= <span class="hljs-number">0</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Error: weight must be positive.&quot;</span>)
<span class="hljs-keyword">elif</span> weight &lt;= <span class="hljs-number">5</span>:
    cost = <span class="hljs-number">5</span>
    category = <span class="hljs-string">&quot;Light&quot;</span>
<span class="hljs-keyword">elif</span> weight &lt;= <span class="hljs-number">10</span>:
    cost = <span class="hljs-number">10</span>
    category = <span class="hljs-string">&quot;Medium&quot;</span>
<span class="hljs-keyword">else</span>:
    cost = <span class="hljs-number">15</span>
    category = <span class="hljs-string">&quot;Heavy&quot;</span>

<span class="hljs-keyword">if</span> weight &gt; <span class="hljs-number">0</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Category: <span class="hljs-subst">{category}</span>&quot;</span>)
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Shipping cost: $<span class="hljs-subst">{cost}</span>&quot;</span>)
</code></pre>
<p>Guard clause first, then most specific to least specific. Each <code>elif</code> inherits the rejected ranges above it.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="POSIX">
<h2 id="demo--wrong-ordering-bug">Demo — Wrong Ordering Bug</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># WRONG: overlapping conditions</span>
<span class="hljs-comment"># Source: Day7_Hour1_Basics.md, section 7.4</span>

weight = <span class="hljs-built_in">float</span>(<span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter package weight in pounds: &quot;</span>))

<span class="hljs-keyword">if</span> weight &gt; <span class="hljs-number">0</span>:
    cost = <span class="hljs-number">5</span>
    category = <span class="hljs-string">&quot;Light&quot;</span>
<span class="hljs-keyword">elif</span> weight &gt; <span class="hljs-number">5</span>:
    cost = <span class="hljs-number">10</span>
    category = <span class="hljs-string">&quot;Medium&quot;</span>   <span class="hljs-comment"># never reached for any valid weight</span>
<span class="hljs-keyword">elif</span> weight &gt; <span class="hljs-number">10</span>:
    cost = <span class="hljs-number">15</span>
    category = <span class="hljs-string">&quot;Heavy&quot;</span>    <span class="hljs-comment"># never reached</span>
</code></pre>
<p>Testing with <code>weight = 12</code> outputs &quot;Light, $5&quot; — <strong>wrong</strong>.</p>
<p><strong>Fix:</strong> Either order from most restrictive to least, or use non-overlapping <code>&lt;=</code> boundaries.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="POSIX">
<h2 id="lab--shipping-calculator">Lab — Shipping Calculator</h2>
<p><strong>Time: 25 minutes</strong></p>
<p><strong>Task:</strong> Build a shipping calculator with tiered weight rules.</p>
<p><strong>Rules:</strong></p>
<ul>
<li>Weight must be positive — validate and show error if not</li>
<li>0 to 5 pounds → $5 flat (Light)</li>
<li>More than 5, up to 10 pounds → $10 flat (Medium)</li>
<li>More than 10 pounds → $15 flat (Heavy)</li>
</ul>
<p><strong>Optional:</strong> Add a fragile surcharge — if package is fragile (yes/no), add $3.</p>
<p><strong>Completion Criteria:</strong></p>
<ul>
<li>Correct cost for boundary weights 5, 5.01, 10, 10.01</li>
<li>Readable branching logic with no overlapping conditions</li>
<li>Clear output showing weight, category, and cost</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="POSIX">
<h2 id="common-pitfalls--hour-25">Common Pitfalls — Hour 25</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Overlapping conditions</strong> — first <code>if</code> is too broad, later <code>elif</code> blocks never execute</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Wrong comparison operator</strong> — using <code>&lt;</code> instead of <code>&lt;=</code> shifts the boundary by one unit</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>No input validation</strong> — not checking for negative or zero weight before computing cost</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Inconsistent boundaries</strong> — &quot;5 to 10 pounds&quot; is ambiguous; clarify whether 5 and 10 are included</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="POSIX">
<h2 id="quick-check--hour-25">Quick Check — Hour 25</h2>
<p><strong>Question:</strong> Given this code, what grade does a score of 85 receive?</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> score &gt;= <span class="hljs-number">90</span>:
    grade = <span class="hljs-string">&#x27;A&#x27;</span>
<span class="hljs-keyword">elif</span> score &gt;= <span class="hljs-number">80</span>:
    grade = <span class="hljs-string">&#x27;B&#x27;</span>
<span class="hljs-keyword">elif</span> score &gt;= <span class="hljs-number">70</span>:
    grade = <span class="hljs-string">&#x27;C&#x27;</span>
<span class="hljs-keyword">else</span>:
    grade = <span class="hljs-string">&#x27;F&#x27;</span>
</code></pre>
<p>What would happen if you reversed the order of the conditions?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="POSIX">
<h1 id="hour-26-while-loops--sentinel-patterns">Hour 26: while Loops + Sentinel Patterns</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Write a while loop that repeats code until a condition becomes False</li>
<li>Explain the difference between a while loop and a for loop</li>
<li>Use <code>break</code> to exit a loop early when a goal is achieved</li>
<li>Use <code>continue</code> to skip the rest of the current iteration</li>
<li>Implement a sentinel pattern — keep prompting until a special value is entered</li>
<li>Build a password prompt that allows up to 3 attempts</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="POSIX">
<h2 id="while-loop-basics">while Loop Basics</h2>
<h3 id="structure">Structure</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">while</span> condition:
    <span class="hljs-comment"># code to repeat</span>
</code></pre>
<p>Python checks the condition <strong>before each iteration</strong>. If it is False on the first check, the body never runs.</p>
<h3 id="simple-trace">Simple Trace</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">count = <span class="hljs-number">1</span>

<span class="hljs-keyword">while</span> count &lt;= <span class="hljs-number">3</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Iteration <span class="hljs-subst">{count}</span>&quot;</span>)
    count = count + <span class="hljs-number">1</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Done&quot;</span>)
</code></pre>
<p>Output: <code>Iteration 1</code>, <code>Iteration 2</code>, <code>Iteration 3</code>, <code>Done</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="POSIX">
<h2 id="the-infinite-loop-danger">The Infinite Loop Danger</h2>
<h3 id="what-happens-when-you-forget-to-update">What Happens When You Forget to Update</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">count = <span class="hljs-number">1</span>

<span class="hljs-keyword">while</span> count &lt;= <span class="hljs-number">3</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Iteration <span class="hljs-subst">{count}</span>&quot;</span>)
    <span class="hljs-comment"># forgot: count = count + 1</span>
</code></pre>
<p><code>count</code> never changes, so the condition is always True, and the loop runs forever.</p>
<p><strong>If this happens:</strong> press <code>Ctrl+C</code> in the terminal to interrupt.</p>
<p><strong>Rule:</strong> Every while loop must change something that eventually makes the condition False — usually by updating a variable inside the loop body.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="POSIX">
<h2 id="break--exit-a-loop-early">break — Exit a Loop Early</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">count = <span class="hljs-number">1</span>

<span class="hljs-keyword">while</span> count &lt;= <span class="hljs-number">10</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Iteration <span class="hljs-subst">{count}</span>&quot;</span>)
    <span class="hljs-keyword">if</span> count == <span class="hljs-number">3</span>:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Breaking out of loop&quot;</span>)
        <span class="hljs-keyword">break</span>
    count = count + <span class="hljs-number">1</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Done&quot;</span>)
</code></pre>
<p>When Python hits <code>break</code>, it exits immediately — even though <code>count &lt;= 10</code> is still True.</p>
<p><strong>Use <code>break</code> when:</strong> you have achieved your goal early and do not need to keep looping.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="POSIX">
<h2 id="continue--skip-to-the-next-iteration">continue — Skip to the Next Iteration</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">count = <span class="hljs-number">0</span>

<span class="hljs-keyword">while</span> count &lt; <span class="hljs-number">5</span>:
    count = count + <span class="hljs-number">1</span>
    <span class="hljs-keyword">if</span> count == <span class="hljs-number">3</span>:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Skipping <span class="hljs-subst">{count}</span>&quot;</span>)
        <span class="hljs-keyword">continue</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Processing <span class="hljs-subst">{count}</span>&quot;</span>)

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Done&quot;</span>)
</code></pre>
<p>Output: <code>Processing 1</code>, <code>Processing 2</code>, <code>Skipping 3</code>, <code>Processing 4</code>, <code>Processing 5</code>, <code>Done</code></p>
<p><strong>Use <code>continue</code> when:</strong> you want to skip this case but keep looping (e.g., skip blank lines, re-prompt on invalid input without exiting).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="POSIX">
<h2 id="sentinel-patterns">Sentinel Patterns</h2>
<h3 id="what-is-a-sentinel">What Is a Sentinel?</h3>
<p>A <strong>sentinel value</strong> signals &quot;stop&quot; — it is never a valid data value.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">names = []

<span class="hljs-keyword">while</span> <span class="hljs-literal">True</span>:
    name = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter a name (or &#x27;done&#x27; to finish): &quot;</span>)
    <span class="hljs-keyword">if</span> name == <span class="hljs-string">&#x27;done&#x27;</span>:
        <span class="hljs-keyword">break</span>
    names.append(name)

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;You entered <span class="hljs-subst">{<span class="hljs-built_in">len</span>(names)}</span> names.&quot;</span>)
</code></pre>
<p>Pattern: <code>while True</code> + <code>break</code> on the sentinel. Safe because <code>break</code> guarantees exit.</p>
<p><strong>Common sentinels:</strong> <code>'q'</code>, <code>'quit'</code>, <code>'done'</code>, empty string <code>''</code>, <code>-1</code> for positive-number lists.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="POSIX">

<h2 id="common-pitfalls--hour-26">Common Pitfalls — Hour 26</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Infinite loop</strong> — forgetting to update the loop variable; <code>attempts</code> never changes, condition stays True forever</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>No <code>break</code> on success</strong> — program prints &quot;Access granted!&quot; but keeps looping; must <code>break</code> immediately</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Wrong condition</strong> — <code>while attempts &lt;= 3</code> gives 4 attempts instead of 3; use <code>&lt;</code> not <code>&lt;=</code></p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Incrementing in the wrong place</strong> — if you only increment on failure, the counter is wrong when the user succeeds early</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="POSIX">
<h1 id="hour-27-for-loops--range">Hour 27: for Loops + range()</h1>
<h2 id="learning-outcomes-2">Learning Outcomes</h2>
<ul>

<li>Choose between for loops and while loops based on whether you know the iteration count</li>

</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="POSIX">
<h2 id="for-loops--iterating-over-sequences">for Loops — Iterating Over Sequences</h2>
<h3 id="structure-1">Structure</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> sequence:
    <span class="hljs-comment"># code to repeat once per item</span>
</code></pre>
<h3 id="simple-example">Simple Example</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">names = [<span class="hljs-string">&#x27;Alice&#x27;</span>, <span class="hljs-string">&#x27;Bob&#x27;</span>, <span class="hljs-string">&#x27;Charlie&#x27;</span>]

<span class="hljs-keyword">for</span> name <span class="hljs-keyword">in</span> names:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Hello, <span class="hljs-subst">{name}</span>!&#x27;</span>)
</code></pre>
<p>Output: <code>Hello, Alice!</code>, <code>Hello, Bob!</code>, <code>Hello, Charlie!</code></p>
<p>Python moves through the sequence automatically — no counter to manage, no index to increment. <strong>Prefer for over while when you know what you are iterating over.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="POSIX">
<h2 id="range--three-forms">range() — Three Forms</h2>
<h3 id="rangestop--start-at-0-stop-before-n">range(stop) — start at 0, stop before n</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">5</span>):
    <span class="hljs-built_in">print</span>(i)
<span class="hljs-comment"># Output: 0, 1, 2, 3, 4</span>
</code></pre>
<h3 id="rangestart-stop--start-at-start-stop-before-stop">range(start, stop) — start at start, stop before stop</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">2</span>, <span class="hljs-number">5</span>):
    <span class="hljs-built_in">print</span>(i)
<span class="hljs-comment"># Output: 2, 3, 4</span>
</code></pre>
<h3 id="rangestart-stop-step--custom-increment-or-countdown">range(start, stop, step) — custom increment or countdown</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-number">10</span>, <span class="hljs-number">2</span>):
    <span class="hljs-built_in">print</span>(i)
<span class="hljs-comment"># Output: 0, 2, 4, 6, 8</span>

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">5</span>, <span class="hljs-number">0</span>, -<span class="hljs-number">1</span>):
    <span class="hljs-built_in">print</span>(i)
<span class="hljs-comment"># Output: 5, 4, 3, 2, 1</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="POSIX">
<h2 id="range--exclusive-endpoints">range() — Exclusive Endpoints</h2>
<h3 id="the-rule">The Rule</h3>
<p><code>range(start, stop)</code> goes up to but <strong>does NOT include</strong> <code>stop</code>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Want 1 through 10? range(1, 10) gives only 1-9</span>
<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">10</span>):
    <span class="hljs-built_in">print</span>(i)   <span class="hljs-comment"># Missing 10!</span>

<span class="hljs-comment"># Fix: use range(1, 11)</span>
<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">11</span>):
    <span class="hljs-built_in">print</span>(i)   <span class="hljs-comment"># 1 through 10 inclusive</span>
</code></pre>
<h3 id="why-exclusive">Why Exclusive?</h3>
<ul>
<li>Length is obvious: <code>range(5)</code> gives exactly 5 numbers (0–4)</li>
<li>Ranges fit together cleanly: <code>range(0, 5)</code> and <code>range(5, 10)</code> have no gap or overlap</li>
<li>List indexing works naturally: a 5-item list has valid indices <code>0, 1, 2, 3, 4</code> = <code>range(5)</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="POSIX">
<h2 id="nested-for-loops">Nested for Loops</h2>
<h3 id="what-are-they">What Are They?</h3>
<p>A loop inside another loop. The inner loop completes <strong>all</strong> its iterations for each single iteration of the outer loop.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> row <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">3</span>):
    <span class="hljs-keyword">for</span> col <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">4</span>):
        <span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;(<span class="hljs-subst">{row}</span>, <span class="hljs-subst">{col}</span>)&#x27;</span>, end=<span class="hljs-string">&#x27; &#x27;</span>)
    <span class="hljs-built_in">print</span>()  <span class="hljs-comment"># new line after each row</span>
</code></pre>
<p>Output:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>(0, 0) (0, 1) (0, 2) (0, 3)
(1, 0) (1, 1) (1, 2) (1, 3)
(2, 0) (2, 1) (2, 2) (2, 3)
</code></pre>
<p><strong>Total iterations:</strong> outer × inner = 3 × 4 = 12. Keep nesting to two levels when possible.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="POSIX">
<h2 id="demo--multiplication-table">Demo — Multiplication Table</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Multiplication table: 1 through 10</span>
<span class="hljs-comment"># Source: Day7_Hour3_Basics.md, section 7.2</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Multiplication Table (1-10)&quot;</span>)
<span class="hljs-built_in">print</span>()

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">11</span>):
    <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">11</span>):
        product = i * j
        <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{product:<span class="hljs-number">4</span>}</span>&quot;</span>, end=<span class="hljs-string">&quot;&quot;</span>)
    <span class="hljs-built_in">print</span>()  <span class="hljs-comment"># new line after each row</span>
</code></pre>
<ul>
<li><code>range(1, 11)</code> gives 1 through 10 (11 is exclusive)</li>
<li><code>f&quot;{product:4}&quot;</code> pads to width 4 so columns align</li>
<li><code>end=&quot;&quot;</code> keeps products on one line; <code>print()</code> after inner loop starts the next row</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="POSIX">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="POSIX">
<h2 id="common-pitfalls--hour-27">Common Pitfalls — Hour 27</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Wrong range</strong> — <code>range(n)</code> gives 0 to n-1, not 1 to n; use <code>range(1, n + 1)</code> for 1 through n inclusive</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>No newline after row</strong> — forgetting <code>print()</code> after the inner loop prints everything on one long line</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Misaligned columns</strong> — not using a format specifier like <code>{:4}</code> makes the table unreadable</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Confusing i and j</strong> — outer loop variable controls rows; inner loop variable controls columns</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="POSIX">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="POSIX">
<h1 id="hour-28-loop-patterns--counters-accumulators-minmax">Hour 28: Loop Patterns — Counters, Accumulators, Min/Max</h1>
<h2 id="learning-outcomes-3">Learning Outcomes</h2>
<ul>
<li>Implement counter patterns — increment inside a conditional to count specific items</li>
<li>Build accumulators — initialize and update variables that collect values across iterations</li>
<li>Develop min/max tracking — find minimum and maximum values while iterating</li>
<li>Calculate averages — combine counter and accumulator to compute the mean</li>
<li>Build a complete number statistics program integrating all four patterns</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="POSIX">
<h2 id="counter-pattern">Counter Pattern</h2>
<h3 id="what-it-does">What It Does</h3>
<p>Counts how many items satisfy a condition. Initialize to 0; increment <strong>inside</strong> the <code>if</code> block.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">numbers = [<span class="hljs-number">10</span>, <span class="hljs-number">5</span>, <span class="hljs-number">20</span>, <span class="hljs-number">15</span>, <span class="hljs-number">30</span>]
even_count = <span class="hljs-number">0</span>

<span class="hljs-keyword">for</span> num <span class="hljs-keyword">in</span> numbers:
    <span class="hljs-keyword">if</span> num % <span class="hljs-number">2</span> == <span class="hljs-number">0</span>:    <span class="hljs-comment"># check if even</span>
        even_count = even_count + <span class="hljs-number">1</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Even numbers: <span class="hljs-subst">{even_count}</span>&#x27;</span>)  <span class="hljs-comment"># Output: 3</span>
</code></pre>
<p><strong>Common mistake:</strong> putting <code>count = count + 1</code> outside the <code>if</code> — it then counts every iteration, not just matching items.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="POSIX">
<h2 id="accumulator-pattern">Accumulator Pattern</h2>
<h3 id="what-it-does-1">What It Does</h3>
<p>Collects values across a loop. Choose the right initial value for the operation.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">numbers = [<span class="hljs-number">10</span>, <span class="hljs-number">20</span>, <span class="hljs-number">30</span>, <span class="hljs-number">40</span>, <span class="hljs-number">50</span>]
total = <span class="hljs-number">0</span>

<span class="hljs-keyword">for</span> num <span class="hljs-keyword">in</span> numbers:
    total = total + num

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Sum: <span class="hljs-subst">{total}</span>&#x27;</span>)  <span class="hljs-comment"># Output: 150</span>
</code></pre>
<h3 id="initialization-rules">Initialization Rules</h3>
<ul>
<li><strong>Addition</strong> → initialize to <code>0</code></li>
<li><strong>Multiplication</strong> → initialize to <code>1</code></li>
<li><strong>String concatenation</strong> → initialize to <code>&quot;&quot;</code></li>
<li><strong>List building</strong> → initialize to <code>[]</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="POSIX">
<h2 id="minmax-pattern">Min/Max Pattern</h2>
<h3 id="what-it-does-2">What It Does</h3>
<p>Tracks extreme values. Initialize with the <strong>first item</strong> — never with 0.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">numbers = [<span class="hljs-number">10</span>, <span class="hljs-number">5</span>, <span class="hljs-number">20</span>, <span class="hljs-number">15</span>, <span class="hljs-number">30</span>]
minimum = numbers[<span class="hljs-number">0</span>]   <span class="hljs-comment"># start with a real value from the data</span>
maximum = numbers[<span class="hljs-number">0</span>]

<span class="hljs-keyword">for</span> num <span class="hljs-keyword">in</span> numbers[<span class="hljs-number">1</span>:]:   <span class="hljs-comment"># skip first item (already assigned)</span>
    <span class="hljs-keyword">if</span> num &lt; minimum:
        minimum = num
    <span class="hljs-keyword">if</span> num &gt; maximum:
        maximum = num

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Min: <span class="hljs-subst">{minimum}</span>, Max: <span class="hljs-subst">{maximum}</span>&#x27;</span>)  <span class="hljs-comment"># Min: 5, Max: 30</span>
</code></pre>
<p>If you initialize <code>minimum = 0</code> and all values are positive, minimum stays 0 — a value that was never in the list.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" lang="POSIX">
<h2 id="average-pattern">Average Pattern</h2>
<h3 id="what-it-does-3">What It Does</h3>
<p>Combines counter + accumulator. Divide <strong>after</strong> the loop completes — never inside it.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">numbers = [<span class="hljs-number">10</span>, <span class="hljs-number">5</span>, <span class="hljs-number">20</span>, <span class="hljs-number">15</span>, <span class="hljs-number">30</span>]
total = <span class="hljs-number">0</span>
count = <span class="hljs-number">0</span>

<span class="hljs-keyword">for</span> num <span class="hljs-keyword">in</span> numbers:
    total = total + num
    count = count + <span class="hljs-number">1</span>

average = total / count
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Average: <span class="hljs-subst">{average:<span class="hljs-number">.2</span>f}</span>&#x27;</span>)  <span class="hljs-comment"># Output: 16.00</span>
</code></pre>
<p>Format to two decimal places for clarity. Watch for division by zero if the list could be empty.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="POSIX">
<h2 id="demo--number-statistics-program">Demo — Number Statistics Program</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Number Statistics Program</span>
<span class="hljs-comment"># Source: Day7_Hour4_Basics.md, section 4</span>

numbers = [<span class="hljs-number">10</span>, <span class="hljs-number">5</span>, <span class="hljs-number">20</span>, <span class="hljs-number">15</span>, <span class="hljs-number">30</span>]

total = <span class="hljs-number">0</span>
count = <span class="hljs-number">0</span>
minimum = numbers[<span class="hljs-number">0</span>]
maximum = numbers[<span class="hljs-number">0</span>]

<span class="hljs-keyword">for</span> num <span class="hljs-keyword">in</span> numbers[<span class="hljs-number">1</span>:]:
    total = total + num
    count = count + <span class="hljs-number">1</span>
    <span class="hljs-keyword">if</span> num &lt; minimum:
        minimum = num
    <span class="hljs-keyword">if</span> num &gt; maximum:
        maximum = num

<span class="hljs-comment"># Add back the first number (used for min/max init but not yet in total)</span>
total = total + numbers[<span class="hljs-number">0</span>]
count = count + <span class="hljs-number">1</span>

average = total / count

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Min: <span class="hljs-subst">{minimum:<span class="hljs-number">.1</span>f}</span>&#x27;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Max: <span class="hljs-subst">{maximum:<span class="hljs-number">.1</span>f}</span>&#x27;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Sum: <span class="hljs-subst">{total:<span class="hljs-number">.1</span>f}</span>&#x27;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&#x27;Average: <span class="hljs-subst">{average:<span class="hljs-number">.2</span>f}</span>&#x27;</span>)
</code></pre>
<p>Expected: <code>Min: 5.0</code>, <code>Max: 30.0</code>, <code>Sum: 80.0</code>, <code>Average: 16.00</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" lang="POSIX">
<h2 id="lab--number-statistics">Lab — Number Statistics</h2>
<p><strong>Time: 25 minutes</strong></p>
<p><strong>Starter data:</strong> <code>numbers = [12, 8, 25, 9, 18, 14, 22]</code></p>
<p><strong>Task:</strong> Complete a statistics program for this list.</p>
<p><strong>Steps:</strong></p>
<ol>
<li>Initialize <code>total = 0</code>, <code>count = 0</code>, <code>minimum = numbers[0]</code>, <code>maximum = numbers[0]</code></li>
<li>Write a for loop — update total, count, minimum, and maximum for every number</li>
<li>Calculate <code>average = total / count</code> after the loop</li>
<li>Print: Minimum, Maximum, Sum, Average</li>
</ol>
<p><strong>Completion Criteria:</strong></p>
<ul>
<li>Output matches: <code>Minimum: 8.0</code>, <code>Maximum: 25.0</code>, <code>Sum: 108.0</code>, <code>Average: 15.43</code></li>
<li>min/max initialized to <code>numbers[0]</code>, not to 0</li>
<li>Average computed after the loop, formatted to 2 decimal places</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="POSIX">
<h2 id="common-pitfalls--hour-28">Common Pitfalls — Hour 28</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Counter increments every iteration</strong> — increment is outside the <code>if</code> block; move it inside so it only counts matching items</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Min/Max initialized to 0</strong> — if all values are positive, <code>minimum</code> stays 0, which was never in the list; use <code>numbers[0]</code></p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Average calculated inside the loop</strong> — total and count are incomplete mid-loop; compute average only after the loop ends</p>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>First number missing from total</strong> — if you start the loop at <code>numbers[1:]</code>, remember to add <code>numbers[0]</code> to total and count afterward</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="POSIX">
<h2 id="quick-check--hour-28">Quick Check — Hour 28</h2>
<p><strong>Question 1:</strong> In a counter pattern, does the increment go inside or outside the <code>if</code> block?</p>
<p><strong>Question 2:</strong> You have a list of test scores. To find the lowest score, do you initialize <code>minimum</code> to 0 or to the first score?</p>
<p><strong>Question 3:</strong> Why do we compute the average after the loop, not inside it?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" lang="POSIX">
<h1 id="session-7-wrap-up">Session 7 Wrap-Up</h1>
<h2 id="what-we-covered-today">What We Covered Today</h2>
<h3 id="hour-25--conditionals">Hour 25 — Conditionals</h3>
<ul>
<li>if/elif/else; first match wins rule</li>
<li>Condition ordering: most specific to least specific</li>
<li>Boundary values: <code>&lt;=</code> vs <code>&lt;</code>, testing at exact boundary inputs</li>
</ul>
<h3 id="hour-26--while-loops">Hour 26 — while Loops</h3>
<ul>
<li>Repeats as long as condition is True; update variable to avoid infinite loops</li>
<li><code>break</code> for early exit; <code>continue</code> to skip an iteration</li>
<li>Sentinel pattern: <code>while True</code> + <code>break</code></li>
</ul>
<h3 id="hour-27--for-loops">Hour 27 — for Loops</h3>
<ul>
<li>Iterates over sequences automatically; no manual counter needed</li>
<li><code>range(n)</code>, <code>range(start, stop)</code>, <code>range(start, stop, step)</code></li>
<li>Exclusive endpoints; nested for loops for tables</li>
</ul>
<h3 id="hour-28--loop-patterns">Hour 28 — Loop Patterns</h3>
<ul>
<li>Counter, accumulator, min/max, and average patterns</li>
<li>Initialize min/max to <code>numbers[0]</code>, not 0</li>
<li>Compute average after — never inside — the loop</li>
</ul>
</section>
