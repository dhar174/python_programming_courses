</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="POSIX">
<h1 id="hour-17-tuples--unpacking">Hour 17: Tuples + Unpacking</h1>
<h2 id="learning-outcomes">Learning Outcomes</h2>
<ul>
<li>Create a tuple and explain why it differs from a list</li>
<li>Demonstrate immutability by triggering a <code>TypeError</code></li>
<li>Unpack a tuple's values into named variables in one line</li>
<li>Choose between tuple and list based on the use case</li>
<li>Build a coordinate-tracking program using tuples in a list</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="POSIX">
<h2 id="what-is-a-tuple">What Is a Tuple?</h2>
<h3 id="three-defining-properties">Three defining properties</h3>
<ul>
<li><strong>Ordered</strong> — items have positions (first, second, third…)</li>
<li><strong>Immutable</strong> — cannot be changed after creation</li>
<li><strong>Collection</strong> — one variable holds multiple related values</li>
</ul>
<blockquote>
<p>If a list is a whiteboard you can erase, a tuple is a <strong>laminated card</strong> — readable, passable, but never rewritable.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="POSIX">
<h2 id="tuple-literal-syntax">Tuple Literal Syntax</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Two-element tuple</span>
point = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)
<span class="hljs-built_in">print</span>(point)         <span class="hljs-comment"># (3, 7)</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(point))   <span class="hljs-comment"># &lt;class &#x27;tuple&#x27;&gt;</span>

<span class="hljs-comment"># Tuples can hold multiple types</span>
date = (<span class="hljs-number">2024</span>, <span class="hljs-number">6</span>, <span class="hljs-number">15</span>)
colour = (<span class="hljs-number">255</span>, <span class="hljs-number">128</span>, <span class="hljs-number">0</span>)
measurement = (<span class="hljs-number">34.5</span>, <span class="hljs-string">&quot;celsius&quot;</span>)
</code></pre>
<h3 id="indexing-works-exactly-like-lists">Indexing works exactly like lists</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">point = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)
<span class="hljs-built_in">print</span>(point[<span class="hljs-number">0</span>])   <span class="hljs-comment"># 3</span>
<span class="hljs-built_in">print</span>(point[<span class="hljs-number">1</span>])   <span class="hljs-comment"># 7</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="POSIX">
<h2 id="the-single-element-trap">The Single-Element Trap</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/274c.svg" data-marp-twemoji=""/> NOT a tuple — Python reads () as math grouping</span>
not_a_tuple = (<span class="hljs-number">42</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(not_a_tuple))   <span class="hljs-comment"># &lt;class &#x27;int&#x27;&gt;</span>

<span class="hljs-comment"># ✓ The trailing comma is what makes it a tuple</span>
actually_a_tuple = (<span class="hljs-number">42</span>,)
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(actually_a_tuple))   <span class="hljs-comment"># &lt;class &#x27;tuple&#x27;&gt;</span>
</code></pre>
<blockquote>
<p><strong>Rule:</strong> the <em>comma</em> makes the tuple, not the parentheses.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="POSIX">
<h2 id="immutability-why-tuples-cannot-change">Immutability: Why Tuples Cannot Change</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">point = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)
point[<span class="hljs-number">0</span>] = <span class="hljs-number">99</span>   <span class="hljs-comment"># <img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f534.svg" data-marp-twemoji=""/> TypeError!</span>
<span class="hljs-comment"># TypeError: &#x27;tuple&#x27; object does not support item assignment</span>
</code></pre>
<h3 id="what-you-can-do-with-a-tuple">What you <em>can</em> do with a tuple</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">point = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)

<span class="hljs-built_in">print</span>(point[<span class="hljs-number">0</span>])         <span class="hljs-comment"># read by index</span>
<span class="hljs-built_in">print</span>(<span class="hljs-number">3</span> <span class="hljs-keyword">in</span> point)       <span class="hljs-comment"># membership check → True</span>
<span class="hljs-keyword">for</span> value <span class="hljs-keyword">in</span> point:     <span class="hljs-comment"># iterate</span>
    <span class="hljs-built_in">print</span>(value)
</code></pre>
<blockquote>
<p>Immutability = <strong>protection</strong> (prevents accidental changes) + <strong>communication</strong> (signals &quot;this data is fixed&quot;)</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="POSIX">
<h2 id="tuple-unpacking">Tuple Unpacking</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Instead of point[0] and point[1]:</span>
point = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)
x, y = point

<span class="hljs-built_in">print</span>(x)   <span class="hljs-comment"># 3</span>
<span class="hljs-built_in">print</span>(y)   <span class="hljs-comment"># 7</span>
</code></pre>
<h3 id="count-must-match-exactly">Count must match exactly</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">point = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)
<span class="hljs-comment"># x, y, z = point  # <img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f534.svg" data-marp-twemoji=""/> ValueError: not enough values to unpack</span>
</code></pre>
<h3 id="unpacking-any-tuple">Unpacking any tuple</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">date = (<span class="hljs-number">2024</span>, <span class="hljs-number">6</span>, <span class="hljs-number">15</span>)
year, month, day = date

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Year: <span class="hljs-subst">{year}</span>, Month: <span class="hljs-subst">{month}</span>, Day: <span class="hljs-subst">{day}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="POSIX">
<h2 id="swap-trick--ignoring-values">Swap Trick + Ignoring Values</h2>
<h3 id="the-pythonic-swap-no-temp-variable-needed">The Pythonic swap (no temp variable needed)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">a = <span class="hljs-number">10</span>
b = <span class="hljs-number">20</span>
a, b = b, a
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;a=<span class="hljs-subst">{a}</span>, b=<span class="hljs-subst">{b}</span>&quot;</span>)   <span class="hljs-comment"># a=20, b=10</span>
</code></pre>
<h3 id="ignoring-a-value-with-_">Ignoring a value with <code>_</code></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">measurement = (<span class="hljs-number">34.5</span>, <span class="hljs-string">&quot;celsius&quot;</span>)
value, _ = measurement   <span class="hljs-comment"># _ signals &quot;I don&#x27;t need this&quot;</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Temperature: <span class="hljs-subst">{value}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="POSIX">
<h2 id="tuple-vs-list-decision-guide">Tuple vs List: Decision Guide</h2>
<table>
<thead>
<tr>
<th>Situation</th>
<th>Best choice</th>
</tr>
</thead>
<tbody>
<tr>
<td>Shopping cart (items added/removed)</td>
<td><strong>List</strong></td>
</tr>
<tr>
<td>An <code>(x, y)</code> coordinate</td>
<td><strong>Tuple</strong></td>
</tr>
<tr>
<td>A date <code>(year, month, day)</code></td>
<td><strong>Tuple</strong></td>
</tr>
<tr>
<td>A series of test scores</td>
<td><strong>List</strong></td>
</tr>
<tr>
<td>RGB colour <code>(255, 128, 0)</code></td>
<td><strong>Tuple</strong></td>
</tr>
<tr>
<td>User messages accumulating</td>
<td><strong>List</strong></td>
</tr>
<tr>
<td>Function returning two results</td>
<td><strong>Tuple</strong></td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>Rule of thumb:</strong> things that <em>accumulate</em> → list; fixed <em>records</em> with known parts → tuple.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="POSIX">

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Part 1 — Create and read coordinate tuples</span>
origin = (<span class="hljs-number">0</span>, <span class="hljs-number">0</span>)
home = (<span class="hljs-number">3</span>, <span class="hljs-number">7</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_midpoint</span>(<span class="hljs-params">a, b</span>):

mid_x, mid_y = get_midpoint(home, destination)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Mid x=<span class="hljs-subst">{mid_x}</span>, Mid y=<span class="hljs-subst">{mid_y}</span>&quot;</span>)

<span class="hljs-comment"># Part 4 — List of tuples</span>
path = [(<span class="hljs-number">0</span>, <span class="hljs-number">0</span>), (<span class="hljs-number">1</span>, <span class="hljs-number">3</span>), (<span class="hljs-number">4</span>, <span class="hljs-number">2</span>), (<span class="hljs-number">6</span>, <span class="hljs-number">8</span>)]
<span class="hljs-keyword">for</span> point <span class="hljs-keyword">in</span> path:

    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;  x=<span class="hljs-subst">{x}</span>, y=<span class="hljs-subst">{y}</span>&quot;</span>)

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="POSIX">

<h2 id="common-pitfalls-hour-17">Common Pitfalls (Hour 17)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>(42)</code> is an <code>int</code> — single-element tuple needs a trailing comma: <code>(42,)</code><br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>x, y, z = (3, 7)</code> → <code>ValueError</code>: variable count must match tuple length<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Trying to reassign <code>point[0] = 99</code> → <code>TypeError</code><br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Using a list <code>[3, 7]</code> when a tuple <code>(3, 7)</code> is the clearer choice for a fixed record</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="POSIX">
<h1 id="hour-18-sets--uniqueness--membership">Hour 18: Sets — Uniqueness + Membership</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Create a set using a literal and the <code>set()</code> constructor</li>
<li>Add items with <code>add()</code> and remove safely with <code>discard()</code></li>
<li>Check membership with <code>in</code> and explain why sets are fast</li>
<li>Use union (<code>|</code>), intersection (<code>&amp;</code>), and difference (<code>-</code>)</li>
<li>Build the Unique Visitors program</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="POSIX">
<h2 id="what-is-a-set">What Is a Set?</h2>
<h3 id="the-bag-of-unique-tags-analogy">The bag-of-unique-tags analogy</h3>
<blockquote>
<p>A set is like a bag where each tag must be unique. If you drop in a tag that already exists, the bag rejects it — silently.</p>
</blockquote>
<h3 id="lists-vs-sets-at-a-glance">Lists vs Sets at a glance</h3>
<table>
<thead>
<tr>
<th>Feature</th>
<th>List</th>
<th>Set</th>
</tr>
</thead>
<tbody>
<tr>
<td>Ordered</td>
<td>✓</td>
<td>✗</td>
</tr>
<tr>
<td>Allows duplicates</td>
<td>✓</td>
<td>✗</td>
</tr>
<tr>
<td>Fast membership check</td>
<td>slower</td>
<td><strong>faster</strong></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="POSIX">
<h2 id="creating-sets">Creating Sets</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Set literal — curly braces, comma-separated</span>
fruits = {<span class="hljs-string">&quot;apple&quot;</span>, <span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;cherry&quot;</span>}
<span class="hljs-built_in">print</span>(fruits)          <span class="hljs-comment"># order may vary!</span>

<span class="hljs-comment"># Duplicates are silently discarded</span>
colours = {<span class="hljs-string">&quot;red&quot;</span>, <span class="hljs-string">&quot;blue&quot;</span>, <span class="hljs-string">&quot;red&quot;</span>, <span class="hljs-string">&quot;green&quot;</span>, <span class="hljs-string">&quot;blue&quot;</span>}
<span class="hljs-built_in">print</span>(colours)         <span class="hljs-comment"># {&#x27;red&#x27;, &#x27;blue&#x27;, &#x27;green&#x27;}</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">len</span>(colours))    <span class="hljs-comment"># 3</span>

<span class="hljs-comment"># Convert a list to a set — the duplicate-removal pattern</span>
names_list = [<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>, <span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Carol&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>]
unique_names = <span class="hljs-built_in">set</span>(names_list)
<span class="hljs-built_in">print</span>(unique_names)    <span class="hljs-comment"># {&#x27;Alice&#x27;, &#x27;Bob&#x27;, &#x27;Carol&#x27;}</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">len</span>(unique_names))  <span class="hljs-comment"># 3</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="POSIX">
<h2 id="the-empty-set-trap">The Empty Set Trap</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/274c.svg" data-marp-twemoji=""/> This creates an empty DICTIONARY, not a set</span>
wrong = {}
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(wrong))   <span class="hljs-comment"># &lt;class &#x27;dict&#x27;&gt;</span>

<span class="hljs-comment"># ✓ Empty set MUST use set()</span>
correct = <span class="hljs-built_in">set</span>()
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(correct))  <span class="hljs-comment"># &lt;class &#x27;set&#x27;&gt;</span>
</code></pre>
<blockquote>
<p><strong>Rule:</strong> <code>{}</code> = empty dict. <code>set()</code> = empty set. Always.</p>
</blockquote>
<h3 id="sets-only-hold-hashable-values">Sets only hold hashable values</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">valid_set = {<span class="hljs-string">&quot;hello&quot;</span>, <span class="hljs-number">42</span>, (<span class="hljs-number">1</span>, <span class="hljs-number">2</span>)}   <span class="hljs-comment"># ✓ strings, ints, tuples</span>

<span class="hljs-comment"># invalid_set = {[1, 2, 3]}         # <img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f534.svg" data-marp-twemoji=""/> TypeError: unhashable type: &#x27;list&#x27;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="POSIX">
<h2 id="adding-and-removing-items">Adding and Removing Items</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">visitors = {<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>}

<span class="hljs-comment"># add() — duplicate add does nothing</span>
visitors.add(<span class="hljs-string">&quot;Carol&quot;</span>)
visitors.add(<span class="hljs-string">&quot;Alice&quot;</span>)   <span class="hljs-comment"># already there; no error, no duplicate</span>
<span class="hljs-built_in">print</span>(visitors)         <span class="hljs-comment"># {&#x27;Alice&#x27;, &#x27;Bob&#x27;, &#x27;Carol&#x27;}</span>

<span class="hljs-comment"># discard() — safe removal (no error if missing)</span>
visitors.discard(<span class="hljs-string">&quot;Zara&quot;</span>)    <span class="hljs-comment"># Zara not there; no crash</span>
visitors.discard(<span class="hljs-string">&quot;Bob&quot;</span>)     <span class="hljs-comment"># Bob is there; removed</span>

<span class="hljs-comment"># remove() — raises KeyError if item not found</span>
<span class="hljs-keyword">try</span>:
    visitors.remove(<span class="hljs-string">&quot;Zara&quot;</span>)
<span class="hljs-keyword">except</span> KeyError <span class="hljs-keyword">as</span> e:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;KeyError: <span class="hljs-subst">{e}</span>&quot;</span>)
</code></pre>
<blockquote>
<p><strong>Rule of thumb:</strong> when unsure if the item exists, use <code>discard()</code>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="POSIX">
<h2 id="membership-checks">Membership Checks</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">approved = {<span class="hljs-string">&quot;alice&quot;</span>, <span class="hljs-string">&quot;bob&quot;</span>, <span class="hljs-string">&quot;carol&quot;</span>, <span class="hljs-string">&quot;david&quot;</span>}

<span class="hljs-comment"># in operator — reads like English</span>
<span class="hljs-keyword">if</span> <span class="hljs-string">&quot;carol&quot;</span> <span class="hljs-keyword">in</span> approved:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Welcome, carol!&quot;</span>)

<span class="hljs-keyword">if</span> <span class="hljs-string">&quot;zara&quot;</span> <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> approved:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Access denied.&quot;</span>)
</code></pre>
<h3 id="why-sets-are-faster-than-lists-for-membership">Why sets are faster than lists for membership</h3>
<ul>
<li><strong>List <code>in</code></strong>: scans item-by-item from the start</li>
<li><strong>Set <code>in</code></strong>: uses <em>hashing</em> — jumps directly to the answer</li>
</ul>
<blockquote>
<p><strong>Pattern:</strong> If you check membership many times and don't need order or duplicates → <strong>use a set</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="POSIX">
<h2 id="set-operations">Set Operations</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">python_workshop = {<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>, <span class="hljs-string">&quot;Carol&quot;</span>, <span class="hljs-string">&quot;David&quot;</span>, <span class="hljs-string">&quot;Eva&quot;</span>}
data_workshop   = {<span class="hljs-string">&quot;Carol&quot;</span>, <span class="hljs-string">&quot;Eva&quot;</span>, <span class="hljs-string">&quot;Frank&quot;</span>, <span class="hljs-string">&quot;Grace&quot;</span>, <span class="hljs-string">&quot;David&quot;</span>}

<span class="hljs-comment"># Union | — everyone in either group</span>
all_students = python_workshop | data_workshop
<span class="hljs-comment"># {&#x27;Alice&#x27;, &#x27;Bob&#x27;, &#x27;Carol&#x27;, &#x27;David&#x27;, &#x27;Eva&#x27;, &#x27;Frank&#x27;, &#x27;Grace&#x27;}</span>

<span class="hljs-comment"># Intersection &amp; — only those in BOTH groups</span>
attended_both = python_workshop &amp; data_workshop
<span class="hljs-comment"># {&#x27;Carol&#x27;, &#x27;Eva&#x27;, &#x27;David&#x27;}</span>

<span class="hljs-comment"># Difference - — in first but NOT in second</span>
python_only = python_workshop - data_workshop
<span class="hljs-comment"># {&#x27;Alice&#x27;, &#x27;Bob&#x27;}</span>
</code></pre>
<table>
<thead>
<tr>
<th>Operator</th>
<th>Question answered</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>|</code></td>
<td>Who is in either group?</td>
</tr>
<tr>
<td><code>&amp;</code></td>
<td>Who is in all groups?</td>
</tr>
<tr>
<td><code>-</code></td>
<td>Who is in first but not second?</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="POSIX">
<h2 id="sets-are-unordered--use-sorted">Sets Are Unordered — Use <code>sorted()</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">tags = {<span class="hljs-string">&quot;python&quot;</span>, <span class="hljs-string">&quot;beginner&quot;</span>, <span class="hljs-string">&quot;coding&quot;</span>, <span class="hljs-string">&quot;tutorial&quot;</span>}

<span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/274c.svg" data-marp-twemoji=""/> Order is unpredictable — don&#x27;t rely on it</span>
<span class="hljs-built_in">print</span>(tags)              <span class="hljs-comment"># {&#x27;free&#x27;, &#x27;beginner&#x27;, ...} varies</span>

<span class="hljs-comment"># ✓ Use sorted() for consistent display</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">sorted</span>(tags))      <span class="hljs-comment"># [&#x27;beginner&#x27;, &#x27;coding&#x27;, &#x27;python&#x27;, &#x27;tutorial&#x27;]</span>

<span class="hljs-comment"># Loop over a set in sorted order</span>
<span class="hljs-keyword">for</span> tag <span class="hljs-keyword">in</span> <span class="hljs-built_in">sorted</span>(tags):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;  - <span class="hljs-subst">{tag}</span>&quot;</span>)
</code></pre>
<blockquote>
<p><code>sorted()</code> returns a <strong>new list</strong> — your set is unchanged.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="POSIX">
<h2 id="demo-list-of-names-%E2%86%92-set">Demo: List of Names → Set</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Conference sign-in sheet (with duplicates)</span>
sign_ins = [
    <span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>, <span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Carol&quot;</span>,
    <span class="hljs-string">&quot;Bob&quot;</span>, <span class="hljs-string">&quot;David&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>, <span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Eva&quot;</span>, <span class="hljs-string">&quot;Carol&quot;</span>,
]

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Total sign-ins: <span class="hljs-subst">{<span class="hljs-built_in">len</span>(sign_ins)}</span>&quot;</span>)   <span class="hljs-comment"># 10</span>

<span class="hljs-comment"># One call removes all duplicates</span>
unique_visitors = <span class="hljs-built_in">set</span>(sign_ins)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Unique attendees: <span class="hljs-subst">{<span class="hljs-built_in">len</span>(unique_visitors)}</span>&quot;</span>)  <span class="hljs-comment"># 5</span>

<span class="hljs-comment"># Display sorted</span>
<span class="hljs-keyword">for</span> name <span class="hljs-keyword">in</span> <span class="hljs-built_in">sorted</span>(unique_visitors):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;  - <span class="hljs-subst">{name}</span>&quot;</span>)

<span class="hljs-comment"># Membership check</span>
<span class="hljs-keyword">if</span> <span class="hljs-string">&quot;Alice&quot;</span> <span class="hljs-keyword">in</span> unique_visitors:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Alice attended.&quot;</span>)
<span class="hljs-keyword">if</span> <span class="hljs-string">&quot;Zara&quot;</span> <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> unique_visitors:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Zara did NOT attend.&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="POSIX">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="POSIX">
<h2 id="common-pitfalls-hour-18">Common Pitfalls (Hour 18)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>{}</code> creates a dict — use <code>set()</code> for an empty set<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Iterating a set without <code>sorted()</code> gives unpredictable output order<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Trying to put a list inside a set → <code>TypeError: unhashable type</code><br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Modifying a set while looping over it → <code>RuntimeError</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="POSIX">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="POSIX">
<h1 id="hour-19-dictionary-fundamentals">Hour 19: Dictionary Fundamentals</h1>
<h2 id="learning-outcomes-2">Learning Outcomes</h2>
<ul>
<li>Create a dictionary with literal syntax and <code>dict()</code></li>
<li>Access values by key and explain <code>KeyError</code></li>
<li>Add new entries and update existing ones</li>
<li>Use <code>get(key)</code> and <code>get(key, default)</code> for safe access</li>
<li>Build an interactive Inventory Manager without crashing on missing keys</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="POSIX">
<h2 id="what-is-a-dictionary">What Is a Dictionary?</h2>
<h3 id="the-real-world-analogy">The real-world analogy</h3>
<blockquote>
<p>Like a physical dictionary: the <strong>word</strong> is the key, the <strong>definition</strong> is the value. You jump straight to the entry — no scanning every page.</p>
</blockquote>
<h3 id="key-%E2%86%92-value-mental-model">Key → Value mental model</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>&quot;apples&quot;   →   12
&quot;bananas&quot;  →    5
&quot;oranges&quot;  →    8
&quot;pears&quot;    →    3
&quot;grapes&quot;   →   20
</code></pre>
<blockquote>
<p>Two parallel lists break when one is sorted or re-ordered. A dictionary keeps each pair <strong>locked together</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="POSIX">
<h2 id="creating-a-dictionary">Creating a Dictionary</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Dictionary literal: {key: value, ...}</span>
inventory: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">int</span>] = {
    <span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>,
    <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>,
    <span class="hljs-string">&quot;oranges&quot;</span>: <span class="hljs-number">8</span>,
    <span class="hljs-string">&quot;pears&quot;</span>: <span class="hljs-number">3</span>,
    <span class="hljs-string">&quot;grapes&quot;</span>: <span class="hljs-number">20</span>,
}

<span class="hljs-built_in">print</span>(inventory)
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">len</span>(inventory))   <span class="hljs-comment"># 5</span>

<span class="hljs-comment"># dict() constructor — keys must be valid identifiers</span>
scores = <span class="hljs-built_in">dict</span>(alice=<span class="hljs-number">95</span>, bob=<span class="hljs-number">87</span>, carol=<span class="hljs-number">91</span>)

<span class="hljs-comment"># Empty dictionary — {} is safe here (not a set!)</span>
empty: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">int</span>] = {}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="POSIX">
<h2 id="reading-values-by-key">Reading Values by Key</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">inventory = {<span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>, <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>, <span class="hljs-string">&quot;oranges&quot;</span>: <span class="hljs-number">8</span>}

<span class="hljs-comment"># Bracket notation — fast, direct</span>
<span class="hljs-built_in">print</span>(inventory[<span class="hljs-string">&quot;apples&quot;</span>])    <span class="hljs-comment"># 12</span>
<span class="hljs-built_in">print</span>(inventory[<span class="hljs-string">&quot;bananas&quot;</span>])   <span class="hljs-comment"># 5</span>

<span class="hljs-comment"># <img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f534.svg" data-marp-twemoji=""/> KeyError if key is missing</span>
<span class="hljs-built_in">print</span>(inventory[<span class="hljs-string">&quot;mangoes&quot;</span>])
<span class="hljs-comment"># KeyError: &#x27;mangoes&#x27;</span>
</code></pre>
<blockquote>
<p>A <code>KeyError</code> means: &quot;I searched the whole dictionary and found no key called that.&quot; The program stops. We fix this with <code>get()</code> in the next slide.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="POSIX">
<h2 id="adding-and-updating-entries">Adding and Updating Entries</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">inventory = {<span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>, <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>}

<span class="hljs-comment"># Add a new key — same syntax as update</span>
inventory[<span class="hljs-string">&quot;mangoes&quot;</span>] = <span class="hljs-number">7</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">len</span>(inventory))          <span class="hljs-comment"># 3</span>

<span class="hljs-comment"># Update an existing key</span>
inventory[<span class="hljs-string">&quot;apples&quot;</span>] = <span class="hljs-number">22</span>       <span class="hljs-comment"># overwrites 12</span>
<span class="hljs-built_in">print</span>(inventory[<span class="hljs-string">&quot;apples&quot;</span>])     <span class="hljs-comment"># 22</span>

<span class="hljs-comment"># Compound assignment — very common for counters</span>
inventory[<span class="hljs-string">&quot;apples&quot;</span>] += <span class="hljs-number">10</span>      <span class="hljs-comment"># 22 + 10 = 32</span>

<span class="hljs-comment"># in operator checks KEYS</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;apples&quot;</span> <span class="hljs-keyword">in</span> inventory)   <span class="hljs-comment"># True</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;durians&quot;</span> <span class="hljs-keyword">in</span> inventory)  <span class="hljs-comment"># False</span>
</code></pre>
<blockquote>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> A typo in a key <em>silently creates a new entry</em> — no error raised.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="POSIX">
<h2 id="safe-access-with-get">Safe Access with <code>get()</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">inventory = {<span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>, <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>}

<span class="hljs-comment"># get(key) → returns None if key missing (no crash)</span>
result = inventory.get(<span class="hljs-string">&quot;mangoes&quot;</span>)
<span class="hljs-built_in">print</span>(result)           <span class="hljs-comment"># None</span>

<span class="hljs-comment"># get(key, default) → returns your fallback value</span>
count = inventory.get(<span class="hljs-string">&quot;mangoes&quot;</span>, <span class="hljs-number">0</span>)
<span class="hljs-built_in">print</span>(count)            <span class="hljs-comment"># 0</span>

count = inventory.get(<span class="hljs-string">&quot;apples&quot;</span>, <span class="hljs-number">0</span>)
<span class="hljs-built_in">print</span>(count)            <span class="hljs-comment"># 12  (default ignored when key exists)</span>
</code></pre>
<h3 id="three-patterns-side-by-side">Three patterns side by side</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 1. Bracket — use when key is CERTAIN to exist</span>
qty = inventory[<span class="hljs-string">&quot;apples&quot;</span>]

<span class="hljs-comment"># 2. in-check — explicit two-step</span>
<span class="hljs-keyword">if</span> <span class="hljs-string">&quot;apples&quot;</span> <span class="hljs-keyword">in</span> inventory:
    qty = inventory[<span class="hljs-string">&quot;apples&quot;</span>]

<span class="hljs-comment"># 3. get() — concise and safe (preferred default)</span>
qty = inventory.get(<span class="hljs-string">&quot;apples&quot;</span>, <span class="hljs-number">0</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="POSIX">
<h2 id="removing-entries">Removing Entries</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">inventory = {<span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>, <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>, <span class="hljs-string">&quot;pears&quot;</span>: <span class="hljs-number">3</span>}

<span class="hljs-comment"># del — direct removal (KeyError if missing)</span>
<span class="hljs-keyword">del</span> inventory[<span class="hljs-string">&quot;pears&quot;</span>]

<span class="hljs-comment"># pop() — remove AND return the value</span>
removed = inventory.pop(<span class="hljs-string">&quot;bananas&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Removed bananas, quantity was: <span class="hljs-subst">{removed}</span>&quot;</span>)

<span class="hljs-comment"># pop() with a default — safe even if key is missing</span>
missing = inventory.pop(<span class="hljs-string">&quot;durians&quot;</span>, <span class="hljs-number">0</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Removed durians: <span class="hljs-subst">{missing}</span>&quot;</span>)   <span class="hljs-comment"># 0, no crash</span>

<span class="hljs-comment"># clear() — empty the entire dictionary</span>
temp = {<span class="hljs-string">&quot;a&quot;</span>: <span class="hljs-number">1</span>, <span class="hljs-string">&quot;b&quot;</span>: <span class="hljs-number">2</span>}
temp.clear()
<span class="hljs-built_in">print</span>(temp)   <span class="hljs-comment"># {}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="POSIX">
<h2 id="keys-must-be-unique-and-hashable">Keys Must Be Unique and Hashable</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Duplicate key in a literal — LAST value wins silently</span>
prices = {
    <span class="hljs-string">&quot;apple&quot;</span>: <span class="hljs-number">1.20</span>,
    <span class="hljs-string">&quot;banana&quot;</span>: <span class="hljs-number">0.50</span>,
    <span class="hljs-string">&quot;apple&quot;</span>: <span class="hljs-number">2.50</span>,   <span class="hljs-comment"># <img class="emoji" draggable="false" alt="⚠" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> duplicate!</span>
}
<span class="hljs-built_in">print</span>(prices)   <span class="hljs-comment"># {&#x27;apple&#x27;: 2.50, &#x27;banana&#x27;: 0.50} — 1.20 is gone</span>

<span class="hljs-comment"># Valid key types: str, int, float, bool, tuple (if all elements hashable)</span>
d = {<span class="hljs-string">&quot;name&quot;</span>: <span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-number">42</span>: <span class="hljs-string">&quot;answer&quot;</span>, (<span class="hljs-number">1</span>, <span class="hljs-number">2</span>): <span class="hljs-string">&quot;coord&quot;</span>}

<span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/274c.svg" data-marp-twemoji=""/> Lists cannot be keys — mutable = unhashable</span>
<span class="hljs-comment"># bad = {[1, 2]: &quot;value&quot;}   # TypeError: unhashable type: &#x27;list&#x27;</span>
</code></pre>
<blockquote>
<p>For Basics: use <strong>string or integer keys</strong> — always safe and clear.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="POSIX">
<h2 id="demo-inventory-dictionary">Demo: Inventory Dictionary</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Step 1 — Create</span>

<h2 id="common-pitfalls-hour-19">Common Pitfalls (Hour 19)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Bare bracket <code>d[&quot;key&quot;]</code> on user-supplied key → <code>KeyError</code> if missing<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>'Apples'</code> ≠ <code>'apples'</code> — keys are case-sensitive; use <code>.lower()</code><br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Typo in key name silently creates a ghost entry<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Duplicate key in literal silently overwrites the earlier value<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>{}</code> is an empty dict — remember <code>set()</code> for an empty set</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="POSIX">
<h1 id="hour-20-dictionary-iteration--counting-pattern">Hour 20: Dictionary Iteration + Counting Pattern</h1>
<h2 id="learning-outcomes-3">Learning Outcomes</h2>
<ul>
<li>Iterate over keys, values, and key-value pairs using <code>keys()</code>, <code>values()</code>, <code>items()</code></li>
<li>Explain what <code>dict.items()</code> returns and why tuple unpacking makes it readable</li>
<li>Write the frequency-counting loop using <code>d.get(word, 0) + 1</code></li>
<li>Sort and display results with <code>sorted(d.items())</code> and aligned f-strings</li>
<li>Build a complete Word Counter program</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="POSIX">
<h2 id="the-three-iteration-views">The Three Iteration Views</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">inventory = {<span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>, <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>, <span class="hljs-string">&quot;oranges&quot;</span>: <span class="hljs-number">8</span>}

<span class="hljs-comment"># .keys() — just the keys</span>
<span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> inventory.keys():
    <span class="hljs-built_in">print</span>(item)   <span class="hljs-comment"># apples, bananas, oranges</span>

<span class="hljs-comment"># .values() — just the values</span>
total = <span class="hljs-number">0</span>
<span class="hljs-keyword">for</span> qty <span class="hljs-keyword">in</span> inventory.values():
    total += qty
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Total stock: <span class="hljs-subst">{total}</span>&quot;</span>)   <span class="hljs-comment"># 25</span>

<span class="hljs-comment"># .items() — key-value pairs (the workhorse)</span>
<span class="hljs-keyword">for</span> item, qty <span class="hljs-keyword">in</span> inventory.items():
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{item}</span>: <span class="hljs-subst">{qty}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" lang="POSIX">
<h2 id="choosing-the-right-iteration-method">Choosing the Right Iteration Method</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">inventory = {<span class="hljs-string">&quot;apples&quot;</span>: <span class="hljs-number">12</span>, <span class="hljs-string">&quot;bananas&quot;</span>: <span class="hljs-number">5</span>, <span class="hljs-string">&quot;oranges&quot;</span>: <span class="hljs-number">8</span>}

<span class="hljs-comment"># Use .keys() — when you only need the keys</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Available items:&quot;</span>)
<span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> inventory.keys():
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;  - <span class="hljs-subst">{item}</span>&quot;</span>)

<span class="hljs-comment"># Use .values() — when you only need the values</span>
total = <span class="hljs-built_in">sum</span>(inventory.values())
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Total stock: <span class="hljs-subst">{total}</span>&quot;</span>)

<span class="hljs-comment"># Use .items() — when you need BOTH (most common)</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;\nFull inventory:&quot;</span>)
<span class="hljs-keyword">for</span> item, qty <span class="hljs-keyword">in</span> inventory.items():
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;  <span class="hljs-subst">{item:&lt;<span class="hljs-number">12</span>}</span> <span class="hljs-subst">{qty:&gt;<span class="hljs-number">4</span>}</span>&quot;</span>)
</code></pre>
<blockquote>
<p><code>dict.items()</code> returns a view of <code>(key, value)</code> tuples — unpacking in the loop header is cleaner than <code>pair[0]</code> / <code>pair[1]</code>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" lang="POSIX">
<h2 id="the-counting-pattern--step-1">The Counting Pattern — Step 1</h2>
<h3 id="the-problem">The problem</h3>
<p>Count how many times each word appears in a sentence. You don't know which words will appear in advance.</p>
<h3 id="two-cases-per-word">Two cases per word</h3>
<ol>
<li><strong>First time</strong> seeing a word → add it with count <code>1</code></li>
<li><strong>Seen before</strong> → increment its count by <code>1</code></li>
</ol>
<h3 id="explicit-if-branch-approach-clear-verbose">Explicit if-branch approach (clear, verbose)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">sentence = <span class="hljs-string">&quot;the quick brown fox jumps over the lazy dog and the fox&quot;</span>
words = sentence.split()
counts = {}

<span class="hljs-keyword">for</span> word <span class="hljs-keyword">in</span> words:
    <span class="hljs-keyword">if</span> word <span class="hljs-keyword">in</span> counts:
        counts[word] = counts[word] + <span class="hljs-number">1</span>
    <span class="hljs-keyword">else</span>:
        counts[word] = <span class="hljs-number">1</span>

<span class="hljs-built_in">print</span>(counts)
<span class="hljs-comment"># {&#x27;the&#x27;: 3, &#x27;quick&#x27;: 1, &#x27;fox&#x27;: 2, ...}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" lang="POSIX">
<h2 id="the-counting-pattern--step-2-get-one-liner">The Counting Pattern — Step 2: <code>get()</code> One-Liner</h2>
<h3 id="how-getword-0-collapses-both-cases">How <code>get(word, 0)</code> collapses both cases</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>First time:   counts.get('the', 0) → 0   →  0 + 1 = 1  ✓
Second time:  counts.get('the', 0) → 1   →  1 + 1 = 2  ✓
Third time:   counts.get('the', 0) → 2   →  2 + 1 = 3  ✓
</code></pre>
<h3 id="the-canonical-counting-loop">The canonical counting loop</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">sentence = <span class="hljs-string">&quot;the quick brown fox jumps over the lazy dog and the fox&quot;</span>
words = sentence.split()
counts: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">int</span>] = {}

<span class="hljs-keyword">for</span> word <span class="hljs-keyword">in</span> words:
    counts[word] = counts.get(word, <span class="hljs-number">0</span>) + <span class="hljs-number">1</span>

<span class="hljs-built_in">print</span>(counts)
</code></pre>
<blockquote>
<p>Read aloud: <em>&quot;Set <code>counts[word]</code> to whatever is currently stored — defaulting to zero if new — plus one.&quot;</em></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" lang="POSIX">
<h2 id="sorting-and-displaying-results">Sorting and Displaying Results</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Sort alphabetically by key</span>
<span class="hljs-keyword">for</span> word, count <span class="hljs-keyword">in</span> <span class="hljs-built_in">sorted</span>(counts.items()):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{word}</span>: <span class="hljs-subst">{count}</span>&quot;</span>)

<span class="hljs-comment"># Sort by frequency — highest first</span>
<span class="hljs-keyword">for</span> word, count <span class="hljs-keyword">in</span> <span class="hljs-built_in">sorted</span>(counts.items(),
                          key=<span class="hljs-keyword">lambda</span> pair: pair[<span class="hljs-number">1</span>],
                          reverse=<span class="hljs-literal">True</span>):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{word}</span>: <span class="hljs-subst">{count}</span>&quot;</span>)
</code></pre>
<h3 id="aligned-column-output-with-f-string-format-specifiers">Aligned column output with f-string format specifiers</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{<span class="hljs-string">&#x27;Word&#x27;</span>:&lt;<span class="hljs-number">15</span>}</span> <span class="hljs-subst">{<span class="hljs-string">&#x27;Count&#x27;</span>:&gt;<span class="hljs-number">5</span>}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;-&quot;</span> * <span class="hljs-number">22</span>)
<span class="hljs-keyword">for</span> word, count <span class="hljs-keyword">in</span> <span class="hljs-built_in">sorted</span>(counts.items(),
                           key=<span class="hljs-keyword">lambda</span> pair: pair[<span class="hljs-number">1</span>], reverse=<span class="hljs-literal">True</span>):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{word:&lt;<span class="hljs-number">15</span>}</span> <span class="hljs-subst">{count:&gt;<span class="hljs-number">5</span>}</span>&quot;</span>)
</code></pre>
<blockquote>
<p><code>:&lt;15</code> = left-align in 15 chars; <code>:&gt;5</code> = right-align in 5 chars.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" lang="POSIX">
<h2 id="finding-the-most-common-item">Finding the Most Common Item</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">counts = {<span class="hljs-string">&quot;the&quot;</span>: <span class="hljs-number">3</span>, <span class="hljs-string">&quot;fox&quot;</span>: <span class="hljs-number">2</span>, <span class="hljs-string">&quot;quick&quot;</span>: <span class="hljs-number">1</span>, <span class="hljs-string">&quot;brown&quot;</span>: <span class="hljs-number">1</span>}

<span class="hljs-comment"># max() with key=counts.get — finds key with highest value</span>
most_common = <span class="hljs-built_in">max</span>(counts, key=counts.get)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Most common: &#x27;<span class="hljs-subst">{most_common}</span>&#x27; (<span class="hljs-subst">{counts[most_common]}</span> times)&quot;</span>)
<span class="hljs-comment"># Most common: &#x27;the&#x27; (3 times)</span>

<span class="hljs-comment"># Guard against empty dictionary</span>
<span class="hljs-keyword">if</span> counts:
    most_common = <span class="hljs-built_in">max</span>(counts, key=counts.get)
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Most common: &#x27;<span class="hljs-subst">{most_common}</span>&#x27;&quot;</span>)
</code></pre>
<blockquote>
<p>An empty dictionary is <strong>falsy</strong> — <code>if counts:</code> is <code>True</code> only when at least one entry exists.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" lang="POSIX">
<h2 id="demo-word-frequency-counter">Demo: Word Frequency Counter</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Step 1: Get input</span>
sentence = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter a sentence: &quot;</span>)
words = sentence.split()

<span class="hljs-comment"># Step 2: Build frequency dictionary</span>
counts: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">int</span>] = {}

<span class="hljs-comment"># Step 3: Display results</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;\nTotal words: <span class="hljs-subst">{<span class="hljs-built_in">len</span>(words)}</span> | Unique words: <span class="hljs-subst">{<span class="hljs-built_in">len</span>(counts)}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;\n<span class="hljs-subst">{<span class="hljs-string">&#x27;Word&#x27;</span>:&lt;<span class="hljs-number">15</span>}</span> <span class="hljs-subst">{<span class="hljs-string">&#x27;Count&#x27;</span>:&gt;<span class="hljs-number">5</span>}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;-&quot;</span> * <span class="hljs-number">22</span>)
<span class="hljs-keyword">for</span> word, count <span class="hljs-keyword">in</span> <span class="hljs-built_in">sorted</span>(counts.items(),
                           key=<span class="hljs-keyword">lambda</span> pair: pair[<span class="hljs-number">1</span>], reverse=<span class="hljs-literal">True</span>):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{word:&lt;<span class="hljs-number">15</span>}</span> <span class="hljs-subst">{count:&gt;<span class="hljs-number">5</span>}</span>&quot;</span>)

<span class="hljs-comment"># Step 4: Most common</span>
<span class="hljs-keyword">if</span> counts:
    top = <span class="hljs-built_in">max</span>(counts, key=counts.get)
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;\nMost common: &#x27;<span class="hljs-subst">{top}</span>&#x27; (<span class="hljs-subst">{counts[top]}</span> times)&quot;</span>)
</code></pre>
<p><strong>Try input:</strong> <code>the quick brown fox jumps over the lazy dog and the fox</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" lang="POSIX">
<h2 id="lab-word-counter">Lab: Word Counter</h2>
<p><strong>Time: 10–12 minutes</strong></p>
<h3 id="minimum-requirements">Minimum Requirements</h3>
<ol>
<li>Prompt the user to enter a sentence</li>
<li>Split it into individual words with <code>.split()</code></li>

</ol>
<h3 id="optional-extensions-finish-early">Optional Extensions (finish early?)</h3>

<li>Print the most common word</li>
<li>Print total word count vs unique word count</li>
</ul>
<h3 id="completion-criteria-3">Completion Criteria</h3>
<p>✓ Correct counts for all words<br />
✓ Uses <code>get()</code> pattern or explicit <code>if</code>-check<br />
✓ Iterates results with <code>.items()</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" lang="POSIX">
<h2 id="common-pitfalls-hour-20">Common Pitfalls (Hour 20)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>counts[word] += 1</code> on a word not yet in the dict → <code>KeyError</code> — use <code>get()</code> instead<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Printing <code>counts</code> directly instead of iterating with <code>.items()</code> — messy output<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Forgetting <code>sorted()</code> — output order is insertion order, not frequency order<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Case sensitivity: <code>'Hello'</code> ≠ <code>'hello'</code> — apply <code>.lower()</code> before counting<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/26a0.svg" data-marp-twemoji=""/> Punctuation attached to words: <code>'fox,'</code> ≠ <code>'fox'</code> — strip with <code>.replace()</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" lang="POSIX">
<h2 id="quick-check-3">Quick Check</h2>
<p><strong>Question</strong>: What does <code>counts.get('elephant', 0)</code> return if <code>'elephant'</code> was never added to <code>counts</code>? Does the call create an entry for <code>'elephant'</code>?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" lang="POSIX">
<h1 id="session-5-wrap-up">Session 5 Wrap-Up</h1>
<h2 id="what-we-covered-today">What We Covered Today</h2>
<h3 id="hour-17-tuples">Hour 17: Tuples</h3>
<ul>
<li>Ordered, immutable records — parentheses + commas</li>
<li>Unpacking into named variables; swap trick; <code>_</code> for ignored values</li>
<li>List of tuples as a natural pattern for fixed records</li>
</ul>
<h3 id="hour-18-sets">Hour 18: Sets</h3>
<ul>
<li>Unordered, unique collections — <code>set()</code>, <code>add()</code>, <code>discard()</code></li>
<li><code>in</code> for fast membership checks; <code>sorted()</code> for ordered display</li>
<li>Union <code>|</code>, intersection <code>&amp;</code>, difference <code>-</code></li>
</ul>
<h3 id="hour-19-dictionary-fundamentals-1">Hour 19: Dictionary Fundamentals</h3>
<ul>
<li>Key-value mapping — <code>dict[key]</code>, <code>dict.get(key, default)</code></li>
<li>Add/update with assignment; safe lookup avoids <code>KeyError</code></li>
</ul>
<h3 id="hour-20-dictionary-iteration--counting">Hour 20: Dictionary Iteration + Counting</h3>
<ul>
<li><code>keys()</code>, <code>values()</code>, <code>items()</code> — choose the right view</li>
<li><code>d.get(word, 0) + 1</code> — the canonical counting pattern</li>
<li><code>sorted(d.items())</code> + f-string alignment for polished output</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" lang="POSIX">
<h2 id="the-four-collection-types--summary">The Four Collection Types — Summary</h2>
<table>
<thead>
<tr>
<th>Type</th>
<th>Ordered</th>
<th>Mutable</th>
<th>Unique values</th>
<th>Best for</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>list</code></td>
<td>✓</td>
<td>✓</td>
<td>✗</td>
<td>Sequences that grow/change</td>
</tr>
<tr>
<td><code>tuple</code></td>
<td>✓</td>
<td>✗</td>
<td>✗</td>
<td>Fixed records, function returns</td>
</tr>
<tr>
<td><code>set</code></td>
<td>✗</td>
<td>✓</td>
<td>✓</td>
<td>Deduplication, fast membership</td>
</tr>
<tr>
<td><code>dict</code></td>
<td>✓*</td>
<td>✓</td>
<td>keys only</td>
<td>Key-value lookups, counting</td>
</tr>
</tbody>
</table>
<blockquote>
<p>*Dicts maintain insertion order since Python 3.7.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" lang="POSIX">
<h2 id="scope-guardrail-reminder">Scope Guardrail Reminder</h2>
<h3 id="covered-today-basics-scope-%E2%9C%93">Covered today (Basics scope ✓)</h3>
<p>✓ All four core collection types<br />
✓ <code>get()</code> for safe dict access<br />
✓ <code>d.get(word, 0) + 1</code> counting pattern<br />
✓ <code>sorted()</code> for ordered display</p>
<h3 id="not-yet-advanced-topics-%E2%9C%97">Not yet (Advanced topics ✗)</h3>
<p>✗ <code>collections.namedtuple</code> / <code>Counter</code> / <code>defaultdict</code><br />
✗ Dict/set comprehensions<br />
✗ Frozensets<br />
✗ Named tuple advanced destructuring</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" lang="POSIX">
<h2 id="homework--practice">Homework / Practice</h2>
<h3 id="recommended-exercises">Recommended Exercises</h3>
<ol>
<li>Build a <strong>grade tracker</strong>: dictionary of student → score; print sorted by score</li>
<li>Write a <strong>de-duplication tool</strong>: read a list of words, print unique ones sorted</li>
<li>Extend the Word Counter to read from a multi-line string</li>
<li>Track <strong>(x, y, z)</strong> sensor positions (3-element tuples) and find extremes</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" lang="POSIX">
<h2 id="next-session-preview">Next Session Preview</h2>

<ul>
<li>Hour 21: Functions — defining, parameters, return values</li>
<li>Hour 22: Function scope and default arguments</li>
<li>Hour 23: Modules — <code>import</code>, standard library basics</li>

<h2 id="questions">Questions?</h2>
<p><strong>Remember:</strong></p>
<ul>
<li>Tuples for fixed records, lists for growing collections</li>
<li><code>set()</code> (not <code>{}</code>) for an empty set</li>
<li>Always use <code>get()</code> when the key might be missing</li>
<li><code>sorted()</code> before displaying any set or unsorted dict</li>
</ul>
</section>
