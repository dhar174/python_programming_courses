</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<h1 id="hour-13-lists-fundamentals">Hour 13: Lists Fundamentals</h1>
<h2 id="learning-outcomes">Learning Outcomes</h2>
<ul>
<li>Explain what a list is in plain, beginner-friendly language</li>
<li>Create a list literal and print it</li>
<li>Access items with indexing (including negative indices)</li>
<li>Retrieve a portion of a list with slicing</li>
<li>Mutate a list with <code>append()</code>, <code>remove()</code>, and <code>pop()</code></li>
<li>Check whether an item is present using the <code>in</code> operator</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="en-US">
<h2 id="the-problem-lists-solve">The Problem Lists Solve</h2>
<h3 id="one-value-at-a-time--the-old-way">One value at a time — the old way</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">item_1 = <span class="hljs-string">&quot;milk&quot;</span>
item_2 = <span class="hljs-string">&quot;bread&quot;</span>
item_3 = <span class="hljs-string">&quot;eggs&quot;</span>
item_4 = <span class="hljs-string">&quot;tea&quot;</span>
item_5 = <span class="hljs-string">&quot;rice&quot;</span>
</code></pre>
<h3 id="the-list-way">The list way</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list = [<span class="hljs-string">&quot;milk&quot;</span>, <span class="hljs-string">&quot;bread&quot;</span>, <span class="hljs-string">&quot;eggs&quot;</span>, <span class="hljs-string">&quot;tea&quot;</span>, <span class="hljs-string">&quot;rice&quot;</span>]
<span class="hljs-built_in">print</span>(shopping_list)
</code></pre>
<blockquote>
<p>A list is <strong>one variable</strong> that holds <strong>multiple related values in order</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h2 id="creating-lists">Creating Lists</h2>
<h3 id="list-literal-syntax">List literal syntax</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">fruits = [<span class="hljs-string">&quot;apple&quot;</span>, <span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;cherry&quot;</span>]
<span class="hljs-built_in">print</span>(fruits)
<span class="hljs-comment"># [&#x27;apple&#x27;, &#x27;banana&#x27;, &#x27;cherry&#x27;]</span>
</code></pre>
<h3 id="empty-list-start-empty-grow-later">Empty list (start empty, grow later)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list = []
<span class="hljs-built_in">print</span>(shopping_list)   <span class="hljs-comment"># []</span>
</code></pre>
<h3 id="a-list-of-numbers">A list of numbers</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">numbers = [<span class="hljs-number">10</span>, <span class="hljs-number">20</span>, <span class="hljs-number">30</span>]
<span class="hljs-built_in">print</span>(numbers)
<span class="hljs-comment"># [10, 20, 30]</span>
</code></pre>
<p>Keep list items consistent in type for beginner clarity.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="indexing-lists">Indexing Lists</h2>
<h3 id="zero-based-positions">Zero-based positions</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">fruits = [<span class="hljs-string">&quot;apple&quot;</span>, <span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;cherry&quot;</span>]
<span class="hljs-built_in">print</span>(fruits[<span class="hljs-number">0</span>])   <span class="hljs-comment"># apple</span>
<span class="hljs-built_in">print</span>(fruits[<span class="hljs-number">1</span>])   <span class="hljs-comment"># banana</span>
<span class="hljs-built_in">print</span>(fruits[<span class="hljs-number">2</span>])   <span class="hljs-comment"># cherry</span>
</code></pre>
<h3 id="negative-indexing-count-from-the-end">Negative indexing (count from the end)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(fruits[-<span class="hljs-number">1</span>])   <span class="hljs-comment"># cherry  (last item)</span>
<span class="hljs-built_in">print</span>(fruits[-<span class="hljs-number">2</span>])   <span class="hljs-comment"># banana  (second-to-last)</span>
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Accessing an out-of-range index raises <code>IndexError</code> — stay within bounds!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="slicing-lists">Slicing Lists</h2>
<h3 id="pattern-liststartend--end-is-not-included">Pattern: <code>list[start:end]</code> — end is <strong>not</strong> included</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">letters = [<span class="hljs-string">&quot;a&quot;</span>, <span class="hljs-string">&quot;b&quot;</span>, <span class="hljs-string">&quot;c&quot;</span>, <span class="hljs-string">&quot;d&quot;</span>, <span class="hljs-string">&quot;e&quot;</span>]
<span class="hljs-built_in">print</span>(letters[<span class="hljs-number">0</span>:<span class="hljs-number">3</span>])   <span class="hljs-comment"># [&#x27;a&#x27;, &#x27;b&#x27;, &#x27;c&#x27;]</span>
<span class="hljs-built_in">print</span>(letters[<span class="hljs-number">1</span>:<span class="hljs-number">4</span>])   <span class="hljs-comment"># [&#x27;b&#x27;, &#x27;c&#x27;, &#x27;d&#x27;]</span>
<span class="hljs-built_in">print</span>(letters[:<span class="hljs-number">2</span>])    <span class="hljs-comment"># [&#x27;a&#x27;, &#x27;b&#x27;]</span>
<span class="hljs-built_in">print</span>(letters[<span class="hljs-number">2</span>:])    <span class="hljs-comment"># [&#x27;c&#x27;, &#x27;d&#x27;, &#x27;e&#x27;]</span>
</code></pre>
<h3 id="indexing-vs-slicing">Indexing vs. slicing</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(letters[<span class="hljs-number">2</span>])     <span class="hljs-comment"># &#x27;c&#x27;       — one item</span>
<span class="hljs-built_in">print</span>(letters[<span class="hljs-number">2</span>:<span class="hljs-number">4</span>])   <span class="hljs-comment"># [&#x27;c&#x27;,&#x27;d&#x27;] — a new list</span>
</code></pre>
<blockquote>
<p>Indexing gives <strong>one item</strong>; slicing gives <strong>a new list</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="lists-are-mutable">Lists Are Mutable</h2>
<h3 id="update-an-item-by-index">Update an item by index</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">fruits = [<span class="hljs-string">&quot;apple&quot;</span>, <span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;cherry&quot;</span>]
<span class="hljs-built_in">print</span>(fruits)              <span class="hljs-comment"># [&#x27;apple&#x27;, &#x27;banana&#x27;, &#x27;cherry&#x27;]</span>

fruits[<span class="hljs-number">1</span>] = <span class="hljs-string">&quot;blueberry&quot;</span>
<span class="hljs-built_in">print</span>(fruits)              <span class="hljs-comment"># [&#x27;apple&#x27;, &#x27;blueberry&#x27;, &#x27;cherry&#x27;]</span>
</code></pre>
<h3 id="strings-are-not-mutable-this-way">Strings are NOT mutable this way</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">word = <span class="hljs-string">&quot;cat&quot;</span>
<span class="hljs-comment"># word[0] = &quot;b&quot;   ← TypeError! Strings don&#x27;t allow this</span>
</code></pre>
<blockquote>
<p><strong>Mutable</strong> = the list can be changed after it is created.<br />
Lists allow item-by-item updates; strings do not.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="core-list-methods">Core List Methods</h2>
<h3 id="append--add-to-the-end"><code>append()</code> — add to the end</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list = [<span class="hljs-string">&quot;milk&quot;</span>, <span class="hljs-string">&quot;bread&quot;</span>]
shopping_list.append(<span class="hljs-string">&quot;eggs&quot;</span>)
<span class="hljs-built_in">print</span>(shopping_list)   <span class="hljs-comment"># [&#x27;milk&#x27;, &#x27;bread&#x27;, &#x27;eggs&#x27;]</span>
</code></pre>
<h3 id="remove--remove-by-value"><code>remove()</code> — remove by <strong>value</strong></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list.remove(<span class="hljs-string">&quot;bread&quot;</span>)
<span class="hljs-built_in">print</span>(shopping_list)   <span class="hljs-comment"># [&#x27;milk&#x27;, &#x27;eggs&#x27;]</span>
</code></pre>
<h3 id="pop--remove-by-index-default-last-item"><code>pop()</code> — remove by <strong>index</strong> (default: last item)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list = [<span class="hljs-string">&quot;milk&quot;</span>, <span class="hljs-string">&quot;bread&quot;</span>, <span class="hljs-string">&quot;eggs&quot;</span>]
removed = shopping_list.pop(<span class="hljs-number">1</span>)   <span class="hljs-comment"># removes index 1</span>
<span class="hljs-built_in">print</span>(removed)                   <span class="hljs-comment"># bread</span>
<span class="hljs-built_in">print</span>(shopping_list)             <span class="hljs-comment"># [&#x27;milk&#x27;, &#x27;eggs&#x27;]</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h2 id="the-in-operator-and-safe-removal">The <code>in</code> Operator and Safe Removal</h2>
<h3 id="membership-test">Membership test</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list = [<span class="hljs-string">&quot;milk&quot;</span>, <span class="hljs-string">&quot;bread&quot;</span>, <span class="hljs-string">&quot;eggs&quot;</span>]
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;milk&quot;</span> <span class="hljs-keyword">in</span> shopping_list)   <span class="hljs-comment"># True</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;tea&quot;</span> <span class="hljs-keyword">in</span> shopping_list)    <span class="hljs-comment"># False</span>
</code></pre>
<h3 id="safe-removal-pattern-avoid-crash-if-item-is-missing">Safe removal pattern (avoid crash if item is missing)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">item_to_remove = <span class="hljs-string">&quot;tea&quot;</span>

<span class="hljs-keyword">if</span> item_to_remove <span class="hljs-keyword">in</span> shopping_list:
    shopping_list.remove(item_to_remove)
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Item removed.&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;That item is not in the list.&quot;</span>)
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Calling <code>remove()</code> on a missing item raises a <code>ValueError</code> — always check first!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="demo-build-a-shopping-list-step-by-step">Demo: Build a Shopping List Step by Step</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">shopping_list = []
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Starting list:&quot;</span>, shopping_list)

shopping_list.append(<span class="hljs-string">&quot;milk&quot;</span>)
shopping_list.append(<span class="hljs-string">&quot;bread&quot;</span>)
shopping_list.append(<span class="hljs-string">&quot;eggs&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;After adds:&quot;</span>, shopping_list)

shopping_list[<span class="hljs-number">1</span>] = <span class="hljs-string">&quot;whole grain bread&quot;</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;After update:&quot;</span>, shopping_list)

item_to_remove = <span class="hljs-string">&quot;milk&quot;</span>
<span class="hljs-keyword">if</span> item_to_remove <span class="hljs-keyword">in</span> shopping_list:
    shopping_list.remove(item_to_remove)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;After remove:&quot;</span>, shopping_list)

popped_item = shopping_list.pop()
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Popped:&quot;</span>, popped_item)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Final list:&quot;</span>, shopping_list)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Item count: <span class="hljs-subst">{<span class="hljs-built_in">len</span>(shopping_list)}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h1 id="hour-14-boolean-expressions--comparison-operators">Hour 14: Boolean Expressions &amp; Comparison Operators</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Use all six comparison operators to compare values</li>
<li>Distinguish between assignment (<code>=</code>) and equality (<code>==</code>)</li>
<li>Combine conditions with <code>and</code>, <code>or</code>, and <code>not</code></li>
<li>Predict the result of compound boolean expressions</li>
<li>Avoid common off-by-one and type-mismatch pitfalls</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h2 id="the-six-comparison-operators">The Six Comparison Operators</h2>
<table>
<thead>
<tr>
<th>Operator</th>
<th>Meaning</th>
<th>Example</th>
<th>Result</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>==</code></td>
<td>Equal to</td>
<td><code>5 == 5</code></td>
<td><code>True</code></td>
</tr>
<tr>
<td><code>!=</code></td>
<td>Not equal to</td>
<td><code>5 != 3</code></td>
<td><code>True</code></td>
</tr>
<tr>
<td><code>&lt;</code></td>
<td>Less than</td>
<td><code>3 &lt; 5</code></td>
<td><code>True</code></td>
</tr>
<tr>
<td><code>&gt;</code></td>
<td>Greater than</td>
<td><code>5 &gt; 3</code></td>
<td><code>True</code></td>
</tr>
<tr>
<td><code>&lt;=</code></td>
<td>Less than or equal</td>
<td><code>5 &lt;= 5</code></td>
<td><code>True</code></td>
</tr>
<tr>
<td><code>&gt;=</code></td>
<td>Greater than or equal</td>
<td><code>5 &gt;= 3</code></td>
<td><code>True</code></td>
</tr>
</tbody>
</table>
<p>Every comparison returns <code>True</code> or <code>False</code> — a <strong>boolean</strong> value.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="en-US">
<h2 id="vs---the-most-common-beginner-mistake"><code>=</code> vs <code>==</code> — The Most Common Beginner Mistake</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age = <span class="hljs-number">18</span>        <span class="hljs-comment"># Assignment: puts 18 INTO age</span>
age == <span class="hljs-number">18</span>       <span class="hljs-comment"># Comparison: ASKS &quot;is age equal to 18?&quot;</span>
</code></pre>
<h3 id="what-goes-wrong">What goes wrong</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> SyntaxError — can&#x27;t assign inside a condition</span>
<span class="hljs-keyword">if</span> age = <span class="hljs-number">18</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Adult&quot;</span>)

<span class="hljs-comment"># ✓ Correct</span>
<span class="hljs-keyword">if</span> age == <span class="hljs-number">18</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Adult&quot;</span>)
</code></pre>
<blockquote>
<p><strong>Memory trick</strong>: Single <code>=</code> puts a value <strong>in</strong>.<br />
Double <code>==</code> asks a <strong>question</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h2 id="logical-operators-and-or-not">Logical Operators: <code>and</code>, <code>or</code>, <code>not</code></h2>
<h3 id="and--both-must-be-true"><code>and</code> — both must be <code>True</code></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> has_license       <span class="hljs-comment"># True only if BOTH are True</span>
</code></pre>
<h3 id="or--at-least-one-must-be-true"><code>or</code> — at least one must be <code>True</code></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">is_weekend <span class="hljs-keyword">or</span> is_holiday        <span class="hljs-comment"># True if EITHER is True</span>
</code></pre>
<h3 id="not--flips-the-boolean"><code>not</code> — flips the boolean</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">is_adult = <span class="hljs-literal">True</span>
<span class="hljs-keyword">not</span> is_adult                    <span class="hljs-comment"># False</span>
</code></pre>
<h3 id="combining-all-three">Combining all three</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Adult (18+) AND (has membership OR paid fee)</span>
age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> (has_membership <span class="hljs-keyword">or</span> paid_fee)
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Use parentheses to group <code>or</code> sub-expressions — <code>and</code> binds tighter than <code>or</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h2 id="truth-tables-at-a-glance">Truth Tables at a Glance</h2>
<h3 id="and--only-tt-%E2%86%92-true"><code>and</code> — only TT → True</h3>
<table>
<thead>
<tr>
<th>A</th>
<th>B</th>
<th>A and B</th>
</tr>
</thead>
<tbody>
<tr>
<td>T</td>
<td>T</td>
<td><strong>T</strong></td>
</tr>
<tr>
<td>T</td>
<td>F</td>
<td>F</td>
</tr>
<tr>
<td>F</td>
<td>T</td>
<td>F</td>
</tr>
<tr>
<td>F</td>
<td>F</td>
<td>F</td>
</tr>
</tbody>
</table>
<h3 id="or--only-ff-%E2%86%92-false"><code>or</code> — only FF → False</h3>
<table>
<thead>
<tr>
<th>A</th>
<th>B</th>
<th>A or B</th>
</tr>
</thead>
<tbody>
<tr>
<td>T</td>
<td>T</td>
<td>T</td>
</tr>
<tr>
<td>T</td>
<td>F</td>
<td>T</td>
</tr>
<tr>
<td>F</td>
<td>T</td>
<td>T</td>
</tr>
<tr>
<td>F</td>
<td>F</td>
<td><strong>F</strong></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="en-US">
<h2 id="demo-age-gating-eligibility-checker">Demo: Age-Gating Eligibility Checker</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Basic comparison</span>
age = <span class="hljs-number">16</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Age &gt;= 18? <span class="hljs-subst">{age &gt;= <span class="hljs-number">18</span>}</span>&quot;</span>)          <span class="hljs-comment"># False</span>

age = <span class="hljs-number">25</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Age &gt;= 18? <span class="hljs-subst">{age &gt;= <span class="hljs-number">18</span>}</span>&quot;</span>)          <span class="hljs-comment"># True</span>

<span class="hljs-comment"># Combining with and</span>
has_license = <span class="hljs-literal">True</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Eligible? <span class="hljs-subst">{age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> has_license}</span>&quot;</span>)  <span class="hljs-comment"># True</span>

has_license = <span class="hljs-literal">False</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Eligible? <span class="hljs-subst">{age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> has_license}</span>&quot;</span>)  <span class="hljs-comment"># False</span>

<span class="hljs-comment"># Full eligibility: adult AND (membership OR paid fee)</span>
age = <span class="hljs-number">20</span>
has_membership = <span class="hljs-literal">False</span>
paid_fee = <span class="hljs-literal">True</span>
eligible = age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> (has_membership <span class="hljs-keyword">or</span> paid_fee)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Eligible: <span class="hljs-subst">{eligible}</span>&quot;</span>)            <span class="hljs-comment"># True</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h2 id="common-pitfalls-hour-14">Common Pitfalls (Hour 14)</h2>
<h3 id="off-by-one-boundary-error">Off-by-one boundary error</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age = <span class="hljs-number">18</span>
<span class="hljs-keyword">if</span> age &gt; <span class="hljs-number">18</span>:     <span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Excludes exactly 18</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Adult&quot;</span>)

<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span>:    <span class="hljs-comment"># ✓ Includes 18</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Adult&quot;</span>)
</code></pre>
<h3 id="type-mismatch">Type mismatch</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age = <span class="hljs-string">&quot;18&quot;</span>
<span class="hljs-keyword">if</span> age &gt; <span class="hljs-number">18</span>:           <span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> TypeError — str vs int</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Adult&quot;</span>)

age = <span class="hljs-built_in">int</span>(<span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Age: &quot;</span>))
<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span>:          <span class="hljs-comment"># ✓ Both integers</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Adult&quot;</span>)
</code></pre>
<h3 id="operator-precedence">Operator precedence</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Reads as: (age&gt;=18 and has_membership) OR paid_fee</span>
<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> has_membership <span class="hljs-keyword">or</span> paid_fee:  ...

<span class="hljs-comment"># ✓ Correct grouping</span>
<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> (has_membership <span class="hljs-keyword">or</span> paid_fee):  ...
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<h2 id="lab-camp-eligibility-checker">Lab: Camp Eligibility Checker</h2>
<p><strong>Time: 20 minutes</strong></p>
<h3 id="rules">Rules</h3>
<ul>
<li><strong>Eligible</strong> if: age between 8–16 (inclusive) AND swimming test passed AND parent contact on file</li>
</ul>
<h3 id="tasks-1">Tasks</h3>
<ol>
<li>Ask for age, swimming test result, parent contact (use <code>True</code>/<code>False</code>)</li>
<li>Build the eligibility expression</li>
<li>Print <code>&quot;Eligible for camp!&quot;</code> or <code>&quot;Not eligible.&quot;</code></li>
</ol>
<h3 id="sample-solution-skeleton">Sample solution skeleton</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age = <span class="hljs-built_in">int</span>(<span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Age: &quot;</span>))
swimming_test = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Passed swim test? (True/False): &quot;</span>) == <span class="hljs-string">&quot;True&quot;</span>
parent_contact = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Parent contact on file? (True/False): &quot;</span>) == <span class="hljs-string">&quot;True&quot;</span>

eligible = <span class="hljs-number">8</span> &lt;= age &lt;= <span class="hljs-number">16</span> <span class="hljs-keyword">and</span> swimming_test <span class="hljs-keyword">and</span> parent_contact

<span class="hljs-keyword">if</span> eligible:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Eligible for camp!&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Not eligible. Please check your information.&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="en-US">
<h1 id="hour-15-if--elif--else-flow-and-nested-conditions">Hour 15: If / Elif / Else Flow and Nested Conditions</h1>
<h2 id="learning-outcomes-2">Learning Outcomes</h2>
<ul>
<li>Write <code>if</code>, <code>elif</code>, and <code>else</code> to create branching logic</li>
<li>Understand that only <strong>one</strong> block executes per conditional chain</li>
<li>Order conditions from most specific to most general</li>
<li>Identify and fix unreachable code branches</li>
<li>Use nested conditionals appropriately (and know when to use <code>and</code> instead)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="en-US">
<h2 id="the-if--elif--else-structure">The If / Elif / Else Structure</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> condition_A:
    <span class="hljs-comment"># runs ONLY if A is True</span>
<span class="hljs-keyword">elif</span> condition_B:
    <span class="hljs-comment"># runs ONLY if A is False AND B is True</span>
<span class="hljs-keyword">elif</span> condition_C:
    <span class="hljs-comment"># runs ONLY if A and B are False AND C is True</span>
<span class="hljs-keyword">else</span>:
    <span class="hljs-comment"># runs if NO condition above was True</span>
</code></pre>
<p><strong>Critical rule</strong>: Python checks top-to-bottom. The <strong>first</strong> <code>True</code> branch runs; all others are skipped.</p>
<h3 id="example">Example</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age = <span class="hljs-number">16</span>
<span class="hljs-keyword">if</span> age &lt; <span class="hljs-number">13</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You are a child.&quot;</span>)
<span class="hljs-keyword">elif</span> age &lt; <span class="hljs-number">18</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You are a teenager.&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You are an adult.&quot;</span>)
<span class="hljs-comment"># Output: You are a teenager.</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h2 id="tiered-decisions-shipping-cost">Tiered Decisions: Shipping Cost</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">weight = <span class="hljs-number">25</span>

<span class="hljs-keyword">if</span> weight &lt;= <span class="hljs-number">10</span>:
    cost = <span class="hljs-number">0</span>        <span class="hljs-comment"># Free</span>
<span class="hljs-keyword">elif</span> weight &lt;= <span class="hljs-number">50</span>:
    cost = <span class="hljs-number">5</span>        <span class="hljs-comment"># Standard</span>
<span class="hljs-keyword">elif</span> weight &lt;= <span class="hljs-number">100</span>:
    cost = <span class="hljs-number">12</span>       <span class="hljs-comment"># Heavy</span>
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Too heavy. Contact support.&quot;</span>)
    cost = <span class="hljs-literal">None</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Shipping cost: $<span class="hljs-subst">{cost}</span>&quot;</span>)
<span class="hljs-comment"># Output: Shipping cost: $5</span>
</code></pre>
<p><strong>Trace through</strong>:</p>
<ol>
<li><code>weight &lt;= 10</code>? No (25 is not ≤ 10)</li>
<li><code>weight &lt;= 50</code>? Yes → set cost = 5, skip the rest</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<h2 id="order-matters--avoid-unreachable-code">Order Matters — Avoid Unreachable Code</h2>
<h3 id="%E2%9D%8C-unreachable-second-branch"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Unreachable second branch</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">x = <span class="hljs-number">15</span>
<span class="hljs-keyword">if</span> x &gt; <span class="hljs-number">0</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;x is positive&quot;</span>)
<span class="hljs-keyword">elif</span> x &gt; <span class="hljs-number">10</span>:           <span class="hljs-comment"># ← never reached! x &gt; 10 implies x &gt; 0</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;x &gt; 10&quot;</span>)
</code></pre>
<h3 id="%E2%9C%93-fix-most-specific-first">✓ Fix: most specific first</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">x = <span class="hljs-number">15</span>
<span class="hljs-keyword">if</span> x &gt; <span class="hljs-number">10</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;x is greater than 10&quot;</span>)
<span class="hljs-keyword">elif</span> x &gt; <span class="hljs-number">0</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;x is positive (but ≤ 10)&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;x is not positive&quot;</span>)
</code></pre>
<blockquote>
<p><strong>Rule of thumb</strong>: order conditions from <strong>most specific</strong> to <strong>most general</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">
<h2 id="nested-conditionals">Nested Conditionals</h2>
<h3 id="when-to-nest--second-check-depends-on-the-first">When to nest — second check depends on the first</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">age = <span class="hljs-number">25</span>
has_license = <span class="hljs-literal">True</span>

<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span>:
    <span class="hljs-keyword">if</span> has_license:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You can drive.&quot;</span>)
    <span class="hljs-keyword">else</span>:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You&#x27;re an adult but can&#x27;t drive yet.&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You must be an adult to drive.&quot;</span>)
<span class="hljs-comment"># Output: You can drive.</span>
</code></pre>
<h3 id="prefer-flat-and-when-both-conditions-are-equal-weight">Prefer flat <code>and</code> when both conditions are equal weight</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Nested (harder to read):</span>
<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span>:
    <span class="hljs-keyword">if</span> has_license:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Can drive&quot;</span>)

<span class="hljs-comment"># Flat with `and` (clearer):</span>
<span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> has_license:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Can drive&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h2 id="the-receipt-generator-problem">The Receipt Generator Problem</h2>
<p><strong>Input</strong>: item name, quantity, price per item</p>
<p><strong>Calculations</strong>:</p>
<ul>
<li><code>subtotal = quantity × price_per_item</code></li>
<li><code>subtotal_with_fee = subtotal + 2.50</code></li>
<li><code>tax = subtotal_with_fee × 0.08</code></li>
<li><code>total = subtotal_with_fee + tax</code></li>
</ul>
<p><strong>Expected output</strong> (Widget, qty 3, $10.00):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>========== RECEIPT ==========
Item: Widget
Quantity: 3
Price per item: $10.00
Subtotal: $30.00
Service fee: $2.50
Subtotal with fee: $32.50
Sales tax (8%): $2.60
Total: $35.10
=============================
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<h2 id="step-by-step-input-and-type-conversion">Step-by-Step: Input and Type Conversion</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Step 1: Get input</span>
item = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Item name: &quot;</span>)
quantity_str = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Quantity: &quot;</span>)
price_str = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Price per item: &quot;</span>)

<span class="hljs-comment"># Step 2: Convert to numbers</span>
quantity = <span class="hljs-built_in">float</span>(quantity_str)
price_per_item = <span class="hljs-built_in">float</span>(price_str)

<span class="hljs-comment"># Step 3: Verify</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Item: <span class="hljs-subst">{item}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Quantity: <span class="hljs-subst">{quantity}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Price: $<span class="hljs-subst">{price_per_item}</span>&quot;</span>)
</code></pre>
<blockquote>
<p><code>input()</code> always returns a <strong>string</strong>.<br />
You must convert to <code>float</code> before doing any math.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="en-US">
<h2 id="step-by-step-calculations">Step-by-Step: Calculations</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Subtotal</span>
subtotal = quantity * price_per_item

<span class="hljs-comment"># Add fixed service fee</span>
subtotal_with_fee = subtotal + <span class="hljs-number">2.50</span>

<span class="hljs-comment"># Calculate 8% tax on the full subtotal-with-fee</span>
tax = subtotal_with_fee * <span class="hljs-number">0.08</span>

<span class="hljs-comment"># Final total</span>
total = subtotal_with_fee + tax
</code></pre>
<p><strong>Verify with: Widget, 3, $10.00</strong></p>
<table>
<thead>
<tr>
<th>Step</th>
<th>Value</th>
</tr>
</thead>
<tbody>
<tr>
<td>Subtotal</td>
<td>$30.00</td>
</tr>
<tr>
<td>With fee</td>
<td>$32.50</td>
</tr>
<tr>
<td>Tax (8%)</td>
<td>$2.60</td>
</tr>
<tr>
<td><strong>Total</strong></td>
<td><strong>$35.10</strong></td>
</tr>
</tbody>
</table>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Tax the <strong>subtotal + fee</strong>, not just the subtotal.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="en-US">
<h2 id="step-by-step-formatted-output">Step-by-Step: Formatted Output</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;========== RECEIPT ==========&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Item: <span class="hljs-subst">{item}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Quantity: <span class="hljs-subst">{quantity}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Price per item: $<span class="hljs-subst">{price_per_item:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Subtotal: $<span class="hljs-subst">{subtotal:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Service fee: $2.50&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Subtotal with fee: $<span class="hljs-subst">{subtotal_with_fee:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Sales tax (8%): $<span class="hljs-subst">{tax:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Total: $<span class="hljs-subst">{total:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;=============================&quot;</span>)
</code></pre>
<blockquote>
<p><code>:.2f</code> inside an f-string formats a float to <strong>exactly 2 decimal places</strong>.<br />
Calculate first; round only when printing.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="en-US">
<h2 id="checkpoint-1-pitfalls">Checkpoint 1 Pitfalls</h2>
<h3 id="forgetting-to-convert-input">Forgetting to convert input</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> TypeError — can&#x27;t multiply a string by a number</span>
quantity = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Quantity: &quot;</span>)
subtotal = quantity * price_per_item

<span class="hljs-comment"># ✓ Fix</span>
quantity = <span class="hljs-built_in">float</span>(<span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Quantity: &quot;</span>))
</code></pre>
<h3 id="taxing-the-wrong-amount">Taxing the wrong amount</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Forgets to tax the service fee</span>
tax = subtotal * <span class="hljs-number">0.08</span>

<span class="hljs-comment"># ✓ Tax on the full subtotal-with-fee</span>
tax = subtotal_with_fee * <span class="hljs-number">0.08</span>
</code></pre>
<h3 id="rounding-too-early">Rounding too early</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Compounding rounding error</span>
subtotal = <span class="hljs-built_in">round</span>(quantity * price, <span class="hljs-number">2</span>)
tax = subtotal * <span class="hljs-number">0.08</span>   <span class="hljs-comment"># tax calculated on rounded value</span>

<span class="hljs-comment"># ✓ Calculate in full precision; use :.2f only when printing</span>
</code></pre>
</section>
