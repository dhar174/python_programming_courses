<h1 id="hour-17-gui-fundamentals-with-tkinter-and-ttk">Hour 17: GUI Fundamentals with Tkinter and ttk</h1>
<h2 id="learning-outcomes">Learning Outcomes</h2>
<ul>
<li>Explain what makes GUI programming event-driven</li>
<li>Describe the role of <code>mainloop()</code> in a Tkinter app</li>
<li>Create a window with <code>Label</code>, <code>Entry</code>, and <code>Button</code> using <code>ttk</code></li>
<li>Wire a button callback to a service layer</li>
<li>Show user feedback with a status label and <code>messagebox</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="the-gui-mental-model-and-mainloop">The GUI Mental Model and <code>mainloop()</code></h2>
<ul>
<li>Command-line programs run <strong>top to bottom</strong>; GUIs <strong>wait for events</strong></li>
<li>The user's clicks, key presses, and text entry drive execution</li>
<li>Our code registers <strong>callbacks</strong>; the toolkit calls them when events fire</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">root = tk.Tk()
<span class="hljs-comment"># ... create widgets and register callbacks ...</span>
root.mainloop()   <span class="hljs-comment"># starts the event loop; keeps window alive</span>
</code></pre>
<ul>
<li>Without <code>mainloop()</code> the window may flash and disappear</li>
<li>When the user closes the window, <code>mainloop()</code> exits</li>
</ul>
<blockquote>
<p><strong>Key message:</strong> The GUI handles interaction; the service layer handles rules.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="the-three-part-gui-pattern">The Three-Part GUI Pattern</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">widgets collect input
        ↓
  callback responds
        ↓
 service validates and stores
        ↓
  UI shows success or error
</code></pre>
<ul>
<li><strong>Widget</strong> — visible UI element (Label, Entry, Button)</li>
<li><strong>Callback</strong> — function wired to an event via <code>command=self.on_add</code> (not <code>command=self.on_add()</code>)</li>
<li><strong>Service layer</strong> — ordinary Python that owns business rules and validation</li>
<li>Blocking calls (sleep, network, large files) in a callback <strong>freeze the GUI</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="demo-service-first--contactservice">Demo: Service First — ContactService</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">ContactService</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-variable language_">self</span>._records: <span class="hljs-built_in">list</span>[ContactRecord] = []

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">add_record</span>(<span class="hljs-params">self, name: <span class="hljs-built_in">str</span>, email: <span class="hljs-built_in">str</span></span>) -&gt; ContactRecord:
        clean_name = name.strip()
        clean_email = email.strip().lower()
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> clean_name:
            <span class="hljs-keyword">raise</span> ValidationError(<span class="hljs-string">&quot;Name is required.&quot;</span>)
        <span class="hljs-keyword">if</span> <span class="hljs-string">&quot;@&quot;</span> <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> clean_email:
            <span class="hljs-keyword">raise</span> ValidationError(<span class="hljs-string">&quot;Email must include &#x27;@&#x27;.&quot;</span>)
        record = ContactRecord(name=clean_name, email=clean_email)
        <span class="hljs-variable language_">self</span>._records.append(record)
        <span class="hljs-keyword">return</span> record
</code></pre>
<ul>
<li>Service does <strong>not</strong> know about widgets, <code>StringVar</code>, or <code>messagebox</code></li>
<li>Rules belong here whether input comes from GUI, CLI, or API</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="demo-contactapp--widgets-and-callback">Demo: ContactApp — Widgets and Callback</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">ContactApp</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, root: tk.Tk, service: ContactService</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-variable language_">self</span>.root = root
        <span class="hljs-variable language_">self</span>.service = service
        <span class="hljs-variable language_">self</span>.name_var = tk.StringVar()
        <span class="hljs-variable language_">self</span>.email_var = tk.StringVar()
        <span class="hljs-variable language_">self</span>.status_var = tk.StringVar(value=<span class="hljs-string">&quot;Ready.&quot;</span>)
        <span class="hljs-variable language_">self</span>._build_ui()

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">_build_ui</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
        frame = ttk.Frame(<span class="hljs-variable language_">self</span>.root, padding=<span class="hljs-number">16</span>)
        frame.pack(fill=<span class="hljs-string">&quot;both&quot;</span>, expand=<span class="hljs-literal">True</span>)
        ttk.Label(frame, text=<span class="hljs-string">&quot;Name&quot;</span>).pack(anchor=<span class="hljs-string">&quot;w&quot;</span>)
        ttk.Entry(frame, textvariable=<span class="hljs-variable language_">self</span>.name_var).pack(fill=<span class="hljs-string">&quot;x&quot;</span>, pady=(<span class="hljs-number">0</span>, <span class="hljs-number">10</span>))
        ttk.Label(frame, text=<span class="hljs-string">&quot;Email&quot;</span>).pack(anchor=<span class="hljs-string">&quot;w&quot;</span>)
        ttk.Entry(frame, textvariable=<span class="hljs-variable language_">self</span>.email_var).pack(fill=<span class="hljs-string">&quot;x&quot;</span>, pady=(<span class="hljs-number">0</span>, <span class="hljs-number">10</span>))
        ttk.Button(frame, text=<span class="hljs-string">&quot;Add Record&quot;</span>, command=<span class="hljs-variable language_">self</span>.on_add).pack()
        ttk.Label(frame, textvariable=<span class="hljs-variable language_">self</span>.status_var).pack(anchor=<span class="hljs-string">&quot;w&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h2 id="demo-the-on_add-callback">Demo: The <code>on_add</code> Callback</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">def</span> <span class="hljs-title function_">on_add</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-keyword">try</span>:
            record = <span class="hljs-variable language_">self</span>.service.add_record(
                <span class="hljs-variable language_">self</span>.name_var.get(), <span class="hljs-variable language_">self</span>.email_var.get()
            )
        <span class="hljs-keyword">except</span> ValidationError <span class="hljs-keyword">as</span> exc:
            <span class="hljs-variable language_">self</span>.status_var.<span class="hljs-built_in">set</span>(<span class="hljs-string">f&quot;Error: <span class="hljs-subst">{exc}</span>&quot;</span>)
            messagebox.showerror(<span class="hljs-string">&quot;Validation Error&quot;</span>, <span class="hljs-built_in">str</span>(exc))
            <span class="hljs-keyword">return</span>
        <span class="hljs-variable language_">self</span>.status_var.<span class="hljs-built_in">set</span>(<span class="hljs-string">f&quot;Added <span class="hljs-subst">{record.name}</span>.&quot;</span>)
        messagebox.showinfo(<span class="hljs-string">&quot;Success&quot;</span>, <span class="hljs-string">f&quot;Saved <span class="hljs-subst">{record.name}</span>.&quot;</span>)
        <span class="hljs-variable language_">self</span>.name_var.<span class="hljs-built_in">set</span>(<span class="hljs-string">&quot;&quot;</span>)
        <span class="hljs-variable language_">self</span>.email_var.<span class="hljs-built_in">set</span>(<span class="hljs-string">&quot;&quot;</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">main</span>() -&gt; <span class="hljs-literal">None</span>:
    root = tk.Tk()
    service = ContactService()
    ContactApp(root, service)
    root.mainloop()
</code></pre>
<ul>
<li>Callback coordinates; service decides</li>
<li><code>messagebox</code> is modal — acceptable for short feedback, not for long blocking work</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="lab-hello-gui-and-add-form-hour-17">Lab: Hello GUI and Add Form (Hour 17)</h2>
<p><strong>Time: 26 minutes</strong></p>
<h3 id="tasks">Tasks</h3>
<ul>
<li>Part A — Hello GUI: create <code>tk.Tk()</code> window with a <code>ttk.Label</code>; confirm <code>mainloop()</code> keeps it alive</li>
<li>Part B — Add Form: build a two-field form with <code>Label</code>, <code>Entry</code>, <code>Button</code>, and status label</li>
<li>Part C — Wire a service: validate through a service; show <code>messagebox</code> on success and error</li>
<li>Part D — Test all cases: blank fields, one field only, two valid fields, close and relaunch</li>
</ul>
<h3 id="completion-criteria">Completion criteria</h3>
<p>✓ GUI launches reliably<br />
✓ Add action shows correct feedback for both valid and invalid input</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<h2 id="common-pitfalls-hour-17">Common Pitfalls (Hour 17)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Business logic placed inside the button callback instead of a service layer<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Forgetting <code>root.mainloop()</code> — window flashes and disappears<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Writing <code>command=on_add()</code> — calls the function at build time instead of wiring it<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Creating a widget but not calling <code>.pack()</code> or <code>.grid()</code> — widget is invisible<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Mixing <code>.pack()</code> and <code>.grid()</code> in the <strong>same parent container</strong> — causes layout errors<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> No visible feedback — user cannot tell whether Add succeeded or failed</p>
<p><strong>Quick Check:</strong> What does <code>mainloop()</code> do? Why is <code>command=self.on_add</code> correct while <code>command=self.on_add()</code> is a bug?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h1 id="hour-18-layout-usability-and-resizing">Hour 18: Layout, Usability, and Resizing</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Explain parent-child geometry ownership</li>
<li>Use nested frames to separate layout regions</li>
<li>Configure row and column weights so a window expands predictably</li>
<li>Apply sticky and padding for alignment and readability</li>
<li>Identify and fix overlap, collapse, and cramped spacing defects</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h2 id="parent-child-geometry-ownership">Parent-Child Geometry Ownership</h2>
<ul>
<li>A Tkinter layout is a <strong>tree</strong> — every widget has exactly one parent</li>
<li>Use <strong>one geometry manager</strong> for direct children of any one parent</li>
<li>You may use different managers in <em>different</em> nested parents — not mixed in the <strong>same</strong> parent</li>
</ul>
<blockquote>
<p>&quot;Think of each frame as a room. Inside one room, choose one rule for placing furniture.&quot;</p>
</blockquote>
<p><strong>Frame decomposition pattern:</strong></p>
<ul>
<li>Page-level frame holds region frames</li>
<li>Each region frame manages its own local grid</li>
<li>Local coordination keeps layout reasoning simple</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="en-US">
<h2 id="frame-decomposition-code-example">Frame Decomposition Code Example</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">root.columnconfigure(<span class="hljs-number">0</span>, weight=<span class="hljs-number">1</span>)
root.rowconfigure(<span class="hljs-number">0</span>, weight=<span class="hljs-number">1</span>)

page = ttk.Frame(root, padding=<span class="hljs-number">12</span>)
page.grid(row=<span class="hljs-number">0</span>, column=<span class="hljs-number">0</span>, sticky=<span class="hljs-string">&quot;nsew&quot;</span>)
page.columnconfigure(<span class="hljs-number">0</span>, weight=<span class="hljs-number">3</span>)   <span class="hljs-comment"># content region — wider</span>
page.columnconfigure(<span class="hljs-number">1</span>, weight=<span class="hljs-number">2</span>)   <span class="hljs-comment"># sidebar region — narrower</span>
page.rowconfigure(<span class="hljs-number">1</span>, weight=<span class="hljs-number">1</span>)      <span class="hljs-comment"># row 1 absorbs vertical growth</span>

content = ttk.Frame(page)
content.grid(row=<span class="hljs-number">1</span>, column=<span class="hljs-number">0</span>, sticky=<span class="hljs-string">&quot;nsew&quot;</span>)

sidebar = ttk.Frame(page)
sidebar.grid(row=<span class="hljs-number">1</span>, column=<span class="hljs-number">1</span>, sticky=<span class="hljs-string">&quot;nsew&quot;</span>)
</code></pre>
<ul>
<li>Regions are <strong>local layout jurisdictions</strong> — each configures its own weights and sticky</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h2 id="sticky-weights-and-padding">Sticky, Weights, and Padding</h2>
<p><strong>Sticky</strong> — controls where a widget attaches inside its grid cell</p>
<ul>
<li><code>ew</code> — horizontal stretch, <code>ns</code> — vertical stretch, <code>nsew</code> — full coverage</li>
</ul>
<p><strong>Weights</strong> — allocate the resize budget</p>
<ul>
<li><code>columnconfigure(1, weight=1)</code> — column 1 absorbs extra width</li>
<li>A column with <code>weight=0</code> (default) receives no extra space</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">content.columnconfigure(<span class="hljs-number">1</span>, weight=<span class="hljs-number">1</span>)
ttk.Entry(content).grid(row=<span class="hljs-number">0</span>, column=<span class="hljs-number">1</span>, sticky=<span class="hljs-string">&quot;ew&quot;</span>, pady=(<span class="hljs-number">0</span>, <span class="hljs-number">8</span>))
</code></pre>
<p><strong>Padding</strong> — usability signal, not decoration</p>
<ul>
<li>Consistent <code>padx</code>/<code>pady</code> creates visual rhythm and scan paths</li>
<li>Use <code>minsize</code> on <code>root</code> to protect baseline readability</li>
</ul>
<p><strong>Resize test rule:</strong> Test narrow, wide, and tall scenarios after every layout change.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h2 id="pitfalls--missing-sticky-missing-weights-mixed-managers">Pitfalls — Missing Sticky, Missing Weights, Mixed Managers</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Defect: entry stays fixed while window grows (missing sticky + weight)</span>
ttk.Entry(frame).grid(row=<span class="hljs-number">0</span>, column=<span class="hljs-number">1</span>)
<span class="hljs-comment"># Fix:</span>
frame.columnconfigure(<span class="hljs-number">1</span>, weight=<span class="hljs-number">1</span>)
ttk.Entry(frame).grid(row=<span class="hljs-number">0</span>, column=<span class="hljs-number">1</span>, sticky=<span class="hljs-string">&quot;ew&quot;</span>)

<span class="hljs-comment"># Defect: listbox does not grow vertically (missing row weight + sticky)</span>
tk.Listbox(sidebar).grid(row=<span class="hljs-number">1</span>, column=<span class="hljs-number">0</span>)
<span class="hljs-comment"># Fix:</span>
sidebar.rowconfigure(<span class="hljs-number">1</span>, weight=<span class="hljs-number">1</span>)
tk.Listbox(sidebar).grid(row=<span class="hljs-number">1</span>, column=<span class="hljs-number">0</span>, sticky=<span class="hljs-string">&quot;nsew&quot;</span>)

<span class="hljs-comment"># Defect: mixing pack and grid in the same parent causes errors</span>
<span class="hljs-comment"># Fix: choose one manager per parent; use a nested frame to isolate</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h2 id="common-pitfalls-hour-18">Common Pitfalls (Hour 18)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Missing <code>sticky</code> — entry stays tiny while its cell enlarges (overlap feel)<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Missing row/column weight — listbox or text area does not grow (collapse feel)<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Missing padding — labels, entries, and buttons visually blend (crowded feel)<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Mixed geometry manager in one parent — runtime warnings and unpredictable layout<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Uneven column weights — one region stretches too much; content area stays cramped<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Testing only at default size — a layout not tested under resize is not finished</p>
<p><strong>Quick Check:</strong> A column has <code>weight=1</code> but the entry still does not stretch. What else is missing?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<h1 id="hour-19-forms-and-validation-feedback-patterns">Hour 19: Forms and Validation Feedback Patterns</h1>
<h2 id="learning-outcomes-2">Learning Outcomes</h2>
<ul>
<li>Validate input <strong>before</strong> saving — normalize first, validate second</li>
<li>Implement required-field checks and actionable inline feedback</li>
<li>Move focus to the first invalid field automatically</li>
<li>Disable and re-enable the Save button correctly on all code paths</li>
<li>Surface service-layer failures without exposing stack traces to users</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="en-US">
<h2 id="inline-validation-vs-messagebox">Inline Validation vs Messagebox</h2>
<p><strong>Inline validation</strong> — preferred for field-level, expected input mistakes</p>
<ul>
<li>Keeps user attention in context; connects each error to the exact field</li>
<li>Supports correction flow without modal interruption</li>
</ul>
<p><strong>Messagebox</strong> — reserved for major state changes, destructive actions, or severe failures</p>
<ul>
<li>Forces acknowledgement when safety matters</li>
<li>Should never show a raw Python traceback</li>
</ul>
<blockquote>
<p><strong>Rule:</strong> Field problem → inline message + focus move. App-level failure → concise status or controlled popup.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="en-US">
<h2 id="actionable-error-messages-and-save-button-behavior">Actionable Error Messages and Save Button Behavior</h2>
<p><strong>Bad messages:</strong> &quot;Invalid input.&quot; | &quot;Error.&quot; | &quot;Email wrong.&quot;</p>
<p><strong>Good messages:</strong></p>
<ul>
<li>&quot;Name is required. Use at least 2 letters.&quot;</li>
<li>&quot;Enter an email like <a href="mailto:name@example.com">name@example.com</a>.&quot;</li>
<li>&quot;Role is required before saving.&quot;</li>
</ul>
<p><strong>Save button disable/enable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_save</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
    <span class="hljs-variable language_">self</span>._clear_inline_errors()
    <span class="hljs-variable language_">self</span>.save_btn.state([<span class="hljs-string">&quot;disabled&quot;</span>])       <span class="hljs-comment"># disable immediately</span>

    <span class="hljs-keyword">try</span>:
        result = <span class="hljs-variable language_">self</span>.service.validate_and_save(...)
    <span class="hljs-keyword">except</span> ServiceSaveError:
        <span class="hljs-variable language_">self</span>.status_var.<span class="hljs-built_in">set</span>(<span class="hljs-string">&quot;Could not save. Please try again.&quot;</span>)
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">finally</span>:
        <span class="hljs-variable language_">self</span>._update_save_enabled_state()   <span class="hljs-comment"># always restore on every path</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h2 id="ui--service-responsibility-boundary">UI / Service Responsibility Boundary</h2>
<p><strong>UI layer owns:</strong></p>
<ul>
<li>Reading field values from widgets</li>
<li>Clearing old error state at the start of each save</li>
<li>Disabling/enabling Save control</li>
<li>Rendering inline errors and summary messages</li>
<li>Focus management</li>
</ul>
<p><strong>Service layer owns:</strong></p>
<ul>
<li>Input normalization — trim, lowercase, collapse whitespace</li>
<li>Validation rule decisions</li>
<li>Persistence call</li>
<li>Raising controlled exceptions for infrastructure issues</li>
</ul>
<p><strong>Structured error map returned by the service:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">{<span class="hljs-string">&quot;name&quot;</span>: <span class="hljs-string">&quot;Name is required.&quot;</span>, <span class="hljs-string">&quot;email&quot;</span>: <span class="hljs-string">&quot;Enter an email like name@example.com.&quot;</span>}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<h2 id="demo-validate_and_save-and-inline-error-application">Demo: validate_and_save and Inline Error Application</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">validate_and_save</span>(<span class="hljs-params">self, name: <span class="hljs-built_in">str</span>, email: <span class="hljs-built_in">str</span>, role: <span class="hljs-built_in">str</span></span>) -&gt; ValidationResult:
    clean_name = <span class="hljs-string">&quot; &quot;</span>.join(name.strip().split())
    clean_email = email.strip().lower()
    errors: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">str</span>] = {}
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> clean_name:
        errors[<span class="hljs-string">&quot;name&quot;</span>] = <span class="hljs-string">&quot;Name is required.&quot;</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> clean_email:
        errors[<span class="hljs-string">&quot;email&quot;</span>] = <span class="hljs-string">&quot;Email is required.&quot;</span>
    <span class="hljs-keyword">elif</span> <span class="hljs-string">&quot;@&quot;</span> <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> clean_email:
        errors[<span class="hljs-string">&quot;email&quot;</span>] = <span class="hljs-string">&quot;Enter an email like name@example.com.&quot;</span>
    <span class="hljs-keyword">if</span> errors:
        <span class="hljs-keyword">return</span> ValidationResult(ok=<span class="hljs-literal">False</span>, errors=errors)
    <span class="hljs-variable language_">self</span>._records.append(Contact(clean_name, clean_email, role.strip()))
    <span class="hljs-keyword">return</span> ValidationResult(ok=<span class="hljs-literal">True</span>, errors={}, record=...)
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> result.ok:
        <span class="hljs-keyword">for</span> field, msg <span class="hljs-keyword">in</span> result.errors.items():
            <span class="hljs-variable language_">self</span>.error_vars[field].<span class="hljs-built_in">set</span>(msg)  <span class="hljs-comment"># inline label under field</span>
        <span class="hljs-variable language_">self</span>._focus_first_invalid(result.errors)
        <span class="hljs-variable language_">self</span>.status_var.<span class="hljs-built_in">set</span>(<span class="hljs-string">&quot;Please fix the highlighted fields, then select Save.&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">

<h2 id="common-pitfalls-hour-19">Common Pitfalls (Hour 19)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Validation rule duplicated in both UI and service — inconsistent outcomes<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Old inline errors remain visible after a successful save<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Save button stays disabled forever — <code>finally</code> block missing<br />

<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Silent failure — button click does nothing and shows nothing to the user<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Raw stack trace surfaced in a UI label or messagebox — translate to a calm user message</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="en-US">
<h1 id="hour-20-record-list-ui-with-treeview-selection-and-safe-refresh">Hour 20: Record List UI with Treeview, Selection, and Safe Refresh</h1>
<h2 id="learning-outcomes-3">Learning Outcomes</h2>
<ul>
<li>Display records in a Listbox or Treeview widget</li>
<li>React to user selection and show record details in a details pane</li>
<li>Choose between Listbox and Treeview for a given use case</li>
<li>Implement selection callbacks that do not crash on empty selection</li>
<li>Refresh list data safely using the clear → repopulate → handle-selection sequence</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="en-US">
<h2 id="listbox-vs-treeview">Listbox vs Treeview</h2>
<p><strong>Listbox is best when:</strong></p>
<ul>
<li>Each row is a single display string</li>
<li>Fields can compress into one readable line</li>
<li>Column structure is not needed</li>
</ul>
<p><strong>Treeview is best when:</strong></p>
<ul>
<li>Records have multiple fields and table-like readability matters</li>
<li>Named column headers improve clarity</li>
<li>Later sorting or richer row identity may be added</li>
</ul>
<blockquote>
<p><strong>Default choice for multi-field records:</strong> Treeview — columns match fields directly.</p>
</blockquote>
<p><strong>Quick ask:</strong> Given records with id, name, email, and role, which widget gives better clarity?<br />
<strong>Expected answer:</strong> Treeview, because columns match fields directly.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="en-US">
<h2 id="selection-callbacks--safe-handling">Selection Callbacks — Safe Handling</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-variable language_">self</span>.tree.bind(<span class="hljs-string">&quot;&lt;&lt;TreeviewSelect&gt;&gt;&quot;</span>, <span class="hljs-variable language_">self</span>.on_select)
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_select</span>(<span class="hljs-params">self, _event: tk.Event</span>) -&gt; <span class="hljs-literal">None</span>:
    selected_items = <span class="hljs-variable language_">self</span>.tree.selection()
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> selected_items:               <span class="hljs-comment"># guard: nothing selected</span>
        <span class="hljs-variable language_">self</span>.clear_details(<span class="hljs-string">&quot;No record selected&quot;</span>)
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">try</span>:
        selected_id = <span class="hljs-built_in">int</span>(selected_items[<span class="hljs-number">0</span>])   <span class="hljs-comment"># guard: parse safely</span>
    <span class="hljs-keyword">except</span> ValueError:
        <span class="hljs-variable language_">self</span>.clear_details(<span class="hljs-string">&quot;No record selected&quot;</span>)
        <span class="hljs-keyword">return</span>
    record = <span class="hljs-variable language_">self</span>.service.get_record_by_id(selected_id)
    <span class="hljs-keyword">if</span> record <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:                   <span class="hljs-comment"># guard: record may be gone</span>
        <span class="hljs-variable language_">self</span>.clear_details(<span class="hljs-string">&quot;No record selected&quot;</span>)
        <span class="hljs-keyword">return</span>
    <span class="hljs-variable language_">self</span>.show_details(record)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="en-US">
<h2 id="refresh-safety-sequence">Refresh Safety Sequence</h2>
<p><strong>The three-step sequence — order is non-negotiable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">refresh_records</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
    existing = <span class="hljs-variable language_">self</span>.tree.get_children()
    <span class="hljs-keyword">if</span> existing:
        <span class="hljs-variable language_">self</span>.tree.delete(*existing)        <span class="hljs-comment"># step 1: clear existing rows</span>

    records = <span class="hljs-variable language_">self</span>.service.list_records()
    <span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> records:                   <span class="hljs-comment"># step 2: repopulate from source</span>
        <span class="hljs-variable language_">self</span>.tree.insert(<span class="hljs-string">&quot;&quot;</span>, <span class="hljs-string">&quot;end&quot;</span>, iid=<span class="hljs-built_in">str</span>(item.record_id),
                         values=(item.name, item.email, item.role))

    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> records:                        <span class="hljs-comment"># step 3: handle selection state</span>
        <span class="hljs-variable language_">self</span>.clear_details(<span class="hljs-string">&quot;No records available&quot;</span>)
        <span class="hljs-keyword">return</span>
    <span class="hljs-variable language_">self</span>.clear_details(<span class="hljs-string">&quot;No record selected&quot;</span>)
</code></pre>
<p>Skipping step 1 causes <strong>stale rows to stack</strong> on subsequent refreshes.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h2 id="demo-treeview-record-browser--setup-and-wiring">Demo: Treeview Record Browser — Setup and Wiring</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-variable language_">self</span>.tree = ttk.Treeview(
    main, columns=(<span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;email&quot;</span>, <span class="hljs-string">&quot;role&quot;</span>),
    show=<span class="hljs-string">&quot;headings&quot;</span>, selectmode=<span class="hljs-string">&quot;browse&quot;</span>, height=<span class="hljs-number">12</span>,
)
<span class="hljs-variable language_">self</span>.tree.heading(<span class="hljs-string">&quot;name&quot;</span>, text=<span class="hljs-string">&quot;Name&quot;</span>)
<span class="hljs-variable language_">self</span>.tree.heading(<span class="hljs-string">&quot;email&quot;</span>, text=<span class="hljs-string">&quot;Email&quot;</span>)
<span class="hljs-variable language_">self</span>.tree.heading(<span class="hljs-string">&quot;role&quot;</span>, text=<span class="hljs-string">&quot;Role&quot;</span>)
<span class="hljs-variable language_">self</span>.tree.column(<span class="hljs-string">&quot;name&quot;</span>, width=<span class="hljs-number">180</span>, anchor=<span class="hljs-string">&quot;w&quot;</span>)
<span class="hljs-variable language_">self</span>.tree.column(<span class="hljs-string">&quot;email&quot;</span>, width=<span class="hljs-number">240</span>, anchor=<span class="hljs-string">&quot;w&quot;</span>)
<span class="hljs-variable language_">self</span>.tree.column(<span class="hljs-string">&quot;role&quot;</span>, width=<span class="hljs-number">130</span>, anchor=<span class="hljs-string">&quot;w&quot;</span>)
<span class="hljs-variable language_">self</span>.tree.bind(<span class="hljs-string">&quot;&lt;&lt;TreeviewSelect&gt;&gt;&quot;</span>, <span class="hljs-variable language_">self</span>.on_select)
</code></pre>
<ul>
<li><code>show=&quot;headings&quot;</code> hides the default tree column; shows only named columns</li>
<li><code>iid=str(item.record_id)</code> lets us look up the source record by ID on selection</li>
<li>Details pane uses <code>tk.StringVar</code> bound to <code>ttk.Label</code> widgets for live updates</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<h2 id="demo-three-mandatory-acceptance-checks">Demo: Three Mandatory Acceptance Checks</h2>
<p>Run all three in front of students — any failure means the feature is not complete:</p>
<p><strong>No-selection check</strong></p>
<ul>
<li>Ensure nothing is selected → no exception; details pane shows &quot;No record selected&quot;</li>
</ul>
<p><strong>Empty-data check</strong></p>
<ul>
<li>Clear source, then refresh → list shows 0 rows; details shows &quot;No records available&quot;; no crash</li>
</ul>
<p><strong>Repeated-refresh check</strong></p>
<ul>
<li>Refresh three consecutive times → row count remains correct; no duplicate or stale rows</li>
</ul>
<blockquote>
<p>&quot;If your class implementation does not pass these three checks, it is not complete yet.&quot;<br />
— <code>Advanced/lessons/lecture/Day5_Hour4_Advanced.md</code> → Segment 4: Demo acceptance checks</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="en-US">
<h2 id="lab-build-list-and-details-ui-hour-20">Lab: Build List-and-Details UI (Hour 20)</h2>
<p><strong>Time: 26 minutes</strong></p>
<h3 id="tasks-2">Tasks</h3>
<ul>
<li>Scaffold a two-region layout — list area (Treeview recommended) + details pane with fallback text</li>
<li>Load in-memory records into the Treeview on startup</li>
<li>Bind <code>&lt;&lt;TreeviewSelect&gt;&gt;</code> and populate the details pane on valid selection; guard empty selection</li>
<li>Implement <code>refresh_records()</code> with the exact clear → repopulate → handle-selection sequence</li>
<li>Run all three acceptance checks (no-selection, empty-data, repeated-refresh)</li>
</ul>
<h3 id="completion-criteria-3">Completion criteria</h3>
<p>✓ List loads records<br />
✓ Selecting a row shows details<br />
✓ Refreshing does not duplicate rows</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="en-US">
<h2 id="common-pitfalls-hour-20">Common Pitfalls (Hour 20)</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Selection callback crashes when <code>tree.selection()</code> returns an empty tuple — guard it first<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Skipping the clear step in <code>refresh_records</code> — old rows stack on top of new rows<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Details pane shows stale content after source data is cleared and refreshed<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <code>iid</code> stored as an integer — Treeview requires a string <code>iid</code>; type mismatch crashes lookup<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Refresh sequence out of order — repopulate before clear causes visible duplicates<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Optional search/filter added before core acceptance checks pass — stabilize core first</p>
<p><strong>Quick Check:</strong> What can go wrong if you refresh without clearing existing rows? What must happen when no row is selected?</p>
</section>
