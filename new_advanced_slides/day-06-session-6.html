<h1 id="hour-21--update-and-delete-workflows">Hour 21 — Update and Delete Workflows</h1>
<h2 id="learning-outcomes">Learning Outcomes</h2>
<ul>
<li>Implement <strong>select → load → edit → save update</strong> workflow</li>
<li>Delete with confirmation via <code>messagebox.askyesno</code></li>
<li>Refresh the display after every mutation</li>
<li>Handle <code>NotFoundError</code> and <code>ValidationError</code> gracefully</li>
<li>Target records by <strong>stable ID</strong>, never by list index</li>
</ul>
<h3 id="source-alignment-1">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>## Learning objectives</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h2 id="why-updatedelete-are-harder-than-add">Why Update/Delete Are Harder Than Add</h2>
<table>
<thead>
<tr>
<th>Create</th>
<th>Update / Delete</th>
</tr>
</thead>
<tbody>
<tr>
<td>Read form</td>
<td>Identify the correct record</td>
</tr>
<tr>
<td>Validate</td>
<td>Keep selection state accurate</td>
</tr>
<tr>
<td>Save new record</td>
<td>Avoid stale widgets after refresh</td>
</tr>
<tr>
<td>Refresh list</td>
<td>Recover if the record is already gone</td>
</tr>
</tbody>
</table>
<blockquote>
<p>Display order is not identity. Stable IDs are.</p>
</blockquote>
<ul>
<li><strong>Fragile pattern</strong> — <code>records[selected_index] = ...</code></li>
<li><strong>Durable pattern</strong> — <code>service.update_item(selected_id, ...)</code></li>
</ul>
<h3 id="source-alignment-2">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 2) Why add is easy and update/delete are trickier</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="stable-ids-the-core-design-choice">Stable IDs: The Core Design Choice</h2>
<p>A stable ID is created <strong>once</strong>, when the record is created.</p>
<ul>
<li>Does <strong>not</strong> change when the record is edited</li>
<li>Does <strong>not</strong> depend on screen or sort order</li>
<li>Does <strong>not</strong> depend on list filtering</li>
<li><strong>Survives</strong> save/load cycles</li>
</ul>
<p><strong>Recommended form</strong> — a string UUID:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> uuid <span class="hljs-keyword">import</span> uuid4

item_id = <span class="hljs-built_in">str</span>(uuid4())  <span class="hljs-comment"># e.g. &quot;3f2b1c4e-...&quot;</span>
</code></pre>
<p>Keep <code>self.selected_item_id: str | None = None</code> in the <code>App</code> class.<br />
Capture it on selection. Pass it to every service call.</p>
<h3 id="source-alignment-3">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 3) Stable IDs: the core design choice</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="domain-model-trackeritem--trackerservice">Domain Model: TrackerItem + TrackerService</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> dataclasses <span class="hljs-keyword">import</span> dataclass
<span class="hljs-keyword">from</span> uuid <span class="hljs-keyword">import</span> uuid4


<span class="hljs-meta">@dataclass(<span class="hljs-params">slots=<span class="hljs-literal">True</span></span>)</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">TrackerItem</span>:
    item_id: <span class="hljs-built_in">str</span>
    name: <span class="hljs-built_in">str</span>
    category: <span class="hljs-built_in">str</span>
    status: <span class="hljs-built_in">str</span>
    notes: <span class="hljs-built_in">str</span> = <span class="hljs-string">&quot;&quot;</span>

<span class="hljs-meta">    @classmethod</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">create</span>(<span class="hljs-params">cls, name, category, status, notes=<span class="hljs-string">&quot;&quot;</span></span>):
        <span class="hljs-keyword">return</span> cls(item_id=<span class="hljs-built_in">str</span>(uuid4()), name=name,
                   category=category, status=status, notes=notes)
</code></pre>
<p>Service enforces validation and owns mutation:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">update_item</span>(<span class="hljs-params">self, item_id, name, category, status, notes=<span class="hljs-string">&quot;&quot;</span></span>):
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> name.strip():
        <span class="hljs-keyword">raise</span> ValidationError(<span class="hljs-string">&quot;Name is required.&quot;</span>)
    item = <span class="hljs-variable language_">self</span>.get_item(item_id)   <span class="hljs-comment"># raises NotFoundError if missing</span>
    item.name = name.strip()
    item.category = category.strip()
    item.status = status.strip()
    item.notes = notes.strip()
    <span class="hljs-keyword">return</span> item
</code></pre>
<h3 id="source-alignment-4">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 4) Example domain model and service reminder</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="selection-handler-capturing-the-stable-id">Selection Handler: Capturing the Stable ID</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_item_selected</span>(<span class="hljs-params">self, event=<span class="hljs-literal">None</span></span>):
    selection = <span class="hljs-variable language_">self</span>.tree.selection()
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> selection:
        <span class="hljs-variable language_">self</span>.selected_item_id = <span class="hljs-literal">None</span>
        <span class="hljs-keyword">return</span>

    values = <span class="hljs-variable language_">self</span>.tree.item(selection[<span class="hljs-number">0</span>], <span class="hljs-string">&quot;values&quot;</span>)
    item_id = values[<span class="hljs-number">0</span>]          <span class="hljs-comment"># first column stores the stable ID</span>
    <span class="hljs-variable language_">self</span>.selected_item_id = item_id

    <span class="hljs-keyword">try</span>:
        item = <span class="hljs-variable language_">self</span>.service.get_item(item_id)
    <span class="hljs-keyword">except</span> NotFoundError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Selection Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-variable language_">self</span>.refresh_items()
        <span class="hljs-variable language_">self</span>.clear_form()
        <span class="hljs-keyword">return</span>

    <span class="hljs-variable language_">self</span>.name_var.<span class="hljs-built_in">set</span>(item.name)
    <span class="hljs-variable language_">self</span>.category_var.<span class="hljs-built_in">set</span>(item.category)
    <span class="hljs-variable language_">self</span>.status_var.<span class="hljs-built_in">set</span>(item.status)
    <span class="hljs-variable language_">self</span>.notes_text.delete(<span class="hljs-string">&quot;1.0&quot;</span>, tk.END)
    <span class="hljs-variable language_">self</span>.notes_text.insert(<span class="hljs-string">&quot;1.0&quot;</span>, item.notes)
</code></pre>
<h3 id="source-alignment-5">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 5) Update workflow: select -&gt; load -&gt; edit -&gt; save update</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="update-handler">Update Handler</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_update</span>(<span class="hljs-params">self</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>.selected_item_id <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:
        messagebox.showwarning(<span class="hljs-string">&quot;No Selection&quot;</span>,
                               <span class="hljs-string">&quot;Please select a record to update.&quot;</span>)
        <span class="hljs-keyword">return</span>

    <span class="hljs-keyword">try</span>:
        updated = <span class="hljs-variable language_">self</span>.service.update_item(
            item_id=<span class="hljs-variable language_">self</span>.selected_item_id,
            name=<span class="hljs-variable language_">self</span>.name_var.get(),
            category=<span class="hljs-variable language_">self</span>.category_var.get(),
            status=<span class="hljs-variable language_">self</span>.status_var.get(),
            notes=<span class="hljs-variable language_">self</span>.notes_text.get(<span class="hljs-string">&quot;1.0&quot;</span>, tk.END).strip(),
        )
    <span class="hljs-keyword">except</span> ValidationError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Validation Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">except</span> NotFoundError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Update Failed&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-variable language_">self</span>.refresh_items()
        <span class="hljs-variable language_">self</span>.clear_form()
        <span class="hljs-variable language_">self</span>.selected_item_id = <span class="hljs-literal">None</span>
        <span class="hljs-keyword">return</span>

    <span class="hljs-variable language_">self</span>.refresh_items(selected_item_id=updated.item_id)
    <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">f&quot;Updated: <span class="hljs-subst">{updated.name}</span>&quot;</span>)
</code></pre>
<h3 id="source-alignment-6">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 5) Update workflow</code> — <code>on_update</code> example</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h2 id="delete-flow-and-confirmation">Delete Flow and Confirmation</h2>
<p>The delete checklist — always follow this order:</p>
<ol>
<li>Guard: ensure a record is actually selected</li>
<li>Fetch item name to show in the confirmation prompt</li>
<li>Ask with <code>messagebox.askyesno</code> — destructive actions need explicit consent</li>
<li>Call <code>service.delete_item(selected_id)</code></li>
<li>Refresh the list from the service layer</li>
<li>Clear stale form values and stale <code>selected_item_id</code></li>
<li>Show status feedback</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">confirmed = messagebox.askyesno(
    title=<span class="hljs-string">&quot;Confirm Delete&quot;</span>,
    message=<span class="hljs-string">f&quot;Delete &#x27;<span class="hljs-subst">{item.name}</span>&#x27;? This action cannot be undone right now.&quot;</span>,
)
<span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> confirmed:
    <span class="hljs-keyword">return</span>
</code></pre>
<blockquote>
<p>Canceling is part of correct behavior.</p>
</blockquote>
<h3 id="source-alignment-7">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 6) Delete workflow: confirm, delete by ID, refresh cleanly</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="delete-handler">Delete Handler</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_delete</span>(<span class="hljs-params">self</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>.selected_item_id <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:
        messagebox.showwarning(<span class="hljs-string">&quot;No Selection&quot;</span>, <span class="hljs-string">&quot;Select a record to delete.&quot;</span>)
        <span class="hljs-keyword">return</span>

    <span class="hljs-keyword">try</span>:
        item = <span class="hljs-variable language_">self</span>.service.get_item(<span class="hljs-variable language_">self</span>.selected_item_id)
    <span class="hljs-keyword">except</span> NotFoundError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Delete Failed&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-variable language_">self</span>.refresh_items()
        <span class="hljs-variable language_">self</span>.clear_form()
        <span class="hljs-variable language_">self</span>.selected_item_id = <span class="hljs-literal">None</span>
        <span class="hljs-keyword">return</span>

    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> messagebox.askyesno(<span class="hljs-string">&quot;Confirm Delete&quot;</span>,
                                <span class="hljs-string">f&quot;Delete &#x27;<span class="hljs-subst">{item.name}</span>&#x27;?&quot;</span>):
        <span class="hljs-keyword">return</span>

    <span class="hljs-keyword">try</span>:
        <span class="hljs-variable language_">self</span>.service.delete_item(item.item_id)
    <span class="hljs-keyword">except</span> NotFoundError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Delete Failed&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-keyword">return</span>

    <span class="hljs-variable language_">self</span>.refresh_items()
    <span class="hljs-variable language_">self</span>.clear_form()
    <span class="hljs-variable language_">self</span>.selected_item_id = <span class="hljs-literal">None</span>
    <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">f&quot;Deleted: <span class="hljs-subst">{item.name}</span>&quot;</span>)
</code></pre>
<h3 id="source-alignment-8">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 6) Delete workflow</code> — <code>on_delete</code> example</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<h2 id="refresh-pattern-one-source-of-truth">Refresh Pattern: One Source of Truth</h2>
<p>Rebuild the list from the service layer every time data changes:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">refresh_items</span>(<span class="hljs-params">self, selected_item_id=<span class="hljs-literal">None</span></span>):
    <span class="hljs-keyword">for</span> row_id <span class="hljs-keyword">in</span> <span class="hljs-variable language_">self</span>.tree.get_children():
        <span class="hljs-variable language_">self</span>.tree.delete(row_id)

    <span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> <span class="hljs-variable language_">self</span>.service.list_items():
        row_id = <span class="hljs-variable language_">self</span>.tree.insert(
            <span class="hljs-string">&quot;&quot;</span>, tk.END,
            values=(item.item_id, item.name, item.category, item.status),
        )
        <span class="hljs-keyword">if</span> selected_item_id == item.item_id:
            <span class="hljs-variable language_">self</span>.tree.selection_set(row_id)
            <span class="hljs-variable language_">self</span>.tree.focus(row_id)
</code></pre>
<p>Any code path that changes data calls <strong>one</strong> refresh method.<br />
Do not patch visual details by hand — rebuild from the service.</p>
<h3 id="source-alignment-9">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 8) What the list refresh should do</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h2 id="lab-gui-updatedelete-round-trip">Lab: GUI Update/Delete Round Trip</h2>
<p><strong>Time — 25–35 minutes</strong></p>
<h3 id="tasks">Tasks</h3>
<ol>
<li>Wire row selection so the form loads the selected record</li>
<li>Track the selected record's stable ID</li>
<li>Implement <strong>Update</strong> — send changes to the service layer</li>
<li>Implement <strong>Delete</strong> with confirmation dialog</li>
<li>Refresh the list automatically after each change</li>
<li>Handle <code>NotFoundError</code> and <code>ValidationError</code> with user-facing messages</li>
</ol>
<h3 id="completion-criteria">Completion Criteria</h3>
<p>✓ Update works reliably and targets the correct record<br />
✓ Delete works reliably with confirmation<br />
✓ UI stays in sync after each change<br />
✓ Selection maps to a stable ID, not a row index</p>
<h3 id="source-alignment-10">Source Alignment</h3>

<li><code>Advanced/lessons/lecture/Day6_Hour1_Advanced.md</code> → <code>### 10) Guided practice prompt</code></li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h2 id="common-pitfalls--hour-21">Common Pitfalls — Hour 21</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Using list index as the record ID</strong> — breaks after insert, delete, or sort<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Mutating stale widget state</strong> — always reload from the service after any change<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Deleting while pointing at a stale selection</strong> — guard with an early nil-check<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Forgetting to refresh after update/delete</strong> — UI falls out of sync silently<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Suppressing <code>NotFoundError</code></strong> — stale IDs are a design signal, not noise</p>
<h2 id="quick-check">Quick Check</h2>
<blockquote>
<p>Why is a stable ID better than relying on a visual row index?</p>
</blockquote>
<p>Expected answer: row positions change after insertions, deletes, and re-sorts.<br />
An ID created once at record creation survives all of those events.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="en-US">
<h1 id="hour-22--gui-architecture-and-controller-separation">Hour 22 — GUI Architecture and Controller Separation</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Recognize the symptoms of callback spaghetti</li>
<li>Refactor toward a <code>TrackerApp</code> controller class</li>
<li>Keep callbacks thin — collect input, call service, update screen</li>
<li>Separate widget construction from event-handling logic</li>
<li>Manage <code>selected_item_id</code> and status state in one clear place</li>
<li>Avoid circular imports by enforcing a one-way dependency direction</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h2 id="what-callback-spaghetti-looks-like">What Callback Spaghetti Looks Like</h2>
<p>Common symptoms in a growing GUI codebase:</p>
<ul>
<li>Many top-level functions with <strong>unclear ownership</strong></li>
<li>Globals for widgets: <code>name_entry</code>, <code>tree</code>, <code>status_label</code></li>
<li>Duplicate form-reading logic in every handler</li>
<li>Duplicate refresh logic after every action</li>
<li><strong>Business rules embedded directly in callbacks</strong></li>
<li>Mysterious bugs from stale selection state</li>
<li>Hard-to-test code because logic is fused to UI objects</li>
</ul>
<h3 id="the-smell-test">The smell test</h3>
<blockquote>
<p>If adding <strong>one button</strong> means editing six scattered unrelated functions,<br />
the problem is structure, not Tkinter.</p>
</blockquote>
<h3 id="source-alignment-12">Source Alignment</h3>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h2 id="before-global-state-mess">Before: Global-State Mess</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">service = TrackerService()
selected_item_id = <span class="hljs-literal">None</span>       <span class="hljs-comment"># global — shared, unmanaged</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">update_item</span>():
    <span class="hljs-keyword">global</span> selected_item_id
    name = name_entry.get()             <span class="hljs-comment"># repeated form reads</span>
    category = category_entry.get()
    status = status_combo.get()
    notes = notes_text.get(<span class="hljs-string">&quot;1.0&quot;</span>, <span class="hljs-string">&quot;end&quot;</span>).strip()
    service.update_item(selected_item_id, name, category, status, notes)
    refresh_tree()             <span class="hljs-comment"># duplicated in add_item and delete_item</span>
    status_label.config(text=<span class="hljs-string">&quot;Updated item&quot;</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">delete_item</span>():
    <span class="hljs-keyword">global</span> selected_item_id
    service.delete_item(selected_item_id)   <span class="hljs-comment"># no confirmation, no error guard</span>
    refresh_tree()
    clear_form()
</code></pre>

<h2 id="thin-callbacks-get_form_data--on_add">Thin Callbacks: get_form_data + on_add</h2>
<p>Extract repeated form-reading into <strong>one</strong> helper:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">get_form_data</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">str</span>]:
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;name&quot;</span>:     <span class="hljs-variable language_">self</span>.name_var.get(),
        <span class="hljs-string">&quot;category&quot;</span>: <span class="hljs-variable language_">self</span>.category_var.get(),
        <span class="hljs-string">&quot;status&quot;</span>:   <span class="hljs-variable language_">self</span>.status_var.get(),
        <span class="hljs-string">&quot;notes&quot;</span>:    <span class="hljs-variable language_">self</span>.notes_text.get(<span class="hljs-string">&quot;1.0&quot;</span>, tk.END).strip(),
    }
</code></pre>
<p>Callback now reads like a policy statement:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_add</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
    <span class="hljs-keyword">try</span>:
        item = <span class="hljs-variable language_">self</span>.service.add_item(**<span class="hljs-variable language_">self</span>.get_form_data())
    <span class="hljs-keyword">except</span> ValidationError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Validation Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-keyword">return</span>

    <span class="hljs-variable language_">self</span>.refresh_items(selected_item_id=item.item_id)
    <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">f&quot;Added: <span class="hljs-subst">{item.name}</span>&quot;</span>)
    <span class="hljs-variable language_">self</span>.clear_form(keep_status=<span class="hljs-literal">True</span>)
</code></pre>
<blockquote>
<p>One callback removed three duplicated form-read blocks.</p>
</blockquote>

<li><code>Advanced/lessons/lecture/Day6_Hour2_Advanced.md</code> → <code>### 9) Thin callbacks as methods</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="en-US">
<h2 id="state-management-selection-and-status">State Management: Selection and Status</h2>
<p><strong>Keep</strong> cleanly named app state on <code>self</code>:</p>
<ul>
<li><code>self.selected_item_id</code> — the one piece of identity state</li>
<li><code>self.status_text</code> — a <code>StringVar</code> the status label binds to</li>
<li><code>self.name_var</code>, <code>self.category_var</code>, <code>self.status_var</code> — form mirrors</li>
</ul>
<p><strong>Avoid</strong> hidden state:</p>
<ul>
<li>globals changed from multiple functions</li>
<li>relying on whatever tree row still exists after refresh</li>
<li>leaving form fields populated with unknown record content</li>
</ul>
<p><code>set_status</code> stays trivial:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">set_status</span>(<span class="hljs-params">self, message: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-literal">None</span>:
    <span class="hljs-variable language_">self</span>.status_text.<span class="hljs-built_in">set</span>(message)
</code></pre>
<p>Centralize. Name everything. One owner per piece of state.</p>
<h3 id="source-alignment-18">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour2_Advanced.md</code> → <code>### 10) State management: selection and status</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h2 id="module-boundaries-and-import-direction">Module Boundaries and Import Direction</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">main.py          assembles dependencies
  ↓ imports
ui/app.py        imports service + exceptions
  ↓ imports
core/service.py  imports models + exceptions
  ↓ imports
core/models.py   no imports from ui or service
</code></pre>
<p><strong>Rule</strong> — <code>core/service.py</code> must <strong>never</strong> import <code>ui/app.py</code>.</p>
<p>If that boundary breaks:</p>
<ol>
<li>Step back before debugging behavior</li>
<li>Re-establish one-way dependency</li>
<li>Use dependency injection to pass objects rather than importing</li>
</ol>
<h3 id="source-alignment-19">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour2_Advanced.md</code> → <code>### 12) Circular imports and module boundaries</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<h2 id="refactor-strategy-move-one-piece-at-a-time">Refactor Strategy: Move One Piece at a Time</h2>
<p>Safe sequence — never rewrite the whole GUI from scratch:</p>
<ol>
<li><strong>Freeze behavior</strong> — run the app once; record what works; commit or backup</li>
<li><strong>Create the class shell</strong> — open a window from <code>TrackerApp.__init__</code></li>
<li><strong>Move widget creation</strong> into <code>build_ui()</code>; verify window still opens</li>
<li><strong>Move one callback</strong> (Add first); test immediately</li>
<li><strong>Extract helpers</strong> — <code>get_form_data()</code>, <code>clear_form()</code>, <code>refresh_items()</code></li>
<li><strong>Move remaining callbacks</strong> — Update, Delete, selection handler</li>
<li><strong>Verify</strong> behavior is unchanged end-to-end</li>
<li><strong>Split modules</strong> only after the class is stable</li>
</ol>
<blockquote>
<p>Behavior must be preserved at every step.<br />
A refactor that breaks working features is a regression, not progress.</p>
</blockquote>
<h3 id="source-alignment-20">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour2_Advanced.md</code> → <code>### 13) Refactor strategy: do not rebuild the plane midair</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">
<h2 id="lab-refactor-without-breaking-behavior">Lab: Refactor Without Breaking Behavior</h2>
<p><strong>Time — 25–35 minutes</strong></p>
<h3 id="required-tasks">Required Tasks</h3>
<ul>
<li>Create a <code>TrackerApp</code> class that builds and owns the interface</li>
<li>Move widget references into <code>build_ui()</code> on <code>self</code></li>
<li>Move event handlers into methods on the class</li>
<li>Extract <code>get_form_data()</code> and <code>refresh_items()</code> helpers</li>
<li>Keep add/update/delete/select behavior working correctly</li>
<li>Confirm business rules remain in the service layer</li>
</ul>
<h3 id="completion-criteria-1">Completion Criteria</h3>
<p>✓ New teammate can locate widget creation and callback logic quickly<br />
✓ App launches and performs CRUD correctly after refactor<br />
✓ Selection state is managed in one clear place<br />
✓ No new circular import problems introduced</p>
<h3 id="source-alignment-21">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour2_Advanced.md</code> → <code>### 15) Practice lab script</code></li>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="en-US">
<h2 id="common-pitfalls--hour-22">Common Pitfalls — Hour 22</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Over-refactoring midstream</strong> — move one thing, test, then move the next<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Callback spaghetti inside a class</strong> — a class wrapper does not fix scattered logic<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Circular imports</strong> — if <code>service.py</code> imports <code>app.py</code>, re-establish one-way deps<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Controller as the business brain</strong> — keep validation and domain logic in the service<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Giant <code>build_ui()</code> method</strong> — extract <code>build_form()</code>, <code>build_buttons()</code>, <code>build_list()</code></p>
<h2 id="quick-check-1">Quick Check</h2>
<blockquote>
<p>What is one sign that your GUI code needs refactoring?</p>
</blockquote>
<p>Strong answer: <em>&quot;If adding one button requires editing five scattered globals or functions,<br />
the structure is the problem.&quot;</em></p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="en-US">
<h2 id="why-json-now-not-sqlite">Why JSON Now, Not SQLite</h2>
<table>
<thead>
<tr>
<th>Criterion</th>
<th>JSON today</th>
<th>SQLite next session</th>
</tr>
</thead>
<tbody>
<tr>
<td>Human-readable</td>
<td>✓ easy to inspect</td>
<td>✗ binary format</td>
</tr>
<tr>
<td>Setup cost</td>
<td>✓ zero</td>
<td>requires schema DDL</td>
</tr>
<tr>
<td>Debug speed</td>
<td>✓ open in editor</td>
<td>requires tooling</td>
</tr>
<tr>
<td>Query power</td>
<td>limited</td>
<td>✓ SQL</td>
</tr>
<tr>
<td>Concurrent writes</td>
<td>limited</td>
<td>✓ supported</td>
</tr>
</tbody>
</table>
<blockquote>
<p>&quot;Good engineers start with the solution that best fits the milestone.&quot;</p>
</blockquote>
<p>Architecture matters here:</p>
<ul>
<li>Strong service boundaries today make the SQLite swap <strong>cheaper</strong> tomorrow</li>
<li>Stability beats novelty in a checkpoint week</li>
</ul>
<h3 id="source-alignment-23">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour3_Advanced.md</code> → <code>### 2) Why JSON now instead of SQLite now</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="en-US">
<h2 id="service-side-json-persistence">Service-Side JSON Persistence</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> __future__ <span class="hljs-keyword">import</span> annotations
<span class="hljs-keyword">import</span> json
<span class="hljs-keyword">from</span> dataclasses <span class="hljs-keyword">import</span> asdict
<span class="hljs-keyword">from</span> pathlib <span class="hljs-keyword">import</span> Path


<span class="hljs-keyword">class</span> <span class="hljs-title class_">StorageError</span>(<span class="hljs-title class_ inherited__">Exception</span>):
    <span class="hljs-keyword">pass</span>


<span class="hljs-keyword">class</span> <span class="hljs-title class_">TrackerService</span>:
    <span class="hljs-comment"># ... existing CRUD methods ...</span>

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">save_to_json</span>(<span class="hljs-params">self, file_path: Path</span>) -&gt; <span class="hljs-literal">None</span>:
        data = [asdict(item) <span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> <span class="hljs-variable language_">self</span>._items]
        <span class="hljs-keyword">try</span>:
            file_path.parent.mkdir(parents=<span class="hljs-literal">True</span>, exist_ok=<span class="hljs-literal">True</span>)
            file_path.write_text(json.dumps(data, indent=<span class="hljs-number">2</span>), encoding=<span class="hljs-string">&quot;utf-8&quot;</span>)
        <span class="hljs-keyword">except</span> OSError <span class="hljs-keyword">as</span> error:
            <span class="hljs-keyword">raise</span> StorageError(<span class="hljs-string">f&quot;Unable to save: <span class="hljs-subst">{error}</span>&quot;</span>) <span class="hljs-keyword">from</span> error

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">load_from_json</span>(<span class="hljs-params">self, file_path: Path</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> file_path.exists():
            <span class="hljs-variable language_">self</span>._items = []
            <span class="hljs-keyword">return</span>
        <span class="hljs-keyword">try</span>:
            raw = json.loads(file_path.read_text(encoding=<span class="hljs-string">&quot;utf-8&quot;</span>))
        <span class="hljs-keyword">except</span> json.JSONDecodeError <span class="hljs-keyword">as</span> error:
            <span class="hljs-keyword">raise</span> StorageError(<span class="hljs-string">f&quot;Invalid JSON: <span class="hljs-subst">{error}</span>&quot;</span>) <span class="hljs-keyword">from</span> error
        <span class="hljs-keyword">except</span> OSError <span class="hljs-keyword">as</span> error:
            <span class="hljs-keyword">raise</span> StorageError(<span class="hljs-string">f&quot;Cannot read file: <span class="hljs-subst">{error}</span>&quot;</span>) <span class="hljs-keyword">from</span> error
        <span class="hljs-variable language_">self</span>._items = [TrackerItem(**r) <span class="hljs-keyword">for</span> r <span class="hljs-keyword">in</span> raw]
</code></pre>
<h3 id="source-alignment-24">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour3_Advanced.md</code> → <code>### 4) Example: service-side JSON persistence</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="en-US">
<h2 id="load-on-startup">Load on Startup</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> pathlib <span class="hljs-keyword">import</span> Path
<span class="hljs-keyword">from</span> tkinter <span class="hljs-keyword">import</span> messagebox


<span class="hljs-keyword">class</span> <span class="hljs-title class_">TrackerApp</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, root, service</span>):
        <span class="hljs-variable language_">self</span>.root = root
        <span class="hljs-variable language_">self</span>.service = service
        <span class="hljs-variable language_">self</span>.data_file = Path(<span class="hljs-string">&quot;data/tracker_items.json&quot;</span>)
        <span class="hljs-variable language_">self</span>.selected_item_id = <span class="hljs-literal">None</span>
        <span class="hljs-variable language_">self</span>.status_text = tk.StringVar(value=<span class="hljs-string">&quot;Ready&quot;</span>)
        <span class="hljs-variable language_">self</span>.name_var = tk.StringVar()
        <span class="hljs-variable language_">self</span>.category_var = tk.StringVar()
        <span class="hljs-variable language_">self</span>.status_var = tk.StringVar()

        <span class="hljs-variable language_">self</span>.build_ui()
        <span class="hljs-variable language_">self</span>.load_data_on_startup()   <span class="hljs-comment"># load before first refresh</span>
        <span class="hljs-variable language_">self</span>.refresh_items()

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">load_data_on_startup</span>(<span class="hljs-params">self</span>):
        <span class="hljs-keyword">try</span>:
            <span class="hljs-variable language_">self</span>.service.load_from_json(<span class="hljs-variable language_">self</span>.data_file)
        <span class="hljs-keyword">except</span> StorageError <span class="hljs-keyword">as</span> error:
            messagebox.showerror(<span class="hljs-string">&quot;Load Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
            <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">&quot;Started with empty data — load error&quot;</span>)
            <span class="hljs-keyword">return</span>
        <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">f&quot;Loaded <span class="hljs-subst">{<span class="hljs-built_in">len</span>(self.service.list_items())}</span> items&quot;</span>)
</code></pre>
<p>Missing file on first run is <strong>normal</strong>, not an error.</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h2 id="persist_changes-helper">persist_changes() Helper</h2>
<p>Use a <strong>single</strong> helper so all three callbacks call the same save logic:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">persist_changes</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-built_in">bool</span>:
    <span class="hljs-keyword">try</span>:
        <span class="hljs-variable language_">self</span>.service.save_to_json(<span class="hljs-variable language_">self</span>.data_file)
    <span class="hljs-keyword">except</span> StorageError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Save Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">&quot;Save failed&quot;</span>)
        <span class="hljs-keyword">return</span> <span class="hljs-literal">False</span>
    <span class="hljs-variable language_">self</span>.set_status(<span class="hljs-string">&quot;Changes saved&quot;</span>)
    <span class="hljs-keyword">return</span> <span class="hljs-literal">True</span>
</code></pre>
<blockquote>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Saving only after add, and forgetting update/delete,<br />
is the <strong>most common persistence bug</strong> at this stage.</p>
</blockquote>
<p>The pattern for every mutation callback:</p>
<ol>
<li>Do the domain action via service</li>
<li>Call <code>persist_changes()</code></li>
<li>Refresh the interface</li>
<li>Give status feedback</li>
</ol>
<h3 id="source-alignment-26">Source Alignment</h3>
<ul>
<li><code>Advanced/lessons/lecture/Day6_Hour3_Advanced.md</code> → <code>### 6) Save after each CRUD operation</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<h2 id="crud-callbacks-with-persistence-hooks">CRUD Callbacks With Persistence Hooks</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">on_add</span>(<span class="hljs-params">self</span>):
    <span class="hljs-keyword">try</span>:
        item = <span class="hljs-variable language_">self</span>.service.add_item(**<span class="hljs-variable language_">self</span>.get_form_data())
    <span class="hljs-keyword">except</span> ValidationError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Validation Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-keyword">return</span>
    <span class="hljs-variable language_">self</span>.persist_changes()
    <span class="hljs-variable language_">self</span>.refresh_items(selected_item_id=item.item_id)
    <span class="hljs-variable language_">self</span>.clear_form(keep_status=<span class="hljs-literal">True</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">on_update</span>(<span class="hljs-params">self</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>.selected_item_id <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:
        messagebox.showwarning(<span class="hljs-string">&quot;No Selection&quot;</span>, <span class="hljs-string">&quot;Select a record to update.&quot;</span>)
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">try</span>:
        item = <span class="hljs-variable language_">self</span>.service.update_item(<span class="hljs-variable language_">self</span>.selected_item_id,
                                         **<span class="hljs-variable language_">self</span>.get_form_data())
    <span class="hljs-keyword">except</span> (ValidationError, NotFoundError) <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Update Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-keyword">return</span>
    <span class="hljs-variable language_">self</span>.persist_changes()
    <span class="hljs-variable language_">self</span>.refresh_items(selected_item_id=item.item_id)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">on_delete</span>(<span class="hljs-params">self</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>.selected_item_id <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:
        messagebox.showwarning(<span class="hljs-string">&quot;No Selection&quot;</span>, <span class="hljs-string">&quot;Select a record to delete.&quot;</span>)
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">try</span>:
        item = <span class="hljs-variable language_">self</span>.service.get_item(<span class="hljs-variable language_">self</span>.selected_item_id)
    <span class="hljs-keyword">except</span> NotFoundError <span class="hljs-keyword">as</span> error:
        messagebox.showerror(<span class="hljs-string">&quot;Delete Error&quot;</span>, <span class="hljs-built_in">str</span>(error))
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> messagebox.askyesno(<span class="hljs-string">&quot;Confirm Delete&quot;</span>, <span class="hljs-string">f&quot;Delete &#x27;<span class="hljs-subst">{item.name}</span>&#x27;?&quot;</span>):
        <span class="hljs-keyword">return</span>
    <span class="hljs-variable language_">self</span>.service.delete_item(item.item_id)
    <span class="hljs-variable language_">self</span>.persist_changes()
    <span class="hljs-variable language_">self</span>.refresh_items()
    <span class="hljs-variable language_">self</span>.clear_form(keep_status=<span class="hljs-literal">True</span>)
    <span class="hljs-variable language_">self</span>.selected_item_id = <span class="hljs-literal">None</span>
</code></pre>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="en-US">
<h2 id="graceful-json-error-handling">Graceful JSON Error Handling</h2>
<p>Three failure scenarios the app must survive:</p>
<table>
<thead>
<tr>
<th>Scenario</th>
<th>Expected behavior</th>
</tr>
</thead>
<tbody>
<tr>
<td>File missing on first launch</td>
<td>Start with empty list; no crash</td>
</tr>
<tr>
<td>File corrupted or invalid JSON</td>
<td>Show <code>showerror</code> dialog; continue with empty list</td>
</tr>
<tr>
<td>Disk write failure on save</td>
<td>Show <code>showerror</code> dialog; data stays in memory</td>
</tr>
</tbody>
</table>
<p><strong>Never</strong> let a JSON error produce a raw traceback for the user.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">except</span> json.JSONDecodeError <span class="hljs-keyword">as</span> error:
    <span class="hljs-keyword">raise</span> StorageError(<span class="hljs-string">f&quot;The data file is not valid JSON: <span class="hljs-subst">{error}</span>&quot;</span>) <span class="hljs-keyword">from</span> error
</code></pre>
<p>Recovery strategy for malformed file:</p>
<ul>
<li>Show error dialog</li>
<li>Keep app open with current in-memory state or empty list</li>

<h2 id="optional-jsontrackerstore-for-stronger-separation">Optional: JsonTrackerStore for Stronger Separation</h2>
<p>If the class is moving quickly, show a dedicated storage helper:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">JsonTrackerStore</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, file_path: Path</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-variable language_">self</span>.file_path = file_path

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">save_items</span>(<span class="hljs-params">self, items: <span class="hljs-built_in">list</span>[TrackerItem]</span>) -&gt; <span class="hljs-literal">None</span>:
        payload = [asdict(item) <span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> items]
        <span class="hljs-variable language_">self</span>.file_path.parent.mkdir(parents=<span class="hljs-literal">True</span>, exist_ok=<span class="hljs-literal">True</span>)
        <span class="hljs-variable language_">self</span>.file_path.write_text(json.dumps(payload, indent=<span class="hljs-number">2</span>),
                                   encoding=<span class="hljs-string">&quot;utf-8&quot;</span>)

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">load_items</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-built_in">list</span>[TrackerItem]:
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-variable language_">self</span>.file_path.exists():
            <span class="hljs-keyword">return</span> []
        raw = json.loads(<span class="hljs-variable language_">self</span>.file_path.read_text(encoding=<span class="hljs-string">&quot;utf-8&quot;</span>))
        <span class="hljs-keyword">return</span> [TrackerItem(**r) <span class="hljs-keyword">for</span> r <span class="hljs-keyword">in</span> raw]
</code></pre>
<p><strong>Note</strong> — the checkpoint does not require this abstraction.<br />
Use it only if the class has time and the architecture discussion is productive.</p>

<h2 id="usability-polish-menu-and-keyboard-shortcut">Usability Polish: Menu and Keyboard Shortcut</h2>
<p>Polish is <strong>not</strong> decoration — it teaches users what the app is doing.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">build_menu</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-literal">None</span>:
    menubar = tk.Menu(<span class="hljs-variable language_">self</span>.root)

    file_menu = tk.Menu(menubar, tearoff=<span class="hljs-literal">False</span>)
    file_menu.add_command(label=<span class="hljs-string">&quot;Save&quot;</span>,
                          command=<span class="hljs-variable language_">self</span>.persist_changes,
                          accelerator=<span class="hljs-string">&quot;Ctrl+S&quot;</span>)
    file_menu.add_separator()
    file_menu.add_command(label=<span class="hljs-string">&quot;Exit&quot;</span>, command=<span class="hljs-variable language_">self</span>.root.destroy)
    menubar.add_cascade(label=<span class="hljs-string">&quot;File&quot;</span>, menu=file_menu)

    help_menu = tk.Menu(menubar, tearoff=<span class="hljs-literal">False</span>)
    help_menu.add_command(label=<span class="hljs-string">&quot;About&quot;</span>, command=<span class="hljs-variable language_">self</span>.show_about)
    menubar.add_cascade(label=<span class="hljs-string">&quot;Help&quot;</span>, menu=help_menu)

    <span class="hljs-variable language_">self</span>.root.config(menu=menubar)
    <span class="hljs-variable language_">self</span>.root.bind(<span class="hljs-string">&quot;&lt;Control-s&gt;&quot;</span>,
                   <span class="hljs-keyword">lambda</span> event: <span class="hljs-variable language_">self</span>.persist_changes())
</code></pre>

default focus on startup, hide ID column visually while keeping it internally.</p>

<h2 id="common-pitfalls--hour-23">Common Pitfalls — Hour 23</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Saving after add, but forgetting update/delete</strong> — persistence is inconsistent<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Crashing on malformed JSON</strong> — always wrap <code>json.loads</code> in exception handling<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Storing widget state instead of domain objects</strong> — serialize <code>TrackerItem</code>, not UI details<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Dropping stable IDs on save</strong> — the JSON must preserve existing <code>item_id</code> values<br />
<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Polishing visuals before save/load actually works</strong> — a stylish app that loses data is a failed milestone</p>
<h2 id="quick-check-2">Quick Check</h2>
<blockquote>
<p>Why must save happen after <strong>update</strong> and <strong>delete</strong>, not only after add?</p>
</blockquote>
<p>Strong answer: <em>&quot;The JSON file must reflect the current source of truth.<br />
Forgetting to save after update or delete creates a mismatch between what the user sees and what persists after restart.&quot;</em></p>
</section>

<h2 id="must-pass-gates">Must-Pass Gates</h2>
<h3 id="gate-1--stable-identity-for-update-and-delete">Gate 1 — Stable Identity for Update and Delete</h3>
<p>Update and delete must target stable IDs, not row index, <strong>including after restart and load</strong>.</p>
<p>Fail indicators: wrong record changes after insert or sorting; behavior differs after reload.</p>
<h3 id="gate-2--service-or-core-validation">Gate 2 — Service or Core Validation</h3>
<p>Validation must exist in service or core layer. UI calls service and handles raised errors.</p>
<p>Fail indicators: service accepts invalid state when called directly; different UI paths bypass rules.</p>
<h3 id="gate-3--typical-error-path-resilience">Gate 3 — Typical Error Path Resilience</h3>
<p>At least one typical error path must be demonstrated without crash.</p>
<p>Examples: update with no selection, delete with no selection, invalid field, missing JSON on first launch.</p>
<blockquote>
<p>If Gate 1 fails → maximum status is <strong>Partial</strong>.<br />
If Gate 2 fails → architecture band capped at Partial.<br />
If Gate 3 fails → error handling capped at low band.</p>
</blockquote>

<h2 id="triage-playbooks-for-common-blockers">Triage Playbooks for Common Blockers</h2>
<h3 id="blocker-1--wrong-row-updates-after-insert-or-reload">Blocker 1 — Wrong row updates after insert or reload</h3>
<p>Questions: &quot;What uniquely identifies a record in your model?&quot; / &quot;Where is that value stored in the UI list?&quot;<br />
Fix: persist IDs in JSON; bind selection to ID, not visual index; re-run canonical flow after restart.</p>
<h3 id="blocker-2--service-bypasses-validation">Blocker 2 — Service bypasses validation</h3>
<p>Questions: &quot;Where is the authoritative validation function?&quot; / &quot;What error is raised for invalid data?&quot;<br />
Fix: move rule into service or model; UI handles raised error; keep lightweight UI pre-validation for UX only.</p>
<h3 id="blocker-3--crash-on-typical-error-path">Blocker 3 — Crash on typical error path</h3>
<p>Questions: &quot;Which exception is thrown?&quot; / &quot;Where is it caught?&quot; / &quot;What does the user see?&quot;<br />
Fix: add guard clauses before service calls; wrap fragile boundaries; keep event loop responsive.</p>
<h3 id="blocker-4--launch-reliability-inconsistency">Blocker 4 — Launch reliability inconsistency</h3>
<p>Questions: &quot;How do you resolve the data file path at runtime?&quot; / &quot;What working-directory assumptions are hard-coded?&quot;<br />
Fix: use <code>Path(__file__).parent / &quot;data/tracker_items.json&quot;</code> instead of bare relative paths.</p>
