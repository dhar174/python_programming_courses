parallel structure)</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; Instructor<span class=\"hljs-symbol\">/</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; lessons<span class=\"hljs-operator\">/</span>lecture<span class=\"hljs-symbol\">/</span>             <span class=\"hljs-comment\">#   48 per-hour lecture scripts</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; lessons<span class=\"hljs-operator\">/</span>slides<span class=\"hljs-symbol\">/</span>              <span class=\"hljs-comment\">#   Slide sources plus checked-in standalone HTML decks</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; assignments<span class=\"hljs-symbol\">/</span>\n&#x2502;   &#x2514;&#x2500;&#x2500; quizzes<span class=\"hljs-symbol\">/</span>\n&#x2502;\n&#x251c;&#x2500;&#x2500; _site<span class=\"hljs-operator\">/</span>slides<span class=\"hljs-symbol\">/</span>                    <span class=\"hljs-comment\"># Build output (generated by CI, not committed)</span>\n&#x2502;\n&#x251c;&#x2500;&#x2500; .github<span class=\"hljs-symbol\">/</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; workflows<span class=\"hljs-symbol\">/</span>\n&#x2502;   &#x2502;   &#x251c;&#x2500;&#x2500; marp-action.yml          <span class=\"hljs-comment\">#   Slide build &#x2192; GitHub Pages deployment</span>\n&#x2502;   &#x2502;   &#x2514;&#x2500;&#x2500; autograder.yml           <span class=\"hljs-comment\">#   Homework + quiz grading pipeline</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; agents<span class=\"hljs-symbol\">/</span>                      <span class=\"hljs-comment\">#   10 custom AI agent definitions</span>\n&#x2502;   &#x251c;&#x2500;&#x2500; instructions<span class=\"hljs-symbol\">/</span>                <span class=\"hljs-comment\">#   Per-module Copilot instructions</span>\n&#x2502;   &#x2514;&#x2500;&#x2500; skills<span class=\"hljs-symbol\">/</span>                      <span class=\"hljs-comment\">#   50+ repo-local agent skill definitions</span>\n&#x2502;\n&#x251c;&#x2500;&#x2500; AGENTS.md                        <span class=\"hljs-comment\"># &#x2b50; Primary contributor + agent documentation</span>\n&#x251c;&#x2500;&#x2500; REPOSITORY_SUMMARY.md            <span class=\"hljs-comment\"># Technical architecture deep-dive</span>\n&#x251c;&#x2500;&#x2500; Architecture.md                  <span class=\"hljs-comment\"># Design principles and constraints</span>\n&#x251c;&#x2500;&#x2500; Plans.md                         <span class=\"hljs-comment\"># Milestone tracking</span>\n&#x251c;&#x2500;&#x2500; Documentation.md                 <span class=\"hljs-comment\"># Decision log and milestone status</span>\n&#x251c;&#x2500;&#x2500; .marprc.yml                      <span class=\"hljs-comment\"># Basics Marp build configuration used by CI</span>\n&#x251c;&#x2500;&#x2500; .marprc.advanced.yml             <span class=\"hljs-comment\"># Advanced Marp build configuration used by CI</span>\n&#x251c;&#x2500;&#x2500; .marprc.basics.yml               <span class=\"hljs-comment\"># Additional Basics config file currently not referenced by the workflow</span>\n&#x2514;&#x2500;&#x2500; spec<span class=\"hljs-symbol\">/</span>\n    &#x251c;&#x2500;&#x2500; spec-process-cicd-marp-action.md    <span class=\"hljs-comment\"># Slide publishing workflow specification</span>\n    &#x2514;&#x2500;&#x2500; spec-process-project-completion.md  <span class=\"hljs-comment\"># Completion criteria and acceptance tests</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"184,225"}}],"payload":{"tag":"h2","lines":"182,183"}},{"content":"CI/CD Pipelines","children":[{"content":"Slide Build &amp; Deploy (<code>marp-action.yml</code>)","children":[{"content":"<code>marp-action.yml</code> Behavior","children":[{"content":"1. <strong>Build Basics output</strong> from <code>Basics/lessons/slides</code> into <code>_site/slides/basics</code> using <code>.marprc.yml</code>.","children":[],"payload":{"tag":"li","lines":"243,244","listIndex":1}},{"content":"2. <strong>Build Advanced output</strong> from <code>Advanced/lessons/slides</code> into <code>_site/slides/advanced</code> using <code>.marprc.advanced.yml</code>.","children":[],"payload":{"tag":"li","lines":"244,245","listIndex":2}},{"content":"3. <strong>Remove top-level README artifacts</strong> from generated output so the published module roots expose decks and indexes instead of root README files.","children":[],"payload":{"tag":"li","lines":"245,246","listIndex":3}},{"content":"4. <strong>Verify published HTML exists</strong> for both modules. If a generated module tree is missing usable HTML, the workflow falls back to copying the checked-in standalone slide site from <code>Basics/lessons/slides</code> or <code>Advanced/lessons/slides</code>.","children":[],"payload":{"tag":"li","lines":"246,247","listIndex":4}},{"content":"5. <strong>Guarantee a GitHub Pages entrypoint</strong>. If no generated root index is present, the workflow either copies <code>Basics/lessons/slides/index.html</code> to <code>_site/index.html</code> or writes a redirect page to the first safe published slide path it can discover.","children":[],"payload":{"tag":"li","lines":"247,248","listIndex":5}},{"content":"6. <strong>Upload and deploy</strong> the <code>_site</code> directory as the Pages artifact, then publish it through a separate deploy job targeting the <code>github-pages</code> environment.","children":[],"payload":{"tag":"li","lines":"248,250","listIndex":6}}],"payload":{"tag":"h4","lines":"241,242"}},{"content":"Maintaining <code>marp-action.yml</code>","children":[{"content":"\n<p data-lines=\"252,253\"><strong>Treat the workflow as a two-module publisher, not a single Marp command.</strong> The local commands that actually mirror CI are:</p>\n<pre data-lines=\"254,258\"><code class=\"language-bash\">npx @marp-team/marp-cli -c .marprc.yml --input-dir Basics/lessons/slides --output _site/slides/basics\nnpx @marp-team/marp-cli -c .marprc.advanced.yml --no-config --input-dir Advanced/lessons/slides --output _site/slides/advanced\n</code></pre>","children":[],"payload":{"tag":"li","lines":"252,259"}},{"content":"\n<p data-lines=\"259,260\"><strong>Preserve trigger intent carefully.</strong> Changes under <code>Basics/lessons/lecture/**</code> and <code>Advanced/lessons/lecture/**</code> do <strong>not</strong> currently trigger this workflow. Changes to <code>.marprc.advanced.yml</code> also do <strong>not</strong> currently appear in the workflow path filters even though that file is used during the Advanced build step.</p>","children":[],"payload":{"tag":"li","lines":"259,260"}},{"content":"\n<p data-lines=\"260,261\"><strong>Keep config ownership explicit.</strong> The workflow actively uses <code>.marprc.yml</code> for Basics and <code>.marprc.advanced.yml</code> for Advanced. A third file, <code>.marprc.basics.yml</code>, exists in the repository but is not referenced by the current workflow.</p>","children":[],"payload":{"tag":"li","lines":"260,261"}},{"content":"\n<p data-lines=\"261,262\"><strong>Do not remove the fallback copy logic casually.</strong> The checked-in <code>Basics/lessons/slides/index.html</code> currently serves as the most reliable static module landing page and is also part of the fallback story when generated output is incomplete.</p>","children":[],"payload":{"tag":"li","lines":"261,262"}},{"content":"\n<p data-lines=\"262,263\"><strong>Protect the Pages root behavior.</strong> <code>_site/index.html</code> is intentionally managed so the published site always resolves to slide content even when Marp does not emit a root landing page.</p>","children":[],"payload":{"tag":"li","lines":"262,263"}},{"content":"\n<p data-lines=\"263,264\"><strong>Review the pinned action SHAs and temporary runtime flags together.</strong> The workflow opts JavaScript actions into Node 24 through <code>FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true</code>, and all referenced third-party actions are SHA-pinned. Update those deliberately rather than ad hoc.</p>","children":[],"payload":{"tag":"li","lines":"263,264"}},{"content":"\n<p data-lines=\"264,265\"><strong>Treat <code>_site/slides/**</code> as a defensive trigger path.</strong> <code>_site/</code> is build output and should not normally be committed, so edits there should usually prompt a workflow/config review rather than routine content work.</p>","children":[],"payload":{"tag":"li","lines":"264,265"}},{"content":"\n<p data-lines=\"265,266\"><strong>Use the workflow specification for deeper changes.</strong> See <a href=\"spec/spec-process-cicd-marp-action.md\"><code>spec/spec-process-cicd-marp-action.md</code></a> before changing job flow, permissions, or entrypoint logic.</p>","children":[],"payload":{"tag":"li","lines":"265,267"}}],"payload":{"tag":"h4","lines":"250,251"}}],"payload":{"tag":"h3","lines":"232,233"}},{"content":"Autograder (<code>autograder.yml</code>)","children":[{"content":"<table data-lines=\"269,275\">\n<thead data-lines=\"269,270\">\n<tr data-lines=\"269,270\">\n<th></th>\n<th></th>\n</tr>\n</thead>\n<tbody data-lines=\"271,275\">\n<tr data-lines=\"271,272\">\n<td><strong>Trigger</strong></td>\n<td>Push to <code>main</code>, pull requests, and manual <code>workflow_dispatch</code></td>\n</tr>\n<tr data-lines=\"272,273\">\n<td><strong>Action</strong></td>\n<td>Converts notebooks via <code>nbconvert</code>, runs deterministic stdout tests, grades HTML quizzes</td>\n</tr>\n<tr data-lines=\"273,274\">\n<td><strong>Results</strong></td>\n<td>Written to <code>submission/.github/autograder/assignment_grades.json</code> and <code>quiz_grades.json</code></td>\n</tr>\n<tr data-lines=\"274,275\">\n<td><strong>Manual dispatch</strong></td>\n<td>Commits results to a timestamped <code>autograder-results-*</code> branch</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"269,275"}}],"payload":{"tag":"h3","lines":"267,268"}}],"payload":{"tag":"h2","lines":"230,231"}},{"content":"Course Content Index","children":[{"content":"Basics Module Index","childre
