<h1 id="hour-9-project-structure-packages-imports-and-config">Hour 9: Project Structure, Packages, Imports, and Config</h1>
<h2 id="learning-outcomes">Learning Outcomes</h2>
<ul>
<li>Move the checkpoint core from a flat script pile into <code>src/tracker/</code></li>
<li>Use relative imports inside the package (<code>from .models import Task</code>)</li>
<li>Run the demo with <code>python -m src.tracker.demo</code> from the project root</li>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h2 id="why-structure-matters-now">Why Structure Matters Now</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Before (flat):              After (organized):
project_root/               project_root/
    models.py                   src/
    services.py                     tracker/
    exceptions.py                       __init__.py
    demo.py                             exceptions.py
                                        models.py
                                        services.py
                                        config.py
                                        demo.py
</code></pre>
<ul>
<li>Upcoming layers need to find the core reliably: logging, persistence, GUI, API, tests</li>
<li>Structure tells future readers where responsibilities live</li>
<li>Brittle or accidental imports break when any layer moves</li>
</ul>
<h3 id="source">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour1_Advanced.md</code> → <code>## Opening Bridge from Checkpoint 1</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="key-vocabulary">Key Vocabulary</h2>
<ul>
<li><strong>Module</strong> — a single <code>.py</code> file: <code>models.py</code>, <code>services.py</code></li>
<li><strong>Package</strong> — a directory containing <code>__init__.py</code>: <code>tracker/</code></li>
<li><strong><code>__init__.py</code></strong> — marks a folder as a package; can stay empty</li>
<li><strong>Relative import</strong> — <code>from .models import Task</code> (dot = current package)</li>
<li><strong><code>-m</code> flag</strong> — run a module by import path, preserving package context</li>
<li><strong>Entry point</strong> — <code>src/tracker/demo.py</code>, run via <code>python -m src.tracker.demo</code></li>
</ul>
<h3 id="source-1">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour1_Advanced.md</code> → <code>## Outcomes, Setup, and Vocabulary</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="relative-imports-in-modelspy">Relative Imports in <code>models.py</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># src/tracker/models.py</span>
<span class="hljs-keyword">from</span> .exceptions <span class="hljs-keyword">import</span> ValidationError   <span class="hljs-comment"># dot = &quot;from this package&quot;</span>


<span class="hljs-keyword">class</span> <span class="hljs-title class_">Task</span>:
    VALID_PRIORITIES = {<span class="hljs-string">&quot;low&quot;</span>, <span class="hljs-string">&quot;medium&quot;</span>, <span class="hljs-string">&quot;high&quot;</span>}

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, task_id: <span class="hljs-built_in">int</span>, title: <span class="hljs-built_in">str</span>, priority: <span class="hljs-built_in">str</span> = <span class="hljs-string">&quot;medium&quot;</span></span>) -&gt; <span class="hljs-literal">None</span>:
        cleaned = title.strip()
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> cleaned:
            <span class="hljs-keyword">raise</span> ValidationError(<span class="hljs-string">&quot;Task title cannot be empty.&quot;</span>)
        <span class="hljs-variable language_">self</span>.task_id   = task_id
        <span class="hljs-variable language_">self</span>.title     = cleaned
        <span class="hljs-variable language_">self</span>.priority  = priority.strip().lower()
        <span class="hljs-variable language_">self</span>.completed = <span class="hljs-literal">False</span>

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">to_dict</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">object</span>]:
        <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;task_id&quot;</span>: <span class="hljs-variable language_">self</span>.task_id, <span class="hljs-string">&quot;title&quot;</span>: <span class="hljs-variable language_">self</span>.title,
                <span class="hljs-string">&quot;priority&quot;</span>: <span class="hljs-variable language_">self</span>.priority, <span class="hljs-string">&quot;completed&quot;</span>: <span class="hljs-variable language_">self</span>.completed}
</code></pre>
<h3 id="source-2">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour1_Advanced.md</code> → <code>## Live Demo</code> → Step 4</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="dependency-direction-and-running-correctly">Dependency Direction and Running Correctly</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Correct dependency direction:
  demo.py  --&gt;  services.py  --&gt;  models.py
      \               \               \
       \-----------+   \-----------+   \--&gt; exceptions.py
</code></pre>
<ul>
<li><code>models.py</code> must NOT import <code>services.py</code> — circular imports cause mysterious errors</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-powershell"><span class="hljs-comment"># CORRECT — from project root</span>
python <span class="hljs-literal">-m</span> src.tracker.demo

<span class="hljs-comment"># BREAKS relative imports — avoid</span>
python src/tracker/demo.py
</code></pre>
<ul>
<li><code>-m</code> preserves the package context so <code>from .services import TaskService</code> resolves</li>
<li>If it fails: check working directory and command before rewriting code</li>
</ul>
<h3 id="source-3">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour1_Advanced.md</code> → <code>## Concept Briefing</code> → §3 and §4</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="light-config-module">Light Config Module</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># src/tracker/config.py</span>
<span class="hljs-keyword">import</span> os
<span class="hljs-keyword">from</span> pathlib <span class="hljs-keyword">import</span> Path

<span class="hljs-comment"># parents[2]: config.py -&gt; tracker/ -&gt; src/ -&gt; project_root</span>
BASE_DIR = Path(__file__).resolve().parents[<span class="hljs-number">2</span>]

DATA_DIR = Path(os.environ.get(<span class="hljs-string">&quot;TRACKER_DATA_DIR&quot;</span>, <span class="hljs-string">&quot;data&quot;</span>))
DB_PATH  = DATA_DIR / <span class="hljs-string">&quot;tracker.db&quot;</span>
LOG_DIR  = BASE_DIR / <span class="hljs-string">&quot;logs&quot;</span>
LOG_FILE = LOG_DIR  / <span class="hljs-string">&quot;app.log&quot;</span>
</code></pre>
<ul>
<li>One home for constants — no hard-coded paths scattered across modules</li>
<li><code>os.environ.get(...)</code> allows overrides without a full config framework</li>
<li>PowerShell override: <code>$env:TRACKER_DATA_DIR = &quot;data&quot;; python -m src.tracker.demo</code></li>
</ul>

<h2 id="lab-restructure-your-tracker">Lab: Restructure Your Tracker</h2>
<p><strong>Time: 25 minutes</strong></p>
<h3 id="required-steps">Required Steps</h3>
<ol>
<li><code>mkdir src\tracker</code> and create an empty <code>src\tracker\__init__.py</code></li>
<li>Move <code>models.py</code>, <code>services.py</code>, <code>exceptions.py</code>, <code>demo.py</code> into <code>src/tracker/</code></li>
<li>Update all internal imports to use the dot-relative form</li>
<li>Add <code>config.py</code> with <code>DATA_DIR</code>, <code>DB_PATH</code>, <code>LOG_DIR</code>, <code>LOG_FILE</code></li>
<li>Run <code>python -m src.tracker.demo</code> from the project root</li>
<li>Confirm happy path and at least one caught <code>NotFoundError</code> or <code>ValidationError</code></li>
</ol>
<h3 id="source-5">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour1_Advanced.md</code> → <code>## Guided Lab: Restructure Your Tracker</code></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="completion-criteria-hour-9">Completion Criteria (Hour 9)</h2>
<ul>
<li><code>src/tracker/__init__.py</code> exists (can be empty)</li>
<li>Internal imports use the dot-relative form — <code>from .models import Task</code></li>
<li>No module named after a stdlib module (<code>logging.py</code>, <code>json.py</code>, etc.)</li>
<li><code>python -m src.tracker.demo</code> from the project root runs without import errors</li>
<li><code>config.py</code> holds <code>DATA_DIR</code> and <code>DB_PATH</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<h2 id="common-pitfalls-hour-9">Common Pitfalls (Hour 9)</h2>
<ul>
<li>Running <code>python src/tracker/demo.py</code> — package context is missing</li>
<li>Keeping flat <code>from models import Task</code> after moving files into the package</li>
<li>Circular import: <code>models.py</code> importing from <code>services.py</code></li>
<li>Naming a local file <code>logging.py</code> or <code>json.py</code> — shadows the standard library</li>
<li>Skipping <code>__init__.py</code> — Python cannot recognize the directory as a package</li>
</ul>
</section>

<h1 id="hour-10-logging-and-error-reporting-practical">Hour 10: Logging and Error Reporting (Practical)</h1>
<h2 id="learning-outcomes-1">Learning Outcomes</h2>
<ul>
<li>Explain why <code>logging</code> replaces scattered <code>print()</code> debugging</li>
<li>Choose the right level: DEBUG, INFO, WARNING, ERROR</li>
<li>Configure file logging to <code>logs/app.log</code> near program startup</li>
<li>Separate developer diagnostics from friendly user-facing messages</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h2 id="the-central-rule">The Central Rule</h2>
<p><strong>Logs are for developers. Error messages are for users.</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Developer view (logs/app.log):
  2026-01-14 10:03:22 WARNING src.tracker.services
    Missing task lookup task_id=999

User view (terminal):
  &quot;Task 999 was not found. Please check the ID and try again.&quot;
</code></pre>
<ul>
<li><code>print()</code> mixes audiences, carries no timestamp, no severity, disappears on exit</li>
<li><code>logging</code> routes information to the right audience and persists it to a file</li>
<li>Exceptions still control flow — logging records what happened</li>
</ul>

<h1 id="hour-11-context-managers-and-safer-file-operations">Hour 11: Context Managers and Safer File Operations</h1>
<h2 id="learning-outcomes-2">Learning Outcomes</h2>
<ul>

<li>Explain why opening the real file in write mode can corrupt it mid-write</li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h2 id="context-manager-mental-model">Context Manager Mental Model</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Manual — cleanup depends on reaching file.close()</span>
file = <span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;data/tasks.json&quot;</span>, <span class="hljs-string">&quot;w&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>)
file.write(<span class="hljs-string">&quot;example&quot;</span>)
file.close()    <span class="hljs-comment"># skipped if exception occurs above</span>

<span class="hljs-comment"># With context manager — cleanup guaranteed</span>
<span class="hljs-keyword">with</span> Path(<span class="hljs-string">&quot;data/tasks.json&quot;</span>).<span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;w&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> file:
    file.write(<span class="hljs-string">&quot;example&quot;</span>)
<span class="hljs-comment"># file is closed here, even if an exception was raised</span>
</code></pre>
<ul>
<li><code>with</code> = &quot;enter this context, do work, always run exit cleanup&quot;</li>
<li>Same pattern works for locks, DB connections, temp directories, network sessions</li>
<li><code>with</code> guarantees cleanup — it does not guarantee a safe write strategy</li>
</ul>
<h3 id="source-12">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour3_Advanced.md</code> → <code>## Concept Briefing</code> → <code>### Part 1</code></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<h2 id="why-direct-overwrites-can-corrupt-data">Why Direct Overwrites Can Corrupt Data</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># &quot;w&quot; mode truncates the real file IMMEDIATELY on open</span>
<span class="hljs-keyword">with</span> Path(<span class="hljs-string">&quot;data/tasks.json&quot;</span>).<span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;w&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> file:
    file.write(<span class="hljs-string">&quot;[\n&quot;</span>)
    file.write(<span class="hljs-string">&#x27;  {&quot;task_id&quot;: 2, &quot;title&quot;: &quot;Half-written&quot;&#x27;</span>)
    <span class="hljs-keyword">raise</span> RuntimeError(<span class="hljs-string">&quot;crash mid-write&quot;</span>)   <span class="hljs-comment"># original content is already gone</span>
<span class="hljs-comment"># with closed the file — but it closed a damaged file</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Direct overwrite:
  open real file -&gt; old content gone -&gt; write -&gt; maybe fail -&gt; corrupted file

Temp-then-replace:
  write side file -&gt; old file untouched -&gt; replace only after success
</code></pre>
<h3 id="source-13">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour3_Advanced.md</code> → <code>## Concept Briefing</code> → <code>### Part 2 and Part 3</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">
<h2 id="save_json_safe--full-implementation"><code>save_json_safe</code> — Full Implementation</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> json
<span class="hljs-keyword">from</span> pathlib <span class="hljs-keyword">import</span> Path
<span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Any</span>


<span class="hljs-keyword">def</span> <span class="hljs-title function_">save_json_safe</span>(<span class="hljs-params">
    path: <span class="hljs-built_in">str</span> | Path,
    data: <span class="hljs-type">Any</span>,
    *,
    simulate_failure: <span class="hljs-built_in">bool</span> = <span class="hljs-literal">False</span>,
</span>) -&gt; <span class="hljs-literal">None</span>:
    target_path = Path(path)
    target_path.parent.mkdir(parents=<span class="hljs-literal">True</span>, exist_ok=<span class="hljs-literal">True</span>)
    <span class="hljs-comment"># Same-directory temp works for &quot;tasks.json&quot; AND suffix-less &quot;tasks&quot;</span>
    tmp_path = target_path.with_name(<span class="hljs-string">f&quot;<span class="hljs-subst">{target_path.name}</span>.tmp&quot;</span>)

    <span class="hljs-keyword">try</span>:
        <span class="hljs-keyword">with</span> tmp_path.<span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;w&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> file:
            json.dump(data, file, indent=<span class="hljs-number">2</span>)
            file.write(<span class="hljs-string">&quot;\n&quot;</span>)              <span class="hljs-comment"># trailing newline for readability</span>
        <span class="hljs-keyword">if</span> simulate_failure:
            <span class="hljs-keyword">raise</span> RuntimeError(<span class="hljs-string">&quot;simulated failure before replace&quot;</span>)
        tmp_path.replace(target_path)    <span class="hljs-comment"># only touches target after success</span>
    <span class="hljs-keyword">except</span> Exception:
        tmp_path.unlink(missing_ok=<span class="hljs-literal">True</span>) <span class="hljs-comment"># clean up temp, then re-raise</span>
        <span class="hljs-keyword">raise</span>
</code></pre>
<h3 id="source-14">Source</h3>
<p><code>Advanced/lessons/lecture/Day3_Hour3_Advanced.md</code> → <code>## Live Demo: Write JSON to Temp, Then Replace</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="en-US">
<h2 id="proving-the-pattern-works">Proving the Pattern Works</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Save known-good data</span>

    )
<span class="hljs-keyword">except</span> RuntimeError <span class="hljs-keyword">as</span> err:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Caught: <span class="hljs-subst">{err}</span>&quot;</span>)

after = Path(<span class="hljs-string">&quot;data/tasks.json&quot;</span>).read_text(encoding=<span class="hljs-string">&quot;utf-8&quot;</span>)
<span class="hljs-built_in">print</span>(before == after)                         <span class="hljs-comment"># True  — original intact</span>
<span class="hljs-built_in">print</span>(Path(<span class="hljs-string">&quot;data/tasks.json.tmp&quot;</span>).exists())    <span class="hljs-comment"># False — temp cleaned up</span>
</code></pre>

<ul>

<h2 id="common-pitfalls-hour-11">Common Pitfalls (Hour 11)</h2>
<ul>
<li>Using <code>.with_suffix(&quot;.tmp&quot;)</code> — breaks for files with no extension; use <code>with_name(f&quot;{name}.tmp&quot;)</code> instead</li>
<li>Writing the temp file in a different directory — complicates <code>replace</code> and may cause cross-device errors</li>
<li>Skipping <code>parent.mkdir(parents=True, exist_ok=True)</code> — <code>FileNotFoundError</code> on first run</li>
<li>Not calling <code>unlink(missing_ok=True)</code> in the exception path — leaves stale <code>.tmp</code> files</li>
<li>On Windows: <code>PermissionError</code> from <code>replace()</code> if the target is locked by an editor, sync tool, or antivirus</li>
</ul>
</section>

<h1 id="hour-12-decorators-for-timing-toy-authorization-and-lightweight-validation">Hour 12: Decorators for Timing, Toy Authorization, and Lightweight Validation</h1>
<h2 id="learning-outcomes-3">Learning Outcomes</h2>

<li>Write <code>wrapper(*args, **kwargs)</code> that handles both functions and methods</li>

<li>Use <code>functools.wraps</code> to preserve function name and docstring</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h2 id="the-problem-decorators-solve">The Problem Decorators Solve</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Duplicated timing code — error-prone to maintain</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">add_task</span>(<span class="hljs-params">self, title: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">int</span>:
    start = time.perf_counter()
    result = <span class="hljs-variable language_">self</span>._do_add(title)
    logger.info(<span class="hljs-string">&quot;add_task completed in %.6f s&quot;</span>, time.perf_counter() - start)
    <span class="hljs-keyword">return</span> result

<span class="hljs-keyword">def</span> <span class="hljs-title function_">list_titles</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-built_in">list</span>[<span class="hljs-built_in">str</span>]:
    start = time.perf_counter()
    result = <span class="hljs-built_in">list</span>(<span class="hljs-variable language_">self</span>._titles)
    logger.info(<span class="hljs-string">&quot;list_titles completed in %.6f s&quot;</span>, time.perf_counter() - start)
    <span class="hljs-keyword">return</span> result
</code></pre>
<ul>
<li>Same wrapping code copied into every service method</li>
<li>Change the format string once — must edit every copy</li>
<li>Forget <code>return result</code> in one copy — silent <code>None</code> bug</li>
</ul>

<h2 id="decorator-anatomy">Decorator Anatomy</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">my_decorator</span>(<span class="hljs-params">func</span>):          <span class="hljs-comment"># 1. accept the original function</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">wrapper</span>(<span class="hljs-params">*args, **kwargs</span>): <span class="hljs-comment"># 2. inner function collects ALL args</span>
        result = func(*args, **kwargs)  <span class="hljs-comment"># 3. call original</span>
        <span class="hljs-keyword">return</span> result            <span class="hljs-comment"># 4. MUST return original result</span>
    <span class="hljs-keyword">return</span> wrapper               <span class="hljs-comment"># 5. return the wrapper, not a call to it</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@my_decorator</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">greet</span>(<span class="hljs-params">name: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-keyword">return</span> <span class="hljs-string">f&quot;Hello, <span class="hljs-subst">{name}</span>!&quot;</span>

<span class="hljs-comment"># Equivalent to: greet = my_decorator(greet)</span>
</code></pre>
<ul>
<li><code>*args, **kwargs</code> forwards everything including <code>self</code> for methods</li>
<li>Without <code>return result</code>: decorated function silently returns <code>None</code></li>
</ul>

<h2 id="professional-timed-decorator">Professional <code>@timed</code> Decorator</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> logging
<span class="hljs-keyword">import</span> time
<span class="hljs-keyword">from</span> functools <span class="hljs-keyword">import</span> wraps
<span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Any</span>, <span class="hljs-type">Callable</span>


<span class="hljs-keyword">def</span> <span class="hljs-title function_">timed</span>(<span class="hljs-params">func: <span class="hljs-type">Callable</span>[..., <span class="hljs-type">Any</span>]</span>) -&gt; <span class="hljs-type">Callable</span>[..., <span class="hljs-type">Any</span>]:
<span class="hljs-meta">    @wraps(<span class="hljs-params">func</span>)   </span><span class="hljs-comment"># preserves __name__, __doc__ — use in professional code</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">wrapper</span>(<span class="hljs-params">*args: <span class="hljs-type">Any</span>, **kwargs: <span class="hljs-type">Any</span></span>) -&gt; <span class="hljs-type">Any</span>:
        start  = time.perf_counter()
        result = func(*args, **kwargs)
        elapsed = time.perf_counter() - start
        logging.getLogger(__name__).info(
            <span class="hljs-string">&quot;%s completed in %.6f seconds&quot;</span>,
            func.__name__,
            elapsed,
        )
        <span class="hljs-keyword">return</span> result  <span class="hljs-comment"># original result unchanged</span>
    <span class="hljs-keyword">return</span> wrapper
</code></pre>
<ul>
<li><code>time.perf_counter()</code> — correct tool for measuring elapsed durations</li>
<li><code>logging.getLogger(__name__).info(...)</code> — timing goes to <code>logs/app.log</code>, not <code>print()</code></li>
</ul>

<h2 id="readability-rules-for-decorators">Readability Rules for Decorators</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Use a decorator when:
  - the extra behavior repeats across multiple functions
  - the wrapper stays small and focused
  - the decorated function becomes easier to read

Avoid a decorator when:
  - it hides the main business rule
  - it creates surprising side effects
  - debugging becomes harder than the duplication was
</code></pre>
<ul>
<li>Timing is a good decorator: it is cross-cutting, small, and observable</li>
<li>Validation that IS the business rule belongs in the model or service — not a wrapper</li>
</ul>

<h2 id="completion-criteria-and-pitfalls-hour-12">Completion Criteria and Pitfalls (Hour 12)</h2>
<ul>
<li><code>@timed</code> uses <code>wrapper(*args, **kwargs)</code> — no fixed parameter list</li>
<li><code>time.perf_counter()</code> measures elapsed time</li>
<li>Timing message goes through <code>logging.getLogger(__name__).info(...)</code> — not <code>print()</code></li>
<li><code>return result</code> is present — decorated functions return unchanged values</li>
<li><code>@wraps(func)</code> preserves <code>func.__name__</code> and docstring</li>
</ul>
<p>Pitfalls:</p>
<ul>
<li>Forgetting <code>return result</code> — decorated function silently returns <code>None</code></li>
<li>Not forwarding <code>*args, **kwargs</code> — method call fails with missing <code>self</code></li>
<li>Using <code>print()</code> instead of <code>logging</code> — timing output is inconsistent and untraceable</li>
<li>Omitting <code>@wraps(func)</code> — every decorated function appears as <code>wrapper</code> in logs</li>
</ul>
</section>
