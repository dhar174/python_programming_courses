name: Autograder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  grade:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare autograder configuration
        id: prepare_autograder
        run: |
          mkdir -p submission/.github/autograder
          mapfile -t ALL_NOTEBOOKS < <(find Basics/assignments -type f -path "*/submissions/*Basics_Day*.ipynb" | sort)
          if [ ${#ALL_NOTEBOOKS[@]} -eq 0 ]; then
            echo "::notice::No assignment submission notebooks found under Basics/assignments/*/submissions. Skipping autograder action execution for this run."
            echo "any_submission_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for NOTEBOOK_PATH in "${ALL_NOTEBOOKS[@]}"; do
            NOTEBOOK_NAME="$(basename "$NOTEBOOK_PATH")"
            if [[ ! "$NOTEBOOK_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Invalid submission filename '$NOTEBOOK_NAME'. Use only letters, numbers, dots, underscores, and hyphens."
              exit 1
            fi
            if [[ "$NOTEBOOK_NAME" == .* || "$NOTEBOOK_NAME" == *..* ]]; then
              echo "Invalid submission filename '$NOTEBOOK_NAME'. Relative path-like names are not allowed."
              exit 1
            fi
          done
          if [ ${#ALL_NOTEBOOKS[@]} -gt 1 ]; then
            echo "::warning::Found ${#ALL_NOTEBOOKS[@]} notebooks across all assignment days; using first sorted match for webtech-network/autograder@v1 compatibility: ${ALL_NOTEBOOKS[0]}"
          fi
          NOTEBOOK_PATH="${ALL_NOTEBOOKS[0]}"
          NOTEBOOK_NAME="$(basename "$NOTEBOOK_PATH")"
          ASSIGNMENT_DIR="$(dirname "$(dirname "$NOTEBOOK_PATH")")"
          if [ ! -f "$ASSIGNMENT_DIR/criteria.json" ] || [ ! -f "$ASSIGNMENT_DIR/feedback.json" ]; then
            echo "::error::Missing criteria.json or feedback.json in $ASSIGNMENT_DIR for selected notebook $NOTEBOOK_NAME"
            exit 1
          fi
          echo "any_submission_found=true" >> "$GITHUB_OUTPUT"
          cp "$NOTEBOOK_PATH" "submission/$NOTEBOOK_NAME"
          cp "$NOTEBOOK_PATH" "submission/.github/autograder/$NOTEBOOK_NAME"
          cp "$ASSIGNMENT_DIR/criteria.json" submission/.github/autograder/criteria.json
          cp "$ASSIGNMENT_DIR/feedback.json" submission/.github/autograder/feedback.json
          test -f "submission/$NOTEBOOK_NAME" || (echo "Missing copied submission/$NOTEBOOK_NAME" && exit 1)
          test -f "submission/.github/autograder/$NOTEBOOK_NAME" || (echo "Missing copied $NOTEBOOK_NAME" && exit 1)
          test -f submission/.github/autograder/criteria.json || (echo "Missing copied criteria.json" && exit 1)
          test -f submission/.github/autograder/feedback.json || (echo "Missing copied feedback.json" && exit 1)
          python - "$NOTEBOOK_NAME" << 'PY'
          import json
          import re
          import shlex
          import sys
          from pathlib import Path

          notebook_name = sys.argv[1]
          # Defense-in-depth validation before writing shell commands into setup.json.
          if (
              not notebook_name.endswith(".ipynb")
              or not re.search(r"(?:^|_)Basics_Day\d+(?:_|\.|$)", notebook_name)
              or "/" in notebook_name
              or "\\" in notebook_name
              or notebook_name.startswith(".")
              or ".." in notebook_name
          ):
              raise ValueError(f"Unsafe notebook filename: {notebook_name}")
          setup_json = {
              "file_checks": [notebook_name],
              "commands": [
                  "python -m pip install --quiet --upgrade pip",
                  "python -m pip install nbconvert",
                  f"jupyter nbconvert --to script {shlex.quote(notebook_name)} --output assignment_submission",
                  "if [ ! -f assignment_submission.py ]; then echo 'ERROR: Conversion failed'; exit 1; fi",
              ],
          }

          Path("submission/.github/autograder/setup.json").write_text(
              json.dumps(setup_json, indent=2),
              encoding="utf-8",
          )
          PY
          test -f submission/.github/autograder/setup.json || (echo "Missing generated setup.json" && exit 1)
      
      - name: Run autograder
        if: steps.prepare_autograder.outputs.any_submission_found == 'true'
        uses: webtech-network/autograder@v1
        with:
          template_preset: 'io'
          feedback-type: 'default'

      - name: Evaluate assignment tests
        run: |
          python -m pip install --quiet nbconvert || { echo "::error::Failed to install nbconvert; cannot run notebook conversion."; exit 1; }
          python - << 'PYEVAL'
          import copy
          import json
          import re
          import subprocess
          import sys
          from pathlib import Path

          assignments_root = Path("Basics/assignments")
          output_dir = Path("submission/.github/autograder")
          output_dir.mkdir(parents=True, exist_ok=True)
          for legacy_file in output_dir.glob("*_criteria.json"):
              if "_Quiz_" in legacy_file.name:
                  continue
              legacy_file.unlink(missing_ok=True)

          assignment_dirs = sorted(assignments_root.glob("Basics_Day*_homework"))
          if not assignment_dirs:
              print("::notice::No assignment directories found at Basics/assignments/Basics_Day*_homework. Skipping assignment grading.")
              sys.exit(0)

          prefix_labels = {"Student:", "Date:", "Python Version:", "Name:", "Age:"}
          filename_pattern = re.compile(r"^[A-Za-z0-9._-]+$")

          for assignment_dir in assignment_dirs:
              day_match = re.search(r"Basics_Day(\d+)_homework$", assignment_dir.name)
              if not day_match:
                  continue
              day = day_match.group(1)
              criteria_path = assignment_dir / "criteria.json"
              if not criteria_path.exists():
                  print(f"::warning::Missing criteria.json for day {day} in {assignment_dir}; skipping.")
                  continue
              try:
                  criteria = json.loads(criteria_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  print(f"::error::Invalid criteria.json for day {day} ({criteria_path}): {exc}")
                  sys.exit(1)
              tests = criteria.get("tests")
              if not isinstance(tests, list) or not tests:
                  print(f"::notice::No tests found in {criteria_path}; skipping day {day}.")
                  continue

              submissions_dir = assignment_dir / "submissions"
              if not submissions_dir.exists():
                  print(f"::notice::No submissions directory for day {day} ({submissions_dir}); skipping day {day}.")
                  continue
              notebooks = sorted(submissions_dir.glob(f"*Basics_Day{day}*.ipynb"))
              if not notebooks:
                  print(f"::notice::No valid submission notebooks found for day {day} in {submissions_dir}; skipping day {day}.")
                  continue

              for notebook_path in notebooks:
                  notebook_name = notebook_path.name
                  if not filename_pattern.match(notebook_name):
                      print(f"::error::Invalid submission filename '{notebook_name}'. Use only letters, numbers, dots, underscores, and hyphens.")
                      sys.exit(1)
                  if notebook_name.startswith(".") or ".." in notebook_name:
                      print(f"::error::Invalid submission filename '{notebook_name}'. Relative path-like names are not allowed.")
                      sys.exit(1)

                  script_dir = output_dir / "generated_scripts"
                  script_dir.mkdir(parents=True, exist_ok=True)
                  script_stem = re.sub(r"[^A-Za-z0-9._-]+", "_", notebook_path.stem)
                  script_path = script_dir / f"{script_stem}.py"
                  convert_cmd = [
                      "jupyter",
                      "nbconvert",
                      "--to",
                      "script",
                      str(notebook_path),
                      "--output",
                      script_path.stem,
                      "--output-dir",
                      str(script_dir),
                  ]
                  conversion = subprocess.run(convert_cmd, capture_output=True, text=True)
                  evaluated = copy.deepcopy(criteria)
                  eval_tests = evaluated.get("tests")
                  if conversion.returncode != 0 or not script_path.exists():
                      details = (
                          conversion.stderr.strip()
                          or conversion.stdout.strip()
                          or f"Notebook conversion failed for {notebook_path} with command: {' '.join(convert_cmd)}"
                      )
                      print(f"::warning::Notebook conversion failed for {notebook_path}: {details}")
                      if isinstance(eval_tests, list):
                          for test in eval_tests:
                              if isinstance(test, dict):
                                  test["student_stdout"] = [details]
                                  test["pass"] = False
                      output_path = output_dir / f"{notebook_path.stem}_criteria.json"
                      output_path.write_text(json.dumps(evaluated, indent=2), encoding="utf-8")
                      continue

                  for test in eval_tests:
                      if not isinstance(test, dict):
                          continue
                      cmd = test.get("command", [])
                      stdin_data = test.get("stdin", "")
                      expected = test.get("expected_stdout", [])
                      runtime_cmd = [str(part) for part in cmd] if isinstance(cmd, list) else []
                      replaced_script = False
                      for index, part in enumerate(runtime_cmd):
                          if re.fullmatch(r"day\d+\.py", Path(part).name):
                              runtime_cmd[index] = str(script_path)
                              replaced_script = True
                              break
                      if not replaced_script and runtime_cmd and runtime_cmd[0].startswith("python"):
                          runtime_cmd.append(str(script_path))
                      try:
                          result = subprocess.run(
                              runtime_cmd,
                              input=stdin_data,
                              capture_output=True,
                              text=True,
                              timeout=30,
                          )
                          stdout_text = result.stdout or ""
                          stdout_lines = stdout_text.splitlines()
                          test["student_stdout"] = stdout_lines
                          if result.returncode != 0:
                              pass_flag = False
                          else:
                              matches = []
                              for exp_line in expected:
                                  if not isinstance(exp_line, str):
                                      continue
                                  if exp_line in prefix_labels:
                                      match = any(line.startswith(exp_line) for line in stdout_lines)
                                  else:
                                      match = any(line == exp_line for line in stdout_lines)
                                  matches.append(match)
                              pass_flag = all(matches) if expected else True
                          test["pass"] = pass_flag
                      except Exception as exc:
                          test["student_stdout"] = [str(exc)]
                          test["pass"] = False

                  output_path = output_dir / f"{notebook_path.stem}_criteria.json"
                  output_path.write_text(json.dumps(evaluated, indent=2), encoding="utf-8")
                  print(f"Wrote evaluated test results to {output_path}")
          PYEVAL

      - name: Summarize assignment grading results
        run: |
          python - << 'PY'
          import json
          import os
          import sys
          from pathlib import Path

          output_dir = Path("submission/.github/autograder")
          output_dir.mkdir(parents=True, exist_ok=True)

          assignment_results = []
          granular_files = []
          ASSIGNMENT_RESULT_GLOB = "*_criteria.json"
          QUIZ_CRITERIA_MARKER = "_Quiz_"

          for json_path in sorted(output_dir.glob(ASSIGNMENT_RESULT_GLOB)):
              if QUIZ_CRITERIA_MARKER in json_path.name:
                  continue
              try:
                  payload = json.loads(json_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  continue
              tests = payload.get("tests") if isinstance(payload, dict) else None
              if not isinstance(tests, list) or not tests:
                  continue
              if not any(isinstance(test, dict) and ("pass" in test or "student_stdout" in test) for test in tests):
                  continue

              total_points = 0.0
              score_points = 0.0
              for test in tests:
                  if not isinstance(test, dict):
                      continue
                  try:
                      points = float(test.get("points", 1))
                  except (TypeError, ValueError):
                      points = 1.0
                  total_points += points
                  if test.get("pass") is True:
                      score_points += points

              assignment_results.append(
                  {
                      "assignment_id": json_path.stem.replace("_criteria", ""),
                      "score": score_points,
                      "total": total_points,
                      "source_file": str(json_path),
                  }
              )
              granular_files.append(json_path)

          results_file = output_dir / "assignment_grades.json"
          results_file.write_text(json.dumps({"assignments": assignment_results}, indent=2), encoding="utf-8")
          print(f"Wrote assignment grading report to {results_file}")

          # Keep only consolidated assignment_grades.json as assignment output artifact.
          for granular_file in granular_files:
              try:
                  granular_file.unlink()
              except OSError as exc:
                  print(f"Warning: could not remove granular assignment file {granular_file}: {exc}", file=sys.stderr)

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_file:
              lines = ["## Assignment grading results", "", "| Assignment | Score | Source |", "| --- | --- | --- |"]
              if assignment_results:
                  for result in assignment_results:
                      lines.append(f"| {result['assignment_id']} | {result['score']}/{result['total']} | {result['source_file']} |")
              else:
                  lines.append("| _No assignment results found_ | 0/0 | n/a |")
              try:
                  with open(summary_file, "a", encoding="utf-8") as handle:
                      handle.write("\n".join(lines) + "\n")
              except OSError as exc:
                  print(f"Warning: could not write GitHub step summary: {exc}", file=sys.stderr)
          PY

      - name: Grade Basics HTML quizzes
        run: |
          python - << 'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          output_dir = Path("submission/.github/autograder")
          output_dir.mkdir(parents=True, exist_ok=True)
          quiz_results = []
          UNANSWERED_MARKER = "unanswered"

          for legacy_file in output_dir.glob("*_Quiz_criteria.json"):
              legacy_file.unlink(missing_ok=True)

          def load_quiz_data(html_path: Path) -> dict:
              html = html_path.read_text(encoding="utf-8")
              quiz_data_match = re.search(
                  r"const QUIZ_DATA = (\{.*?\});\s*const STORAGE_KEY",
                  html,
                  flags=re.DOTALL,
              )
              if not quiz_data_match:
                  raise ValueError(f"Unable to parse QUIZ_DATA from {html_path}")
              quiz_data_json = quiz_data_match.group(1)
              try:
                  return json.loads(quiz_data_json)
              except json.JSONDecodeError as exc:
                  raise ValueError(f"Malformed QUIZ_DATA JSON in {html_path}: {exc}") from exc

          def load_student_answers(quiz_id: str, html_path: Path) -> tuple[dict, str]:
              candidates = [
                  html_path.with_name(f"{quiz_id}_answers.json"),
                  html_path.with_name(f"{quiz_id.lower()}_answers.json"),
                  Path(f"Basics/quizzes/{quiz_id}_answers.json"),
              ]
              for candidate in candidates:
                  if not candidate.exists():
                      continue
                  try:
                      payload = json.loads(candidate.read_text(encoding="utf-8"))
                      answers = payload.get("student_answers") if isinstance(payload, dict) else None
                      if isinstance(answers, dict):
                          return {str(k): str(v) for k, v in answers.items()}, str(candidate)
                  except json.JSONDecodeError:
                      continue
              return {}, "missing_submission"

          quiz_candidates: dict[str, list[Path]] = {}
          for quiz_path in sorted(Path("Basics/quizzes").glob("Basics_Day*_Quiz.html")):
              quiz_candidates.setdefault(quiz_path.stem, []).append(quiz_path)
          for quiz_path in sorted(Path("Basics/quizzes").glob("Basics_Day*/Basics_Day*_Quiz.html")):
              quiz_candidates.setdefault(quiz_path.stem, []).append(quiz_path)

          if not quiz_candidates:
              print("::notice::No Basics quiz HTML files found. Skipping quiz grading.")
              sys.exit(0)

          def quiz_sort_key(quiz_id: str) -> tuple[int, str]:
              match = re.search(r"Basics_Day(\d+)_Quiz$", quiz_id)
              if match:
                  return (int(match.group(1)), quiz_id)
              # Non-standard quiz ids sort after numbered day quizzes.
              return (float("inf"), quiz_id)

          for quiz_id in sorted(quiz_candidates, key=quiz_sort_key):
              candidates = quiz_candidates[quiz_id]
              html_path = next((path for path in candidates if path.exists()), None)
              if html_path is None:
                  print(f"::notice::Missing HTML quiz file for {quiz_id}. Skipping.")
                  continue

              student_answers, answer_source = load_student_answers(quiz_id, html_path)
              if answer_source == "missing_submission":
                  print(f"::notice::No answer export found for {quiz_id}. Skipping quiz grading for this quiz.")
                  continue

              try:
                  quiz_data = load_quiz_data(html_path)
              except ValueError as exc:
                  print(f"Failed to load quiz data for {quiz_id} from {html_path}: {exc}")
                  sys.exit(1)
              expected_answers = quiz_data.get("expectedAnswers")
              if not isinstance(expected_answers, dict) or not expected_answers:
                  print(f"Quiz {quiz_id} is missing expectedAnswers in {html_path}")
                  sys.exit(1)
              if not all(str(question_id).isdigit() for question_id in expected_answers):
                  print(f"Quiz {quiz_id} has non-numeric question IDs in expectedAnswers")
                  sys.exit(1)

              if not all(str(question_id).isdigit() for question_id in student_answers):
                  print(f"Quiz {quiz_id} has non-numeric keys in student_answers")
                  sys.exit(1)
              unexpected_keys = set(student_answers) - set(expected_answers)
              if unexpected_keys:
                  print(f"Quiz {quiz_id} student_answers include unknown question IDs: {sorted(unexpected_keys)}")
                  sys.exit(1)
              tests = []
              score = 0
              for question_id in sorted(expected_answers, key=lambda qid: int(qid)):
                  expected = str(expected_answers[question_id])
                  actual_value = student_answers.get(question_id)
                  actual = str(actual_value) if actual_value is not None else UNANSWERED_MARKER
                  passed = actual == expected
                  score += int(passed)
                  tests.append(
                      {
                          "name": f"{quiz_id} Question {question_id}",
                          "points": 1,
                          "expected_stdout": [expected],
                          "student_stdout": [actual],
                          "pass": passed,
                      }
                  )

              quiz_results.append(
                  {
                      "quiz_id": quiz_id,
                      "quiz_html": str(html_path),
                      "answer_source": answer_source,
                      "score": score,
                      "total": len(expected_answers),
                      "tests": tests,
                  }
              )

          results_file = output_dir / "quiz_grades.json"
          results_file.write_text(json.dumps({"quizzes": quiz_results}, indent=2), encoding="utf-8")
          print(f"Wrote quiz grading report to {results_file}")

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_file:
              lines = ["## Quiz grading results", "", "| Quiz | Score | Answer source |", "| --- | --- | --- |"]
              if quiz_results:
                  for result in quiz_results:
                      lines.append(f"| {result['quiz_id']} | {result['score']}/{result['total']} | {result['answer_source']} |")
              else:
                  lines.append("| _No quiz results found_ | 0/0 | n/a |")
              try:
                  with open(summary_file, "a", encoding="utf-8") as handle:
                      handle.write("\n".join(lines) + "\n")
              except OSError as exc:
                  print(f"Warning: could not write GitHub step summary: {exc}", file=sys.stderr)
          PY

      - name: Commit and push autograder results
        id: commit_results
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          DATETIME="$(date -u +%Y%m%d-%H%M%S)"
          BRANCH_NAME="autograder-results-${DATETIME}"

          git config user.name "github-actions[bot]" || { echo "Failed to configure git user.name"; exit 1; }
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com" || { echo "Failed to configure git user.email"; exit 1; }
          git add -A || { echo "Failed to stage autograder outputs"; exit 1; }

          if git diff --cached --quiet; then
            echo "No autograder output changes detected; skipping commit and push."
            exit 0
          fi

          git checkout -b "${BRANCH_NAME}" HEAD || { echo "Failed to create branch ${BRANCH_NAME}"; exit 1; }
          git commit -m "Autograder results on ${DATETIME}" || { echo "Failed to commit autograder outputs"; exit 1; }
          git push origin "${BRANCH_NAME}" || { echo "Failed to push branch ${BRANCH_NAME}"; exit 1; }
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Print autograder results branch
        if: steps.commit_results.outcome == 'success' && steps.commit_results.outputs.branch_name != ''
        run: |
          echo "Autograder results branch: ${{ steps.commit_results.outputs.branch_name }}"

  grade_pr:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate autograder source configuration
        run: |
          python - << 'PY'
          import json
          import re
          import sys
          from pathlib import Path

          assignment_dirs = sorted(Path("Basics/assignments").glob("Basics_Day*_homework"))
          if not assignment_dirs:
              print("::notice::No assignment config directories found.")
          for assignment_dir in assignment_dirs:
              day_match = re.search(r"Basics_Day(\d+)_homework$", assignment_dir.name)
              if not day_match:
                  continue
              day = day_match.group(1)
              criteria_path = assignment_dir / "criteria.json"
              feedback_path = assignment_dir / "feedback.json"
              template_notebook = Path("Basics/assignments") / f"Basics_Day{day}_homework.ipynb"
              if not template_notebook.exists():
                  print(f"Missing template notebook for day {day}: {template_notebook}")
                  sys.exit(1)
              if not criteria_path.exists():
                  print(f"Missing criteria.json for day {day}: {criteria_path}")
                  sys.exit(1)
              if not feedback_path.exists():
                  print(f"Missing feedback.json for day {day}: {feedback_path}")
                  sys.exit(1)
              try:
                  criteria = json.loads(criteria_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  print(f"{criteria_path} is invalid JSON: {exc}")
                  sys.exit(1)
              try:
                  feedback = json.loads(feedback_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  print(f"{feedback_path} is invalid JSON: {exc}")
                  sys.exit(1)
              if not isinstance(criteria.get("tests"), list):
                  print(f"{criteria_path} must contain a tests array")
                  sys.exit(1)
              if not isinstance(feedback, dict):
                  print(f"{feedback_path} must be a JSON object")
                  sys.exit(1)

          quiz_html_paths = sorted(Path("Basics/quizzes").glob("Basics_Day*_Quiz.html"))
          quiz_html_paths += sorted(Path("Basics/quizzes").glob("Basics_Day*/Basics_Day*_Quiz.html"))
          if not quiz_html_paths:
              print("::notice::No quiz HTML files found.")
          quiz_answer_exports = set(Path("Basics/quizzes").glob("*_answers.json"))
          for quiz_export in Path("Basics/quizzes").glob("Basics_Day*/*_answers.json"):
              quiz_answer_exports.add(quiz_export)
          for quiz_path in quiz_html_paths:
              quiz_id = quiz_path.stem
              answer_candidates = {
                  quiz_path.with_name(f"{quiz_id}_answers.json"),
                  quiz_path.with_name(f"{quiz_id.lower()}_answers.json"),
                  Path(f"Basics/quizzes/{quiz_id}_answers.json"),
              }
              if not any(candidate in quiz_answer_exports for candidate in answer_candidates):
                  print(f"::notice::No answer export found for {quiz_id}; skipping strict quiz data validation.")
                  continue
              html = quiz_path.read_text(encoding='utf-8')
              quiz_data_match = re.search(
                  r"const QUIZ_DATA = (\{.*?\});\s*const STORAGE_KEY",
                  html,
                  flags=re.DOTALL,
              )
              if not quiz_data_match:
                  print(f'{quiz_path} must define const QUIZ_DATA')
                  sys.exit(1)
              try:
                  quiz_data = json.loads(quiz_data_match.group(1))
              except json.JSONDecodeError as exc:
                  print(f'{quiz_path} has invalid QUIZ_DATA JSON: {exc}')
                  sys.exit(1)
              expected = quiz_data.get('expectedAnswers')
              if not isinstance(expected, dict) or not expected:
                  print(f'{quiz_path} must include non-empty expectedAnswers')
                  sys.exit(1)
              if not all(str(question_id).isdigit() for question_id in expected):
                  print(f'{quiz_path} must use numeric string keys in expectedAnswers')
                  sys.exit(1)
