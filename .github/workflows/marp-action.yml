name: Publish example slides to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Basics/lessons/**.md"
      - "Advanced/lessons/**.md"
      - ".marprc.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
        
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with: 
          token: ${{ secrets.GH_PAT }}
          
      - name: Convert Markdown into HTML and PDF
        uses: KoharaKazuya/marp-cli-action@v4
        with:
          config-file: ./.marprc.yml

      - name: Ensure Pages root resolves to slide content
        run: |
          mkdir -p _site
          cat <<'EOF' > _site/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./slides/">
              <title>Redirecting to slides…</title>
            </head>
            <body>
              <p><a href="./slides/">Open the published slides</a></p>
            </body>
          </html>
          EOF

          # Fallback to the checked-in static slide site when the Marp action
          # does not populate the configured `_site/slides` output directory.
          if [ ! -d _site/slides ]; then
            mkdir -p _site/slides
            cp -R Basics/lessons/slides/. _site/slides/
          fi
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    permissions:
      contents: write
      pages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      deployments: write
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GH_PAT }}
        
