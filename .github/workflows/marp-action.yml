name: Publish example slides to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Basics/lessons/**.md"
      - "Advanced/lessons/**.md"
      - ".marprc.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
        
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with: 
          token: ${{ secrets.GH_PAT }}
          
      - name: Convert Markdown into HTML and PDF
        uses: KoharaKazuya/marp-cli-action@v4
        with:
          config-file: ./.marprc.yml

      - name: Ensure Pages root resolves to slide content
        run: |
          mkdir -p _site
          cat <<'EOF' > _site/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="1; url=./slides/">
              <title>Redirecting to slides…</title>
            </head>
            <body>
              <p aria-live="polite">Redirecting to the published slides… If you are not redirected, <a href="./slides/">open the slide index</a>.</p>
            </body>
          </html>
          EOF

          # Fallback to the checked-in static slide site when the Marp action
          # does not populate the configured `_site/slides` output directory
          # with a usable HTML entrypoint.
          USE_FALLBACK=0

          if [ -f _site/slides/index.html ]; then
            echo "Found generated slide index at _site/slides/index.html."
          elif [ -d _site/slides ] && find _site/slides -maxdepth 2 -type f -name '*.html' -print -quit | grep -q .; then
            echo "Generated slide HTML found in _site/slides; creating index.html entrypoint."
          else
            echo "No usable generated slide HTML found in _site/slides; applying fallback from Basics/lessons/slides."
            USE_FALLBACK=1
          fi

          if [ "${USE_FALLBACK:-0}" -eq 1 ]; then
            if [ -d Basics/lessons/slides ] && find Basics/lessons/slides -maxdepth 2 -type f -name '*.html' -print -quit | grep -q .; then
              rm -rf _site/slides
              mkdir -p _site/slides
              cp -R Basics/lessons/slides/. _site/slides/
              echo "Fallback slide content copied from Basics/lessons/slides/."
            else
              echo "ERROR: No usable fallback slide content found in Basics/lessons/slides."
              exit 1
            fi
          fi

          if [ ! -f _site/slides/index.html ]; then
            FIRST_SLIDE_HTML="$(find _site/slides -type f -name '*.html' ! -name 'index.html' | LC_ALL=C sort | head -n 1)"

            if [ -z "${FIRST_SLIDE_HTML}" ]; then
              echo "ERROR: No slide HTML found to use as the /slides/ entrypoint."
              exit 1
            fi

            FIRST_SLIDE_RELATIVE="${FIRST_SLIDE_HTML#_site/slides/}"
            case "${FIRST_SLIDE_RELATIVE}" in
              *..*|*\"*|*\'*|*\<*|*\>*)
                echo "ERROR: Unsafe slide path selected for generated index: ${FIRST_SLIDE_RELATIVE}"
                exit 1
                ;;
            esac
            cat <<EOF > _site/slides/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="1; url=./${FIRST_SLIDE_RELATIVE}">
              <title>Redirecting to slides…</title>
            </head>
            <body>
              <p aria-live="polite">Redirecting to the published slides… If you are not redirected, <a href="./${FIRST_SLIDE_RELATIVE}">open the first available deck</a>.</p>
            </body>
          </html>
          EOF
          fi
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    permissions:
      contents: write
      pages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      deployments: write
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GH_PAT }}
        
