name: Publish example slides to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Basics/lessons/slides/day-*/**"
      - "Advanced/lessons/slides/day-*/**"
      - ".marprc.yml"
      - ".github/workflows/marp-action.yml"
      - "Basics/lessons/slides**"

permissions:
  contents: read

env:
  # Temporary opt-in to run JavaScript actions on Node.js 24 runtime.
  # See: https://github.blog/changelog/2024-09-04-github-actions-transitioning-from-node-20-to-node-22-and-node-24/
  # Remove this once all referenced actions use Node 24 by default and GitHub deprecates this feature flag.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
         
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
        
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
          
      - name: Convert Basics slide Markdown into HTML and PDF
        uses: KoharaKazuya/marp-cli-action@0810e250c2fcf4e81b17012e35cffacd1b9e976b # v4
        with:
          config-file: ./.marprc.yml
          args: --input-dir Basics/lessons/slides --output _site/slides

      - name: Convert Advanced slide Markdown into HTML and PDF
        if: ${{ hashFiles('Advanced/lessons/slides/day-*/**/*.md') != '' }}
        uses: KoharaKazuya/marp-cli-action@0810e250c2fcf4e81b17012e35cffacd1b9e976b # v4
        with:
          config-file: ./.marprc.yml
          args: --input-dir ./Advanced/lessons/slides --output ./_site/slides/advanced

      - name: Remove non-deck README artifacts
        run: |
          find _site/slides -maxdepth 1 -type f -name 'README*' -exec rm -f {} + 2>/dev/null || true
          find _site/slides/advanced -maxdepth 1 -type f -name 'README*' -exec rm -f {} + 2>/dev/null || true

      - name: Ensure Pages root resolves to slide content
        run: |
          mkdir -p _site
          sudo chown -R "$(id -u):$(id -g)" _site

          # Clean up only if index.html exists as a non-file entry.
          if [ -e _site/slides/index.html ] && [ ! -f _site/slides/index.html ]; then
            rm -rf _site/slides/index.html
            echo "Found nonfile slide index at _site/slides/index.html, deleted it."
          fi

          # Fallback to the checked-in static slide site when the Marp action
          # does not populate the configured `_site/slides` output directory
          # with a usable HTML entrypoint.
          USE_FALLBACK=0
          GENERATED_SLIDE_HTML=""

          if [ -f _site/slides/index.html ]; then
            echo "Found generated slide index at _site/slides/index.html."
          elif [ -d Basics/lessons/slides ] && [ -f Basics/lessons/slides/index.html ]; then
            GENERATED_SLIDE_HTML="Basics/lessons/slides/index.html"
              echo "Generated slide HTML found in _site/slides; creating index.html entrypoint if needed."
          elif [ -d _site/slides ]; then
            GENERATED_SLIDE_HTML="$(find _site/slides -maxdepth 3 -type f -name '*.html' ! -name 'README.html' -print -quit)"
            if [ -n "${GENERATED_SLIDE_HTML}" ]; then
              echo "Generated slide HTML found in _site/slides; creating index.html entrypoint if needed."
            else
              echo "No usable generated slide HTML found in _site/slides; applying fallback from Basics/lessons/slides."
              USE_FALLBACK=1
            fi
          else
            echo "No usable generated slide HTML found in _site/slides; applying fallback from Basics/lessons/slides."
            USE_FALLBACK=1
          fi

          if [ "${USE_FALLBACK:-0}" -eq 1 ]; then
            FALLBACK_SLIDE_HTML=""
            if [ -d Basics/lessons/slides ]; then
              FALLBACK_SLIDE_HTML="$(find Basics/lessons/slides -maxdepth 2 -type f -name '*.html' -print -quit)"
            fi

            if [ -n "${FALLBACK_SLIDE_HTML}" ]; then
              rm -rf _site/slides
              mkdir -p _site/slides
              cp -R Basics/lessons/slides/. _site/slides/
              echo "Fallback slide content copied from Basics/lessons/slides/."
            else
              echo "ERROR: No usable fallback slide content found in Basics/lessons/slides."
              exit 1
            fi
          fi

          mkdir -p _site/slides
          mkdir -p _site/slides/advanced

          if [ ! -f _site/slides/index.html ]; then
            rm -rf _site/slides/index.html
            
            FIRST_SLIDE_HTML="$(find _site/slides -maxdepth 2 -type f -path '_site/slides/day-*/*.html' | LC_ALL=C sort | head -n 1)"

            if [ -z "${FIRST_SLIDE_HTML}" ]; then
              FIRST_SLIDE_HTML="$(find _site/slides -maxdepth 3 -type f -path '_site/slides/advanced/day-*/*.html' | LC_ALL=C sort | head -n 1)"
            fi

            if [ -z "${FIRST_SLIDE_HTML}" ]; then
              FIRST_SLIDE_HTML="$(find _site/slides -maxdepth 3 -type f -name '*.html' ! -name 'index.html' ! -name 'README.html' | LC_ALL=C sort | head -n 1)"
            fi

            if [ -z "${FIRST_SLIDE_HTML}" ]; then
              echo "ERROR: No slide HTML found to use as the /slides/ entrypoint."
              exit 1
            fi

            FIRST_SLIDE_RELATIVE="${FIRST_SLIDE_HTML#_site/slides/}"

            INVALID_SLIDE_PATH_STRUCTURE=0
            if grep -Eq '(^|/)\.\.(/|$)|^[./]|/$|/\.' <<<"${FIRST_SLIDE_RELATIVE}"; then
              INVALID_SLIDE_PATH_STRUCTURE=1
            fi

            INVALID_SLIDE_PATH_CHARS=0
            if ! grep -Eq '^[A-Za-z0-9][A-Za-z0-9_/-]*([.][A-Za-z0-9_/-]+)*\.html$' <<<"${FIRST_SLIDE_RELATIVE}"; then
              INVALID_SLIDE_PATH_CHARS=1
            fi

            if [ "${INVALID_SLIDE_PATH_STRUCTURE}" -ne 0 ] || [ "${INVALID_SLIDE_PATH_CHARS}" -ne 0 ]; then
              echo "ERROR: Unsafe slide path selected for generated index: ${FIRST_SLIDE_RELATIVE}"
              exit 1
            fi

            cat <<EOF > _site/slides/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="1; url=./${FIRST_SLIDE_RELATIVE}">
              <title>Redirecting to slides…</title>
            </head>
            <body>
              <p aria-live="polite">Redirecting to the published slides… If you are not redirected, <a href="./${FIRST_SLIDE_RELATIVE}">open the first available deck</a>.</p>
            </body>
          </html>
          EOF
          fi
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: '_site'

  deploy:
    permissions:
      contents: write
      pages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: write
      deployments: write
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        
