<li>Outside data may be late, missing, malformed, or structurally unexpected</li>
<li>Professional code behaves predictably when the world gets messy</li>
</ul>
<h3 id="framing-rule">Framing Rule</h3>
<p><strong>Outside data is untrusted until we check it.</strong></p>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour1_Advanced.md</code> → <code>## Section 1: Recap &amp; Transition from Session 3</code></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="http-client-fundamentals">HTTP Client Fundamentals</h2>
<ul>
<li>A client sends a request; a server answers</li>
<li>Request parts: method, URL, optional params / headers / body</li>
<li>Response parts: status code, headers, body (often JSON)</li>
<li><code>GET</code> — give me data; <code>POST</code> — accept this data or create something</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> requests

response = requests.get(<span class="hljs-string">&quot;https://example.com/api/items&quot;</span>, timeout=<span class="hljs-number">5</span>)
<span class="hljs-built_in">print</span>(response.status_code)  <span class="hljs-comment"># 200, 404, 500, etc.</span>
<span class="hljs-built_in">print</span>(response.text)          <span class="hljs-comment"># raw body</span>
</code></pre>
<p>This is approachable — but not yet robust. Timeout, status checks, and JSON validation still needed.</p>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour1_Advanced.md</code> → <code>## Section 2: HTTP Client Fundamentals</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="timeout-and-raise_for_status">Timeout and <code>raise_for_status()</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Single overall timeout — never hang forever</span>
requests.get(url, timeout=<span class="hljs-number">5</span>)

<span class="hljs-comment"># Separate connect + read timeout</span>
requests.get(url, timeout=(<span class="hljs-number">3</span>, <span class="hljs-number">10</span>))
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">response = requests.get(url, timeout=<span class="hljs-number">5</span>)
response.raise_for_status()   <span class="hljs-comment"># HTTPError on 4xx / 5xx</span>
data = response.json()
</code></pre>
<ul>
<li>Without a timeout, a slow server freezes the program indefinitely</li>
<li><code>raise_for_status()</code> keeps happy-path code clean and pushes failures into exception handlers</li>
</ul>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour1_Advanced.md</code> → <code>## Section 3: JSON Contracts, Timeouts, and Status Codes</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="json-is-a-contract">JSON Is a Contract</h2>
<ul>
<li>Beginners assume the response matches exactly what they imagined</li>
<li>APIs change; fields go missing; types drift from <code>int</code> to <code>str</code></li>
<li>Define the minimum contract required before trusting the data</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">APIContractError</span>(<span class="hljs-title class_ inherited__">Exception</span>):
    <span class="hljs-string">&quot;&quot;&quot;Raised when API data does not match the expected shape.&quot;&quot;&quot;</span>


<span class="hljs-keyword">def</span> <span class="hljs-title function_">validate_post_contract</span>(<span class="hljs-params">payload: <span class="hljs-built_in">dict</span></span>) -&gt; <span class="hljs-literal">None</span>:
    required: <span class="hljs-built_in">dict</span> = {<span class="hljs-string">&quot;id&quot;</span>: <span class="hljs-built_in">int</span>, <span class="hljs-string">&quot;title&quot;</span>: <span class="hljs-built_in">str</span>, <span class="hljs-string">&quot;body&quot;</span>: <span class="hljs-built_in">str</span>}
    <span class="hljs-keyword">for</span> field, expected_type <span class="hljs-keyword">in</span> required.items():
        <span class="hljs-keyword">if</span> field <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> payload:
            <span class="hljs-keyword">raise</span> APIContractError(<span class="hljs-string">f&quot;Missing required field: <span class="hljs-subst">{field}</span>&quot;</span>)
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">isinstance</span>(payload[field], expected_type):
            <span class="hljs-keyword">raise</span> APIContractError(
                <span class="hljs-string">f&quot;&#x27;<span class="hljs-subst">{field}</span>&#x27; expected <span class="hljs-subst">{expected_type.__name__}</span>, &quot;</span>
                <span class="hljs-string">f&quot;got <span class="hljs-subst">{<span class="hljs-built_in">type</span>(payload[field]).__name__}</span>&quot;</span>
            )
</code></pre>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour1_Advanced.md</code> → <code>## Section 3 and Section 4</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h2 id="demo-full-wrapper-function">Demo: Full Wrapper Function</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">fetch_post</span>(<span class="hljs-params">post_id: <span class="hljs-built_in">int</span></span>) -&gt; <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span>:
    url = <span class="hljs-string">f&quot;https://jsonplaceholder.typicode.com/posts/<span class="hljs-subst">{post_id}</span>&quot;</span>
    <span class="hljs-keyword">try</span>:
        response = requests.get(url, timeout=(<span class="hljs-number">3</span>, <span class="hljs-number">10</span>))
        response.raise_for_status()
        data = response.json()
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">isinstance</span>(data, <span class="hljs-built_in">dict</span>):
            <span class="hljs-keyword">raise</span> APIContractError(<span class="hljs-string">&quot;Expected a JSON object&quot;</span>)
        validate_post_contract(data)
        <span class="hljs-keyword">return</span> data
    <span class="hljs-keyword">except</span> requests.Timeout:
        logger.error(<span class="hljs-string">&quot;The service timed out.&quot;</span>)
    <span class="hljs-keyword">except</span> requests.ConnectionError:
        logger.error(<span class="hljs-string">&quot;The service appears unreachable.&quot;</span>)
    <span class="hljs-keyword">except</span> requests.HTTPError <span class="hljs-keyword">as</span> err:
        logger.error(<span class="hljs-string">&quot;HTTP error: %s&quot;</span>, err.response.status_code)
    <span class="hljs-keyword">except</span> requests.exceptions.JSONDecodeError:
        logger.error(<span class="hljs-string">&quot;The service returned invalid JSON.&quot;</span>)
    <span class="hljs-keyword">except</span> APIContractError <span class="hljs-keyword">as</span> err:
        logger.error(<span class="hljs-string">&quot;JSON contract not satisfied: %s&quot;</span>, err)
    <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>
</code></pre>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour1_Advanced.md</code> → <code>## Section 4: Live Demo</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="friendly-failure-categories">Friendly Failure Categories</h2>
<ul>
<li><strong>Timeout</strong> — &quot;The service took too long to respond.&quot;</li>
<li><strong>Connection problem</strong> — &quot;The service may be unreachable.&quot;</li>
<li><strong>HTTP error</strong> — &quot;The service returned an error.&quot;</li>
<li><strong>Invalid JSON</strong> — &quot;The service returned unreadable data.&quot;</li>
<li><strong>Contract mismatch</strong> — &quot;The response did not match expectations.&quot;</li>
</ul>
<h3 id="two-audiences-two-channels">Two Audiences, Two Channels</h3>
<ul>
<li>User sees a calm, plain-language message</li>
<li>Log file captures the full technical detail for developers</li>
</ul>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour1_Advanced.md</code> → <code>## Section 3: Friendly Failure Categories</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<h2 id="lab-api-consumer-26-min">Lab: API Consumer (26 min)</h2>
<h3 id="tasks">Tasks</h3>
<ul>
<li>Call an HTTP endpoint with <code>timeout=...</code> on every request</li>
<li>Parse JSON and print selected fields in a user-friendly format</li>
<li>Use <code>raise_for_status()</code> and validate required keys before downstream use</li>
<li>Handle at least: timeout, connection failure, 404, 500, invalid JSON, contract mismatch</li>
<li>Keep all request logic in one wrapper function — no copy/paste</li>
</ul>
<h3 id="completion-criteria">Completion Criteria</h3>
<ul>
<li>Happy path parses and prints cleanly</li>
<li>Client never hangs indefinitely</li>
<li>Each failure category produces a friendly message, not a raw traceback</li>
</ul>
<blockquote>

<h2 id="common-pitfalls-hour-13">Common Pitfalls (Hour 13)</h2>
<ul>
<li>No timeout — program may hang forever waiting for a slow server</li>
<li>Calling <code>.json()</code> before confirming the status code is acceptable</li>
<li>Accessing <code>data[&quot;title&quot;]</code> without first confirming <code>data</code> is a dictionary</li>
<li>One broad <code>except Exception:</code> at the top masking the real error category</li>
<li>Logging raw exception traces directly to users instead of developer logs</li>
<li>Duplicating <code>requests.get(...)</code> logic in multiple places instead of a wrapper</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h2 id="hard-coded-secrets-are-a-trap">Hard-Coded Secrets Are a Trap</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Do not do this</span>
ADMIN_KEY = <span class="hljs-string">&quot;super-secret-real-key&quot;</span>
</code></pre>
<h3 id="why-this-fails-in-practice">Why This Fails in Practice</h3>
<ol>
<li>Secrets get committed to version control — deleting the line later leaves history</li>
<li>Secrets spread through screenshots, code reviews, and copy/paste</li>
<li>Rotation requires a code change and redeploy, not just a config update</li>
<li>Unsafe habits spread across the team</li>
</ol>
<h3 id="the-safe-pattern">The Safe Pattern</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> os

api_key = os.environ.get(<span class="hljs-string">&quot;APP_API_KEY&quot;</span>)
</code></pre>
<p>Code declares what it needs; the environment supplies the actual value at runtime.</p>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour2_Advanced.md</code> → <code>## Section 2: Core Concepts</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h2 id="get_required_env-helper"><code>get_required_env()</code> Helper</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> os


<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_required_env</span>(<span class="hljs-params">name: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    value = os.environ.get(name)
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> value:
        <span class="hljs-keyword">raise</span> RuntimeError(<span class="hljs-string">f&quot;Missing required environment variable: <span class="hljs-subst">{name}</span>&quot;</span>)
    <span class="hljs-keyword">return</span> value
</code></pre>
<ul>
<li>Fails loudly when a required variable is absent</li>
<li>Silently receiving <code>None</code> and stumbling later is harder to debug</li>
<li>Use this in any admin or API-enabled script</li>
</ul>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour2_Advanced.md</code> → <code>## Section 2: Environment Variables as a Simple, Practical Pattern</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="en-US">
<h2 id="envexample-template-and-gitignore"><code>.env.example</code> Template and <code>.gitignore</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># .env.example — safe to commit, placeholders only, never real values
APP_API_KEY=your-api-key-here
APP_ADMIN_KEY=replace-with-local-admin-key
APP_ENV=development
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># .gitignore — exclude local secret files
.env
.env.local
.env.development
.env.production
!.env.example
secrets.json
</code></pre>
<ul>
<li><code>.env.example</code> documents required names for collaborators</li>
<li><code>.env</code> is local configuration — never commit it</li>
</ul>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour2_Advanced.md</code> → <code>## Section 2: .env.example File</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h2 id="hashing-vs-encryption">Hashing vs Encryption</h2>
<ul>
<li><strong>Encryption</strong> is designed to be reversible with the right key</li>
<li><strong>Hashing</strong> is one-way — no key &quot;decrypts&quot; a digest back to the original</li>
<li>Common pattern: hash a new input, compare its digest to a stored digest</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> hashlib
<span class="hljs-keyword">import</span> secrets


<span class="hljs-keyword">def</span> <span class="hljs-title function_">sha256_digest</span>(<span class="hljs-params">value: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-keyword">return</span> hashlib.sha256(value.encode(<span class="hljs-string">&quot;utf-8&quot;</span>)).hexdigest()


<span class="hljs-comment"># Safe constant-time comparison (avoids timing side-channels)</span>
<span class="hljs-keyword">match</span> = secrets.compare_digest(
    sha256_digest(provided_key),
    sha256_digest(expected_key),
)
</code></pre>
<p><strong>Scope note:</strong> this demo illustrates the one-way concept — it is not a production password system.</p>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour2_Advanced.md</code> → <code>## Section 3: Hashing vs Encryption – High-Level Only</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<h2 id="demo-environment-variable--gated-admin-action">Demo: Environment Variable + Gated Admin Action</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> hashlib, logging, os, secrets

logger = logging.getLogger(__name__)
logging.basicConfig(level=logging.INFO, <span class="hljs-built_in">format</span>=<span class="hljs-string">&quot;%(asctime)s %(levelname)s %(message)s&quot;</span>)


<span class="hljs-keyword">def</span> <span class="hljs-title function_">run_admin_action</span>(<span class="hljs-params">provided_key: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-literal">None</span>:
    expected_key = get_required_env(<span class="hljs-string">&quot;APP_ADMIN_KEY&quot;</span>)
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> secrets.compare_digest(
        sha256_digest(provided_key),
        sha256_digest(expected_key),
    ):
        logger.warning(<span class="hljs-string">&quot;Admin action denied due to invalid key.&quot;</span>)
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Admin action denied.&quot;</span>)
        <span class="hljs-keyword">return</span>
    logger.info(<span class="hljs-string">&quot;Admin action approved.&quot;</span>)
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Admin action completed.&quot;</span>)
</code></pre>
<ul>
<li><code>get_required_env()</code> fails early if the variable is absent</li>
<li>User sees &quot;denied / completed&quot;; log captures the event for audit</li>
<li>Never log the actual secret value — log the event, not the credential</li>
</ul>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour2_Advanced.md</code> → <code>## Section 4: Live Demo</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="en-US">

<h2 id="common-pitfalls-hour-14">Common Pitfalls (Hour 14)</h2>
<h3 id="security-habit-checklist--ask-before-every-privileged-action">Security Habit Checklist — ask before every privileged action</h3>
<ol>
<li>Is this value sensitive or just general configuration?</li>
<li>Does it appear anywhere in source, screenshots, or commit history?</li>
<li>Can the value rotate tomorrow without a code change?</li>
<li>Are required variable names documented in README or <code>.env.example</code>?</li>
<li>Are local secret files excluded by <code>.gitignore</code>?</li>
</ol>
<ul>
<li>Real secrets visible in demo or example files</li>
<li>Committing <code>.env</code> because <code>.gitignore</code> was not updated in time</li>
<li>Printing secret values to &quot;prove the load worked&quot; — use downstream behavior instead</li>
<li>Treating hashing and encryption as interchangeable terms</li>
<li>Assuming a classroom <code>sha256</code> demo equals a production password system</li>
<li>Scope drift toward OAuth or JWT before foundational habits are solid</li>
</ul>
<p><strong>Quick Check:</strong> Why is <code>.env.example</code> safe to commit when <code>.env</code> is not?</p>

<h2 id="recommended-milestone-sequence">Recommended Milestone Sequence</h2>
<ol>
<li><strong>Core</strong> — business rules that work without a GUI</li>
<li><strong>Persistence</strong> — state survives restart; corrupted storage is handled</li>
<li><strong>UI</strong> — primary workflow through the chosen surface</li>
<li><strong>Analytics</strong> — at least one meaningful derived insight from real data</li>
<li><strong>Tests</strong> — repeatable checks for core rules and failure paths</li>

</ol>

<h2 id="delivery-path-gui-first-vs-api-first">Delivery Path: GUI-First vs API-First</h2>
<h3 id="gui-first">GUI-First</h3>
<ul>
<li>Best for human-operator tools, tracker dashboards, data-entry apps</li>
<li>Tangible demo early; easy for non-technical audiences</li>
<li>Risk: logic hides in callbacks; tests get postponed</li>
</ul>
<h3 id="api-first">API-First</h3>
<ul>
<li>Best for automation backends, multi-client systems, integration projects</li>
<li>Clear service boundaries; easier to test logic directly</li>
<li>Risk: less visually exciting early; may under-document usage</li>
</ul>
<h3 id="non-negotiable-for-either-path">Non-Negotiable for Either Path</h3>
<p>Core logic must live in reusable services — never inside the interface layer.</p>
<blockquote>

<h1 id="hour-16-checkpoint-2--persistence-ready-core--json-saveload">Hour 16: Checkpoint 2 — Persistence-Ready Core + JSON Save/Load</h1>

<li>Logging captures meaningful events: save, load, missing file, invalid data, failures</li>
<li>Custom exceptions still communicate domain and persistence problems clearly</li>
</ul>
<h3 id="grading-focus">Grading Focus</h3>

<h2 id="domain-model-with-serialization">Domain Model with Serialization</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> dataclasses <span class="hljs-keyword">import</span> asdict, dataclass, field


<span class="hljs-meta">@dataclass(<span class="hljs-params">slots=<span class="hljs-literal">True</span></span>)</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">Book</span>:
    title: <span class="hljs-built_in">str</span>
    author: <span class="hljs-built_in">str</span>
    pages_read: <span class="hljs-built_in">int</span> = <span class="hljs-number">0</span>


<span class="hljs-meta">@dataclass(<span class="hljs-params">slots=<span class="hljs-literal">True</span></span>)</span>
<span class="hljs-keyword">class</span> <span class="hljs-title class_">ReadingState</span>:
    books: <span class="hljs-built_in">list</span>[Book] = field(default_factory=<span class="hljs-built_in">list</span>)

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">to_dict</span>(<span class="hljs-params">self</span>) -&gt; <span class="hljs-built_in">dict</span>:
        <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;books&quot;</span>: [asdict(book) <span class="hljs-keyword">for</span> book <span class="hljs-keyword">in</span> <span class="hljs-variable language_">self</span>.books]}

<span class="hljs-meta">    @classmethod</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">from_dict</span>(<span class="hljs-params">cls, data: <span class="hljs-built_in">dict</span></span>) -&gt; <span class="hljs-string">&quot;ReadingState&quot;</span>:
        <span class="hljs-keyword">return</span> cls(books=[Book(**b) <span class="hljs-keyword">for</span> b <span class="hljs-keyword">in</span> data.get(<span class="hljs-string">&quot;books&quot;</span>, [])])
</code></pre>
<p>JSON understands dicts, lists, strings, and numbers — not arbitrary Python objects by magic.</p>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour4_Advanced.md</code> → <code>## Section 2: Example Domain Model</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="en-US">
<h2 id="custom-exceptions--file-logging">Custom Exceptions + File Logging</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">AppError</span>(<span class="hljs-title class_ inherited__">Exception</span>):
    <span class="hljs-string">&quot;&quot;&quot;Base application error.&quot;&quot;&quot;</span>

<span class="hljs-keyword">class</span> <span class="hljs-title class_">ValidationError</span>(<span class="hljs-title class_ inherited__">AppError</span>):
    <span class="hljs-string">&quot;&quot;&quot;Raised when domain validation fails.&quot;&quot;&quot;</span>

<span class="hljs-keyword">class</span> <span class="hljs-title class_">PersistenceError</span>(<span class="hljs-title class_ inherited__">AppError</span>):
    <span class="hljs-string">&quot;&quot;&quot;Raised when save/load operations fail.&quot;&quot;&quot;</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">configure_logging</span>() -&gt; <span class="hljs-literal">None</span>:
    log_dir = Path(<span class="hljs-string">&quot;logs&quot;</span>)
    log_dir.mkdir(exist_ok=<span class="hljs-literal">True</span>)
    logging.basicConfig(
        filename=log_dir / <span class="hljs-string">&quot;app.log&quot;</span>,
        level=logging.INFO,
        <span class="hljs-built_in">format</span>=<span class="hljs-string">&quot;%(asctime)s %(levelname)s %(name)s %(message)s&quot;</span>,
    )
</code></pre>
<p>Log events: save started / succeeded, load started, file missing, invalid JSON, validation failed.</p>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour4_Advanced.md</code> → <code>## Section 3: Safe JSON Save/Load, Logging, and Exception Strategy</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" lang="en-US">
<h2 id="safe-save-pattern">Safe-Save Pattern</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">save</span>(<span class="hljs-params">self, state: ReadingState</span>) -&gt; <span class="hljs-literal">None</span>:
    <span class="hljs-variable language_">self</span>.path.parent.mkdir(parents=<span class="hljs-literal">True</span>, exist_ok=<span class="hljs-literal">True</span>)
    temp_path = <span class="hljs-variable language_">self</span>.path.with_suffix(<span class="hljs-variable language_">self</span>.path.suffix + <span class="hljs-string">&quot;.tmp&quot;</span>)
    <span class="hljs-keyword">try</span>:
        <span class="hljs-keyword">with</span> temp_path.<span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;w&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> f:
            json.dump(state.to_dict(), f, indent=<span class="hljs-number">2</span>)
        temp_path.replace(<span class="hljs-variable language_">self</span>.path)          <span class="hljs-comment"># atomic replacement</span>
        logger.info(<span class="hljs-string">&quot;State saved to %s&quot;</span>, <span class="hljs-variable language_">self</span>.path)
    <span class="hljs-keyword">except</span> OSError <span class="hljs-keyword">as</span> error:
        logger.exception(<span class="hljs-string">&quot;Failed to save state&quot;</span>)
        <span class="hljs-keyword">raise</span> PersistenceError(<span class="hljs-string">&quot;Could not save application state&quot;</span>) <span class="hljs-keyword">from</span> error
</code></pre>
<ul>
<li>Writing to <code>.tmp</code> first then replacing ensures the last good save is never partially overwritten</li>
<li>A crash mid-write leaves the original file intact</li>
</ul>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour4_Advanced.md</code> → <code>## Section 3: Safe Save Pattern with pathlib</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="en-US">
<h2 id="safe-load-pattern">Safe Load Pattern</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">load</span>(<span class="hljs-params">self</span>) -&gt; ReadingState:
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-variable language_">self</span>.path.exists():
        logger.info(<span class="hljs-string">&quot;State file missing; starting with default state&quot;</span>)
        <span class="hljs-keyword">return</span> ReadingState()
    <span class="hljs-keyword">try</span>:
        <span class="hljs-keyword">with</span> <span class="hljs-variable language_">self</span>.path.<span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;r&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> f:
            raw_data = json.load(f)
    <span class="hljs-keyword">except</span> json.JSONDecodeError <span class="hljs-keyword">as</span> error:
        logger.exception(<span class="hljs-string">&quot;State file contains invalid JSON&quot;</span>)
        <span class="hljs-keyword">raise</span> PersistenceError(<span class="hljs-string">&quot;State file is corrupted&quot;</span>) <span class="hljs-keyword">from</span> error
    <span class="hljs-keyword">except</span> OSError <span class="hljs-keyword">as</span> error:
        <span class="hljs-keyword">raise</span> PersistenceError(<span class="hljs-string">&quot;Could not load application state&quot;</span>) <span class="hljs-keyword">from</span> error
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">isinstance</span>(raw_data, <span class="hljs-built_in">dict</span>):
        <span class="hljs-keyword">raise</span> PersistenceError(<span class="hljs-string">&quot;State file must be a JSON object&quot;</span>)
    <span class="hljs-keyword">try</span>:
        <span class="hljs-keyword">return</span> ReadingState.from_dict(raw_data)
    <span class="hljs-keyword">except</span> (TypeError, KeyError, ValueError) <span class="hljs-keyword">as</span> error:
        logger.exception(<span class="hljs-string">&quot;State data failed validation&quot;</span>)
        <span class="hljs-keyword">raise</span> PersistenceError(<span class="hljs-string">&quot;State data structure was invalid&quot;</span>) <span class="hljs-keyword">from</span> error
</code></pre>
<blockquote>
<p>Source: <code>Advanced/lessons/lecture/Day4_Hour4_Advanced.md</code> → <code>## Section 3: Safe JSON Save/Load</code></p>
</blockquote>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">store = JSONStateStore(Path(<span class="hljs-string">&quot;data/state.json&quot;</span>))
initial_state = store.load()            <span class="hljs-comment"># missing file → default state</span>

store.save(service.state)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;State saved. Simulating restart...&quot;</span>)

restarted_service = ReadingService(reloaded)
<span class="hljs-keyword">for</span> book <span class="hljs-keyword">in</span> restarted_service.list_books():
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;- <span class="hljs-subst">{book.title}</span> by <span class="hljs-subst">{book.author}</span> (<span class="hljs-subst">{book.pages_read}</span> pages read)&quot;</span>)
</code></pre>

<h2 id="common-pitfalls-hour-16">Common Pitfalls (Hour 16)</h2>
<ul>
<li>Dumping raw Python objects to JSON without <code>to_dict()</code> serialization</li>
<li>Overwriting the final file directly instead of writing to a temp file first</li>
<li>Not catching <code>json.JSONDecodeError</code> specifically — bare <code>except:</code> hides the root cause</li>
<li>Logging only to the console, not to a file</li>
<li>Persistence code leaking into the service layer — save/load belongs in <code>persistence.py</code></li>
<li>Demoing a happy path without proving save → restart → load</li>
<li>Ignoring missing-file behavior — first-run must work cleanly</li>
</ul>
<p><strong>Quick Check:</strong> If the app works in memory but loses all data after restart, which milestone is still incomplete?</p>
