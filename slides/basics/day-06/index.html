<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6 — Basics Course Slides</title>
    <style>
        :root {
            --bg: #f7f7f7;
            --fg: #111;
            --accent: #0066ff;
            --accent-light: #e6f0ff;
            --border: #ddd;
            --font: system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 48px 56px;
            max-width: 640px;
            width: 100%;
        }
        .badge {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 18px;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
            color: var(--fg);
        }
        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .session-list {
            list-style: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 32px;
        }
        .session-list li {
            border-bottom: 1px solid var(--border);
        }
        .session-list li:last-child { border-bottom: none; }
        .session-list a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            text-decoration: none;
            color: var(--fg);
            transition: background 0.15s;
        }
        .session-list a:hover { background: var(--accent-light); }
        .session-list .num {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.82rem;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .session-list .info { flex: 1; }
        .session-list .info strong { display: block; font-size: 0.97rem; }
        .session-list .info span { font-size: 0.82rem; color: #888; }
        .session-list .arrow { color: var(--accent); font-size: 1.2rem; }
        .meta {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <span class="badge">Python Basics · Day 6</span>
    <h1>Day 6 — Session 6<br>Data Structure Selection &amp; Mini-Projects</h1>
    <p class="subtitle">Hours 21–24 &nbsp;·&nbsp; Python Programming (Basic)</p>

    <ul class="session-list">
        <li>
            <a href="day-06-session-6.html">
                <span class="num">Session 6</span>
                <span class="info">
                    <strong>Data Structure Selection &amp; Mini-Projects</strong>
                    <span>62 slides · Hours 21–24</span>
                </span>
                <span class="arrow">→</span>
            </a>
        </li>
    </ul>

    <p class="meta">
        In the deck, press <kbd>←</kbd> <kbd>→</kbd> or <kbd>Space</kbd> to navigate slides
    </p>
</div>
</body>
</html>
